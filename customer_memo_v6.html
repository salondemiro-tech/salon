<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧客メモ - Salon Manager</title>
<script src="shared_db.js"></script>
<style>
  :root{--accent:#b5845a;--accent-light:#f5ede4;--surface:#f5f4f0;--border:rgba(0,0,0,0.12);--text:#1a1a18;--muted:#73726c;--green:#7b9e87;--green-light:#e8f2eb;--blue:#7a8fbf;--blue-light:#eaeefc;--red:#c47b7b;--red-light:#faeaea;--bg:#ffffff;color-scheme:light;}
  *{box-sizing:border-box;margin:0;padding:0;color-scheme:light;}
  body{font-family:'Georgia',serif;color:#1a1a18!important;background:#ffffff!important;}
  input,textarea,select{background:#ffffff!important;color:#1a1a18!important;}
  .layout{display:flex;height:100vh;min-height:600px;}
  .left-col{width:200px;min-width:160px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .cust-search{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface);}
  .cust-search input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;}
  .cust-list{overflow-y:auto;flex:1;}
  .cust-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);}
  .cust-item:hover{background:var(--accent-light);}
  .cust-item.active{background:var(--accent-light);border-left:3px solid var(--accent);}
  .cust-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
  .cust-info .cust-name{font-size:13px;font-weight:600;}
  .cust-info .cust-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .right-col{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .right-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);background:var(--surface);}
  .rh-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .rh-title{font-size:15px;font-weight:600;}
  .rh-edit-btn{padding:5px 12px;border:1px solid var(--accent);border-radius:6px;background:none;color:var(--accent);font-size:11px;cursor:pointer;font-family:inherit;}
  .rh-edit-btn:hover{background:var(--accent);color:#fff;}
  .stats-bar{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .stat-item{flex:1;padding:7px 8px;text-align:center;border-right:1px solid var(--border);}
  .stat-item:last-child{border-right:none;}
  .stat-num{font-size:16px;font-weight:600;color:var(--accent);display:block;}
  .stat-label{font-size:10px;color:var(--muted);display:block;}
  .tab-bar{display:flex;border-bottom:1px solid var(--border);}
  .tab-btn{flex:1;padding:10px;font-size:12px;background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;border-bottom:2px solid transparent;}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
  .tab-content{flex:1;overflow-y:auto;padding:16px 20px;}
  .slabel{font-size:10px;letter-spacing:.1em;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
  .memo-ta{width:100%;min-height:80px;padding:9px;border:1px solid var(--border);border-radius:8px;font-size:13px;line-height:1.6;resize:vertical;font-family:inherit;}
  .memo-ta:focus{outline:none;border-color:var(--accent);}
  .saved-msg{font-size:11px;color:var(--green);height:16px;margin-top:3px;}
  .visit-card{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
  .visit-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;}
  .visit-header:hover{background:var(--accent-light);}
  .vh-date{font-size:13px;font-weight:600;}
  .vh-menu{font-size:11px;color:var(--muted);margin-top:2px;}
  .vh-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .vh-pay{font-size:11px;font-weight:600;color:var(--accent);white-space:nowrap;}
  .vh-badge{font-size:9px;padding:2px 5px;border-radius:20px;font-weight:600;white-space:nowrap;}
  .badge-online{background:var(--green-light);color:#2e5c3a;}
  .badge-manual{background:var(--blue-light);color:#2c3a66;}
  .badge-cancel{background:var(--red-light);color:#7a2020;}
  .chevron{font-size:11px;color:var(--muted);transition:transform .2s;}
  .chevron.open{transform:rotate(90deg);}
  .visit-body{display:none;border-top:1px solid var(--border);}
  .visit-body.open{display:block;}
  .payment-row{display:flex;align-items:center;gap:4px;padding:10px 14px;background:var(--surface);flex-wrap:wrap;}
  .payment-row label{font-size:11px;color:var(--muted);white-space:nowrap;}
  .pay-input{width:80px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:right;font-family:inherit;}
  .pay-save{padding:5px 8px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
  .visit-memo-area{padding:10px 14px;}
  .vm-label{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
  .camera-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;}
  .vm-ta{width:100%;min-height:64px;padding:9px;border:1px solid var(--border);border-radius:7px;font-size:12px;line-height:1.6;resize:vertical;font-family:inherit;}
  .vm-ta:focus{outline:none;border-color:var(--accent);}
  .vm-saved{font-size:10px;color:var(--green);height:14px;margin-top:3px;}
  .memo-photos{padding:0 14px 10px;}
  .mp-label{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:6px;}
  .mp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
  .mp-slot{aspect-ratio:1;border-radius:5px;overflow:hidden;border:1px solid var(--border);position:relative;background:var(--surface);}
  .mp-slot img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
  .mp-del{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(196,123,123,.9);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .mp-empty{font-size:11px;color:var(--muted);padding:8px 0;text-align:center;}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50;align-items:center;justify-content:center;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:22px;width:320px;}
  .modal h3{font-size:14px;margin-bottom:14px;}
  .modal label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;margin-top:10px;}
  .modal input{width:100%;padding:7px 9px;border-radius:6px;border:1px solid var(--border);font-size:13px;font-family:inherit;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .mbt{flex:1;padding:7px;border-radius:7px;font-size:12px;border:1px solid var(--border);cursor:pointer;background:none;font-family:inherit;}
  .mbt.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .empty-state{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px;}
  .img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;}
  .img-modal.show{display:flex;}
  .img-modal img{max-width:90%;max-height:90%;border-radius:8px;}
  .img-modal-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;}
  .hidden-input{display:none;}
  .nav-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;border-left:3px solid transparent;text-decoration:none;border-bottom:1px solid var(--border);}
  .nav-item:hover{background:var(--accent-light);color:var(--accent);}
  .nav-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-light);font-weight:600;}
</style>
</head>
<body>
<div class="layout">
  <div class="left-col">
    <div style="padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--accent);">Salon Manager</div>
    <a class="nav-item" href="salon_auth_v2.html" style="font-size:11px;">🏠 ダッシュボード</a>
    <a class="nav-item" href="salon_calendar_v7.html" style="font-size:11px;">📅 カレンダー</a>
    <a class="nav-item active" style="font-size:11px;">👤 顧客管理</a>
    <a class="nav-item" href="menu_settings_v3.html" style="font-size:11px;">✦ メニュー</a>
    <a class="nav-item" href="business_hours_v6.html" style="font-size:11px;">🕐 営業時間</a>
    <a class="nav-item" href="cancel_policy_v3.html" style="font-size:11px;">📋 キャンセル</a>
    <a class="nav-item" href="stamp_settings.html" style="font-size:11px;">🎫 スタンプ</a>
    <div style="border-top:1px solid var(--border);margin:4px 0;"></div>
    <div style="padding:10px 12px;border-bottom:1px solid var(--border);">
      <button id="addCustBtn" style="width:100%;padding:7px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">＋ 新規顧客を追加</button>
    </div>
    <div style="padding:6px 8px;border-bottom:1px solid var(--border);display:flex;gap:4px;">
      <button id="sortNew" style="flex:1;padding:5px 2px;font-size:11px;border:1px solid var(--border);border-radius:5px;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;">新しい順</button>
      <button id="sortOld" style="flex:1;padding:5px 2px;font-size:11px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--muted);cursor:pointer;font-family:inherit;">古い順</button>
    </div>
    <div class="cust-search">
      <input type="text" id="custSearch" placeholder="氏名で検索..." style="margin-bottom:5px;">
      <input type="text" id="custSearchPhone" placeholder="電話番号で検索..." style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;margin-bottom:5px;background:#fff;color:#1a1a18;">
      <input type="text" id="custSearchEmail" placeholder="メールで検索..." style="width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:#fff;color:#1a1a18;">
    </div>
    <div class="cust-list" id="custList"></div>
  </div>
  <div class="right-col">
    <div id="emptyState" class="empty-state">← 顧客を選択してください</div>
    <div id="detailArea" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="right-header">
        <div class="rh-top">
          <div class="rh-title" id="detailName"></div>
          <div style="display:flex;gap:6px;">
            <button class="rh-edit-btn" id="editBtn">情報を編集</button>
            <button class="rh-edit-btn" id="mergeBtn" style="border-color:var(--blue);color:var(--blue);">統合</button>
            <button class="rh-edit-btn" id="deleteBtn" style="border-color:var(--red);color:var(--red);">削除</button>
          </div>
        </div>
        <div class="stats-bar">
          <div class="stat-item"><span class="stat-num" id="statCount">0</span><span class="stat-label">来店回数</span></div>
          <div class="stat-item"><span class="stat-num" id="statTotal">—</span><span class="stat-label">累計支払い</span></div>
          <div class="stat-item"><span class="stat-num" id="statAvg">—</span><span class="stat-label">平均単価</span></div>
        </div>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" id="tabMemo">カルテメモ</button>
        <button class="tab-btn" id="tabHistory">来店履歴</button>
      </div>
      <div class="tab-content" id="tabContent"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>顧客情報を編集</h3>
    <label>お名前</label><input type="text" id="eName">
    <label>電話番号</label><input type="text" id="ePhone">
    <label>メールアドレス</label><input type="text" id="eEmail">
    <div class="modal-actions">
      <button class="mbt" id="closeEditBtn">キャンセル</button>
      <button class="mbt primary" id="saveEditBtn">保存する</button>
    </div>
  </div>
</div>

<div class="img-modal" id="imgModal">
  <button class="img-modal-close" id="closeImgBtn">×</button>
  <img id="imgModalSrc" src="" alt="">
</div>

<input type="file" accept="image/*" class="hidden-input" id="cameraInput">

<!-- 顧客削除確認モーダル -->
<div id="delCustOv" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:14px;padding:24px;width:100%;max-width:380px;">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">顧客カルテを削除</h3>
    <div id="delCustName" style="font-size:13px;margin-bottom:10px;"></div>
    <div style="font-size:12px;padding:10px 12px;background:#faeaea;border-radius:8px;color:#7a2020;line-height:1.6;margin-bottom:16px;">削除すると予約履歴・メモも全て削除されます。元に戻せません。</div>
    <div style="display:flex;gap:10px;">
      <button id="cancelDelCustBtn" style="flex:1;padding:12px;border-radius:10px;border:1.5px solid rgba(0,0,0,.12);background:none;font-size:14px;font-family:inherit;cursor:pointer;">キャンセル</button>
      <button id="confirmDelCustBtn" style="flex:1;padding:12px;border-radius:10px;border:none;background:#c47b7b;color:#fff;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;">削除する</button>
    </div>
  </div>
</div>

<!-- 顧客追加モーダル -->
<div id="addCustOv" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:14px;padding:24px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.15);">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;">新規顧客を追加</h3>
    <div style="margin-bottom:10px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">氏名 <span style="color:#c47b7b;">必須</span></label>
      <input type="text" id="ncName" placeholder="例：山田 花子" style="width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,.12);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a18;">
    </div>
    <div style="margin-bottom:10px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">電話番号 <span style="color:#c47b7b;">必須</span></label>
      <input type="tel" id="ncPhone" placeholder="例：090-1234-5678" style="width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,.12);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a18;">
    </div>
    <div style="margin-bottom:16px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">メールアドレス <span style="font-weight:400;color:#aaa;">任意</span></label>
      <input type="email" id="ncEmail" placeholder="例：hanako@example.com" style="width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,.12);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a18;">
    </div>
    <div style="display:flex;gap:10px;">
      <button id="cancelAddCustBtn" style="flex:1;padding:12px;border-radius:10px;border:1.5px solid rgba(0,0,0,.12);background:none;font-size:14px;font-family:inherit;cursor:pointer;color:#73726c;">キャンセル</button>
      <button id="saveAddCustBtn" style="flex:1;padding:12px;border-radius:10px;border:none;background:#b5845a;color:#fff;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;">追加する</button>
    </div>
  </div>
</div>

<!-- 顧客統合モーダル -->
<div id="mergeOv" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px;overflow-y:auto;">
  <div style="background:#fff;border-radius:14px;padding:24px;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.15);margin:auto;">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:6px;">顧客カルテを統合</h3>
    <p style="font-size:12px;color:#73726c;margin-bottom:16px;line-height:1.6;">統合元のカルテは削除され、予約履歴・スタンプは統合先に引き継がれます。</p>

    <!-- STEP1: 統合先選択 -->
    <div id="mergeStep1">
      <div style="font-size:12px;font-weight:600;color:#73726c;margin-bottom:8px;">統合先の顧客を検索</div>
      <input type="text" id="mergeSearch" placeholder="氏名・電話番号・メールで検索..." style="width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,.12);border-radius:9px;font-size:14px;font-family:inherit;margin-bottom:10px;">
      <div id="mergeSearchResults" style="max-height:200px;overflow-y:auto;border:1.5px solid rgba(0,0,0,.08);border-radius:9px;"></div>
    </div>

    <!-- STEP2: 統合内容設定 -->
    <div id="mergeStep2" style="display:none;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px;background:#f8f7f4;border-radius:10px;">
        <div style="flex:1;text-align:center;">
          <div style="font-size:10px;color:#73726c;margin-bottom:4px;">統合元（削除）</div>
          <div id="mergeSrcName" style="font-size:13px;font-weight:600;"></div>
        </div>
        <div style="font-size:20px;color:#b5845a;">→</div>
        <div style="flex:1;text-align:center;">
          <div style="font-size:10px;color:#73726c;margin-bottom:4px;">統合先（残す）</div>
          <div id="mergeDstName" style="font-size:13px;font-weight:600;"></div>
        </div>
      </div>

      <div style="font-size:12px;font-weight:600;color:#73726c;margin-bottom:10px;">統合後の情報を設定</div>

      <div style="margin-bottom:10px;">
        <label style="font-size:12px;font-weight:600;color:#73726c;display:block;margin-bottom:4px;">氏名</label>
        <div style="display:flex;gap:6px;margin-bottom:4px;">
          <button class="merge-pick-btn" id="mergeNameSrc" style="flex:1;padding:7px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;background:#fff;"></button>
          <button class="merge-pick-btn" id="mergeNameDst" style="flex:1;padding:7px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;background:#fff;"></button>
        </div>
        <input type="text" id="mergeNameFree" placeholder="または自由入力..." style="width:100%;padding:8px 12px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;font-size:13px;font-family:inherit;">
      </div>

      <div style="margin-bottom:10px;">
        <label style="font-size:12px;font-weight:600;color:#73726c;display:block;margin-bottom:4px;">電話番号</label>
        <div style="display:flex;gap:6px;margin-bottom:4px;">
          <button class="merge-pick-btn" id="mergePhoneSrc" style="flex:1;padding:7px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;background:#fff;"></button>
          <button class="merge-pick-btn" id="mergePhoneDst" style="flex:1;padding:7px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;background:#fff;"></button>
        </div>
        <input type="text" id="mergePhoneFree" placeholder="または自由入力..." style="width:100%;padding:8px 12px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;font-size:13px;font-family:inherit;">
      </div>

      <div style="margin-bottom:16px;">
        <label style="font-size:12px;font-weight:600;color:#73726c;display:block;margin-bottom:4px;">メールアドレス</label>
        <div style="display:flex;gap:6px;margin-bottom:4px;">
          <button class="merge-pick-btn" id="mergeEmailSrc" style="flex:1;padding:7px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;background:#fff;"></button>
          <button class="merge-pick-btn" id="mergeEmailDst" style="flex:1;padding:7px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;font-size:12px;font-family:inherit;cursor:pointer;background:#fff;"></button>
        </div>
        <input type="text" id="mergeEmailFree" placeholder="または自由入力..." style="width:100%;padding:8px 12px;border:1.5px solid rgba(0,0,0,.12);border-radius:8px;font-size:13px;font-family:inherit;">
      </div>

      <div style="padding:10px 12px;background:#e8f2eb;border-radius:8px;font-size:12px;color:#1e4d2b;margin-bottom:16px;">
        予約履歴・スタンプは自動的に合算されます
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:4px;">
      <button id="cancelMergeBtn" style="flex:1;padding:12px;border-radius:10px;border:1.5px solid rgba(0,0,0,.12);background:none;font-size:14px;font-family:inherit;cursor:pointer;color:#73726c;">キャンセル</button>
      <button id="confirmMergeBtn" style="flex:1;padding:12px;border-radius:10px;border:none;background:#b5845a;color:#fff;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;display:none;">統合する</button>
    </div>
  </div>
</div>

<script>
var currentCustId = null;
var currentTab = 'memo';
var expandedVisitId = null;
var activeUploadVisitId = null;
var memoTimers = {};
var visitPhotos = {};
var karteTimer = null;
var sortMode = 'new';
var DOWS = ['日','月','火','水','木','金','土'];
var allCustomers = [];
var allAppointments = [];


// ===== 統合機能 =====
var mergeSrcId = null;
var mergeDstId = null;

function openMerge() {
  if (!currentCustId) return;
  mergeSrcId = currentCustId;
  mergeDstId = null;
  document.getElementById('mergeStep1').style.display = '';
  document.getElementById('mergeStep2').style.display = 'none';
  document.getElementById('confirmMergeBtn').style.display = 'none';
  document.getElementById('mergeSearch').value = '';
  document.getElementById('mergeSearchResults').innerHTML = '';
  document.getElementById('mergeOv').style.display = 'flex';
}

function renderMergeResults(q) {
  var src = null;
  for (var i = 0; i < allCustomers.length; i++) {
    if (allCustomers[i].id === mergeSrcId) { src = allCustomers[i]; break; }
  }
  var results = allCustomers.filter(function(c) {
    if (c.id === mergeSrcId) return false;
    var sq = q.toLowerCase();
    return (c.name || '').toLowerCase().indexOf(sq) >= 0
      || (c.phone || '').indexOf(sq) >= 0
      || (c.email || '').toLowerCase().indexOf(sq) >= 0;
  });
  var div = document.getElementById('mergeSearchResults');
  if (!q) { div.innerHTML = '<div style="padding:12px;font-size:12px;color:#73726c;text-align:center;">氏名・電話番号・メールで検索</div>'; return; }
  if (!results.length) { div.innerHTML = '<div style="padding:12px;font-size:12px;color:#73726c;text-align:center;">該当なし</div>'; return; }
  div.innerHTML = '';
  results.forEach(function(c) {
    var row = document.createElement('div');
    row.style.cssText = 'padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;gap:10px;';
    row.innerHTML = '<div style="width:32px;height:32px;border-radius:50%;background:#b5845a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;">' + (c.name||'?').charAt(0) + '</div>'
      + '<div><div style="font-size:13px;font-weight:600;">' + (c.name||'') + '</div><div style="font-size:11px;color:#73726c;">' + (c.phone||'') + (c.email ? '　' + c.email : '') + '</div></div>';
    (function(cust) {
      row.addEventListener('click', function() { selectMergeDst(cust); });
    })(c);
    div.appendChild(row);
  });
}

function selectMergeDst(dst) {
  mergeDstId = dst.id;
  var src = null;
  for (var i = 0; i < allCustomers.length; i++) {
    if (allCustomers[i].id === mergeSrcId) { src = allCustomers[i]; break; }
  }
  document.getElementById('mergeSrcName').textContent = src ? src.name : '';
  document.getElementById('mergeDstName').textContent = dst.name || '';

  // ボタンにそれぞれの値をセット
  document.getElementById('mergeNameSrc').textContent = src ? src.name : '';
  document.getElementById('mergeNameDst').textContent = dst.name || '';
  document.getElementById('mergePhoneSrc').textContent = src ? src.phone : '';
  document.getElementById('mergePhoneDst').textContent = dst.phone || '';
  document.getElementById('mergeEmailSrc').textContent = src ? src.email : '';
  document.getElementById('mergeEmailDst').textContent = dst.email || '';

  // フリー入力欄に初期値セット
  document.getElementById('mergeNameFree').value = dst.name || '';
  document.getElementById('mergePhoneFree').value = dst.phone || '';
  document.getElementById('mergeEmailFree').value = dst.email || '';

  // ボタンのスタイルリセット
  var btns = document.querySelectorAll('.merge-pick-btn');
  for (var j = 0; j < btns.length; j++) {
    btns[j].style.borderColor = 'rgba(0,0,0,.12)';
    btns[j].style.background = '#fff';
    btns[j].style.color = '#1a1a18';
  }

  document.getElementById('mergeStep1').style.display = 'none';
  document.getElementById('mergeStep2').style.display = '';
  document.getElementById('confirmMergeBtn').style.display = '';
}

function setupMergePickBtn(btnId, freeId) {
  document.getElementById(btnId).addEventListener('click', function() {
    document.getElementById(freeId).value = this.textContent;
    var siblings = this.parentNode.querySelectorAll('.merge-pick-btn');
    for (var i = 0; i < siblings.length; i++) {
      siblings[i].style.borderColor = 'rgba(0,0,0,.12)';
      siblings[i].style.background = '#fff';
      siblings[i].style.color = '#1a1a18';
    }
    this.style.borderColor = '#b5845a';
    this.style.background = '#f5ede4';
    this.style.color = '#7a5535';
  });
}

function doMerge() {
  if (!mergeSrcId || !mergeDstId) return;
  var newName = document.getElementById('mergeNameFree').value.trim();
  var newPhone = document.getElementById('mergePhoneFree').value.trim();
  var newEmail = document.getElementById('mergeEmailFree').value.trim();
  if (!newName || !newPhone) { alert('氏名と電話番号は必須です'); return; }

  var src = null, dst = null;
  for (var i = 0; i < allCustomers.length; i++) {
    if (allCustomers[i].id === mergeSrcId) src = allCustomers[i];
    if (allCustomers[i].id === mergeDstId) dst = allCustomers[i];
  }
  if (!src || !dst) return;
  document.getElementById('confirmMergeBtn').disabled = true;
  document.getElementById('confirmMergeBtn').textContent = '統合中...';

  var salonId = getCurrentSalonId();
  var batch = window.db.batch();

  // 統合先の顧客情報を更新（スタンプも合算）
  var mergedStamps = (src.stamps || 0) + (dst.stamps || 0);
  batch.update(salonCol(salonId, 'customers').doc(mergeDstId), {
    name: newName, phone: newPhone, email: newEmail, stamps: mergedStamps
  });

  // 統合元の予約を統合先に移す
  for (var j = 0; j < allAppointments.length; j++) {
    if (allAppointments[j].customerId === mergeSrcId) {
      batch.update(salonCol(salonId, 'appointments').doc(allAppointments[j].id), {
        customerId: mergeDstId, name: newName
      });
    }
  }

  // 統合元を削除
  batch.delete(salonCol(salonId, 'customers').doc(mergeSrcId));

  batch.commit().then(function() {
    document.getElementById('mergeOv').style.display = 'none';
    currentCustId = mergeDstId;
    mergeSrcId = null; mergeDstId = null;
    reloadAll(function() { renderCustList(); selectCust(currentCustId); });
    showToast('統合が完了しました');
  }).catch(function() {
    alert('統合に失敗しました');
    document.getElementById('confirmMergeBtn').disabled = false;
    document.getElementById('confirmMergeBtn').textContent = '統合する';
  });
}

function reloadAll(cb) {
  dbGetCustomers(function(custs) {
    allCustomers = custs;
    dbGetAppointments(function(appts) {
      allAppointments = appts;
      if (cb) cb();
    });
  });
}

function norm(s) { return (s || '').replace(/[\s\u3000\-\uFF0D\u30FC]/g, '').toLowerCase(); }

function renderCustList() {
  var q = document.getElementById('custSearch').value.trim().toLowerCase();
  var qp = document.getElementById('custSearchPhone').value.trim();
  var qe = document.getElementById('custSearchEmail').value.trim().toLowerCase();
  var custs = allCustomers.slice();
  if (sortMode === 'new') {
    custs.sort(function(a, b) { var ai = parseInt((a.id||'').replace('c',''))||0, bi = parseInt((b.id||'').replace('c',''))||0; return bi - ai; });
  } else {
    custs.sort(function(a, b) { var ai = parseInt((a.id||'').replace('c',''))||0, bi = parseInt((b.id||'').replace('c',''))||0; return ai - bi; });
  }
  var list = document.getElementById('custList');
  list.innerHTML = '';
  var found = false;
  for (var i = 0; i < custs.length; i++) {
    var c = custs[i];
    if (q && norm(c.name).indexOf(norm(q)) < 0) continue;
    if (qp && norm(c.phone).indexOf(norm(qp)) < 0) continue;
    if (qe && (c.email || '').toLowerCase().indexOf(qe) < 0) continue;
    found = true;
    var cnt = 0;
    for (var j = 0; j < allAppointments.length; j++) { if (allAppointments[j].customerId === c.id && allAppointments[j].status === 'active') cnt++; }
    var div = document.createElement('div');
    div.className = 'cust-item' + (currentCustId === c.id ? ' active' : '');
    div.innerHTML = '<div class="cust-avatar">' + c.name[0] + '</div><div class="cust-info"><div class="cust-name">' + c.name + '</div><div class="cust-sub">' + (cnt > 0 ? '予約 ' + cnt + '件' : c.phone) + '</div></div>';
    (function(id) { div.addEventListener('click', function() { selectCust(id); }); })(c.id);
    list.appendChild(div);
  }
  if (!found) list.innerHTML = '<div style="padding:16px;font-size:12px;color:var(--muted);text-align:center;">該当なし</div>';
}

function selectCust(id) {
  currentCustId = id;
  expandedVisitId = null;
  renderCustList();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('detailArea').style.display = 'flex';
  renderDetail();
}

function renderDetail() {
  var cust = null;
  for (var i = 0; i < allCustomers.length; i++) { if (allCustomers[i].id === currentCustId) { cust = allCustomers[i]; break; } }
  if (!cust) return;
  document.getElementById('detailName').textContent = cust.name;
  var total = 0, cnt = 0, pcnt = 0;
  for (var j = 0; j < allAppointments.length; j++) {
    var a = allAppointments[j];
    if (a.customerId !== currentCustId || a.status === 'cancelled') continue;
    cnt++;
    if (a.payment != null) { total += a.payment || 0; pcnt++; }
  }
  var avg = pcnt ? Math.round(total / pcnt) : 0;
  document.getElementById('statCount').textContent = cnt + '回';
  document.getElementById('statTotal').textContent = total > 0 ? '¥' + total.toLocaleString() : '—';
  document.getElementById('statAvg').textContent = avg > 0 ? '¥' + avg.toLocaleString() : '—';
  switchTab(currentTab);
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabMemo').classList.toggle('active', tab === 'memo');
  document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
  if (tab === 'memo') renderMemoTab(); else renderHistoryTab();
}

function renderMemoTab() {
  var cust = null;
  for (var i = 0; i < allCustomers.length; i++) { if (allCustomers[i].id === currentCustId) { cust = allCustomers[i]; break; } }
  if (!cust) return;
  var tc = document.getElementById('tabContent');
  tc.innerHTML = '';

  // スタンプカード
  dbGetStampCard(function(sc) {
    if (sc && sc.enabled) {
      var goal = sc.goal || 10;
      var stamps = cust.stamps || 0;
      var spDiv = document.createElement('div');
      spDiv.style.cssText = 'margin-bottom:14px;padding:12px 14px;background:var(--accent-light);border-radius:10px;border:1px solid rgba(181,132,90,.2);';
      spDiv.innerHTML = '<div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:8px;">🎫 スタンプカード</div>'
        + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
        + '<span style="font-size:13px;font-weight:600;">' + stamps + ' / ' + goal + ' 個</span>'
        + '<button id="stAddBtn" style="padding:5px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">＋ スタンプ付与</button>'
        + '<button id="stRemBtn" style="padding:5px 14px;background:none;color:var(--red);border:1px solid var(--red);border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;">－ 1個取消</button>'
        + '</div>';
      var addBtn = spDiv.querySelector('#stAddBtn');
      var remBtn = spDiv.querySelector('#stRemBtn');
      (function(cid) {
        addBtn.addEventListener('click', function() {
          dbAddStamp(cid, 1, function() { reloadAll(function() { renderDetail(); }); });
        });
        remBtn.addEventListener('click', function() {
          if (stamps <= 0) { alert('スタンプが0個です'); return; }
          dbUpdateCustomer(cid, { stamps: Math.max(0, stamps - 1) }, function() { reloadAll(function() { renderDetail(); }); });
        });
      })(currentCustId);
      tc.appendChild(spDiv);
    }

    var lbl = document.createElement('div'); lbl.className = 'slabel'; lbl.innerHTML = 'カルテメモ <span style="font-size:10px;color:var(--accent);">自動保存</span>';
    var ta = document.createElement('textarea'); ta.className = 'memo-ta'; ta.id = 'karteText'; ta.value = cust.karteNote || '';
    ta.addEventListener('input', onKarteInput);
    var saved = document.createElement('div'); saved.id = 'karteSaved'; saved.className = 'saved-msg';
    var sp = document.createElement('div'); sp.style.height = '12px';
    var lbl2 = document.createElement('div'); lbl2.className = 'slabel'; lbl2.textContent = '電話番号';
    var ph = document.createElement('div'); ph.style.cssText = 'font-size:13px;font-weight:600;margin-bottom:8px;'; ph.textContent = cust.phone;
    var lbl3 = document.createElement('div'); lbl3.className = 'slabel'; lbl3.textContent = 'メールアドレス';
    var em = document.createElement('div'); em.style.cssText = 'font-size:12px;color:var(--muted);'; em.textContent = cust.email;
    tc.appendChild(lbl); tc.appendChild(ta); tc.appendChild(saved); tc.appendChild(sp);
    tc.appendChild(lbl2); tc.appendChild(ph); tc.appendChild(lbl3); tc.appendChild(em);
  });
}

function onKarteInput() {
  clearTimeout(karteTimer);
  karteTimer = setTimeout(function() {
    var ta = document.getElementById('karteText');
    if (ta) {
      dbUpdateCustomer(currentCustId, { karteNote: ta.value }, function() {
        var msg = document.getElementById('karteSaved');
        if (msg) { msg.textContent = '保存しました'; setTimeout(function() { if (msg) msg.textContent = ''; }, 2000); }
        reloadAll(function() {});
      });
    }
  }, 800);
}

function renderHistoryTab() {
  var myAppts = [];
  for (var i = 0; i < allAppointments.length; i++) { if (allAppointments[i].customerId === currentCustId) myAppts.push(allAppointments[i]); }
  myAppts.sort(function(a, b) { return b.date.localeCompare(a.date); });
  var tc = document.getElementById('tabContent');
  if (!myAppts.length) { tc.innerHTML = '<div class="empty-state" style="padding:32px 0;">来店履歴がありません</div>'; return; }
  tc.innerHTML = '';
  for (var j = 0; j < myAppts.length; j++) {
    var a = myAppts[j];
    var p = a.date.split('-'), dow = DOWS[new Date(a.date).getDay()];
    var isOpen = expandedVisitId === a.id, isCan = a.status === 'cancelled';
    var bCls = isCan ? 'badge-cancel' : a.type === 'online' ? 'badge-online' : 'badge-manual';
    var bLbl = isCan ? 'キャンセル' : a.type === 'online' ? 'アプリ予約' : '手動登録';
    var payDisp = a.payment != null ? '¥' + a.payment.toLocaleString() : '未入力';
    var photos = visitPhotos[a.id] || [];
    var card = document.createElement('div'); card.className = 'visit-card'; card.id = 'vc_' + a.id;
    var hdr = document.createElement('div'); hdr.className = 'visit-header';
    hdr.innerHTML = '<div><div class="vh-date" style="' + (isCan ? 'text-decoration:line-through;color:var(--muted);' : '') + '">'
      + p[0] + '年' + p[1] + '月' + p[2] + '日（' + dow + '）' + a.start + '〜</div>'
      + '<div class="vh-menu">' + a.menu + '（' + a.durationMin + '分）</div></div>'
      + '<div class="vh-right"><span class="vh-pay" style="color:' + (isCan ? 'var(--red)' : 'var(--accent)') + ';">' + (isCan ? 'キャンセル' : payDisp) + '</span>'
      + '<span class="vh-badge ' + bCls + '">' + bLbl + '</span>'
      + '<span class="chevron ' + (isOpen ? 'open' : '') + '">▶</span></div>';
    (function(aid) { hdr.addEventListener('click', function() { toggleVisit(aid); }); })(a.id);
    var body = document.createElement('div'); body.className = 'visit-body' + (isOpen ? ' open' : ''); body.id = 'vb_' + a.id;
    var photoHtml = '';
    for (var pi = 0; pi < photos.length; pi++) {
      photoHtml += '<div class="mp-slot"><img class="mp-img" src="' + photos[pi].dataUrl + '"><button class="mp-del" data-aid="' + a.id + '" data-pi="' + pi + '">×</button></div>';
    }
    if (isCan) {
      body.innerHTML = '<div class="visit-memo-area"><div class="vm-label"><span>メモ</span><button class="camera-btn" data-vid="' + a.id + '">📷 写真・ライブラリ</button></div>'
        + '<textarea class="vm-ta" id="vm_' + a.id + '" data-vid="' + a.id + '">' + (a.visitMemo || '') + '</textarea>'
        + '<div class="vm-saved" id="vms_' + a.id + '"></div></div>'
        + (photos.length ? '<div class="memo-photos"><div class="mp-label">写真（' + photos.length + '枚）</div><div class="mp-grid">' + photoHtml + '</div></div>' : '');
    } else {
      body.innerHTML = '<div class="payment-row"><label>支払い金額</label>'
        + '<input class="pay-input" type="number" id="pay_' + a.id + '" value="' + (a.payment != null ? a.payment : '') + '" placeholder="0" min="0" step="100">'
        + '<span style="font-size:12px;color:var(--muted);">円</span>'
        + '<button class="pay-save" data-vid="' + a.id + '">保存</button></div>'
        + '<div style="font-size:10px;color:' + (a.payment != null ? 'var(--green)' : 'var(--muted)') + ';padding:2px 14px;" id="psaved_' + a.id + '">' + (a.payment != null ? '' : '未入力') + '</div>'
        + '<div class="visit-memo-area"><div class="vm-label"><span>この日のメモ</span><button class="camera-btn" data-vid="' + a.id + '">📷 写真・ライブラリ</button></div>'
        + '<textarea class="vm-ta" id="vm_' + a.id + '" data-vid="' + a.id + '" placeholder="施術内容・申し送りなど...">' + (a.visitMemo || '') + '</textarea>'
        + '<div class="vm-saved" id="vms_' + a.id + '"></div></div>'
        + (photos.length ? '<div class="memo-photos"><div class="mp-label">写真（' + photos.length + '枚）</div><div class="mp-grid">' + photoHtml + '</div></div>' : '<div class="memo-photos"><div class="mp-empty">📷 写真ボタンから追加できます</div></div>');
    }
    (function(aid, bd) {
      bd.querySelectorAll('.camera-btn').forEach(function(el) { el.addEventListener('click', function() { triggerCamera(el.getAttribute('data-vid')); }); });
      bd.querySelectorAll('.vm-ta').forEach(function(el) { el.addEventListener('input', function() { onVmInput(el.getAttribute('data-vid')); }); });
      bd.querySelectorAll('.pay-save').forEach(function(el) { el.addEventListener('click', function() { savePay(el.getAttribute('data-vid')); }); });
      bd.querySelectorAll('.mp-img').forEach(function(el) { el.addEventListener('click', function() { openImgModal(el.src); }); });
      bd.querySelectorAll('.mp-del').forEach(function(el) { el.addEventListener('click', function(e) { e.stopPropagation(); deletePhoto(el.getAttribute('data-aid'), parseInt(el.getAttribute('data-pi'))); }); });
    })(a.id, body);
    card.appendChild(hdr); card.appendChild(body); tc.appendChild(card);
  }
}

function toggleVisit(id) {
  expandedVisitId = expandedVisitId === id ? null : id;
  renderHistoryTab();
  if (expandedVisitId === id) { setTimeout(function() { var el = document.getElementById('vc_' + id); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 50); }
}

function savePay(id) {
  var el = document.getElementById('pay_' + id);
  var val = parseInt(el.value, 10);
  if (isNaN(val) || val < 0) { alert('正しい金額を入力してください'); return; }
  dbUpdateAppointment(id, { payment: val }, function() {
    var msg = document.getElementById('psaved_' + id);
    if (msg) { msg.textContent = '保存しました'; msg.style.color = 'var(--green)'; }
    reloadAll(function() { renderDetail(); });
  });
}

function onVmInput(id) {
  clearTimeout(memoTimers[id]);
  memoTimers[id] = setTimeout(function() {
    var ta = document.getElementById('vm_' + id), msg = document.getElementById('vms_' + id);
    if (ta) dbUpdateAppointment(id, { visitMemo: ta.value }, function() {
      if (msg) { msg.textContent = '保存しました'; setTimeout(function() { if (msg) msg.textContent = ''; }, 2000); }
      reloadAll(function() {});
    });
  }, 800);
}

function triggerCamera(visitId) { activeUploadVisitId = visitId; document.getElementById('cameraInput').value = ''; document.getElementById('cameraInput').click(); }
function handlePhoto(event) {
  var file = event.target.files[0]; if (!file) return;
  if (file.type.indexOf('image/') < 0) { alert('画像ファイルを選択してください'); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    var now = new Date(), time = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    var vid = activeUploadVisitId;
    if (vid) { if (!visitPhotos[vid]) visitPhotos[vid] = []; visitPhotos[vid].push({ dataUrl: e.target.result, time: time }); }
    renderHistoryTab();
  };
  reader.readAsDataURL(file);
}
function deletePhoto(visitId, idx) { if (visitPhotos[visitId]) visitPhotos[visitId].splice(idx, 1); renderHistoryTab(); }
function openImgModal(src) { document.getElementById('imgModalSrc').src = src; document.getElementById('imgModal').classList.add('show'); }
function closeImgModal() { document.getElementById('imgModal').classList.remove('show'); }

function openEdit() {
  var cust = null;
  for (var i = 0; i < allCustomers.length; i++) { if (allCustomers[i].id === currentCustId) { cust = allCustomers[i]; break; } }
  if (!cust) return;
  document.getElementById('eName').value = cust.name;
  document.getElementById('ePhone').value = cust.phone;
  document.getElementById('eEmail').value = cust.email;
  document.getElementById('editModal').classList.add('show');
}
function closeEdit() { document.getElementById('editModal').classList.remove('show'); }
function saveEdit() {
  var name = document.getElementById('eName').value.trim();
  var phone = document.getElementById('ePhone').value.trim();
  var email = document.getElementById('eEmail').value.trim();
  if (!name || !phone) { alert('名前と電話番号を入力してください'); return; }
  dbUpdateCustomer(currentCustId, { name: name, phone: phone, email: email }, function() {
    reloadAll(function() { closeEdit(); renderCustList(); renderDetail(); });
  });
}

function deleteCust() {
  var cust = null;
  for (var i = 0; i < allCustomers.length; i++) { if (allCustomers[i].id === currentCustId) { cust = allCustomers[i]; break; } }
  if (!cust) return;
  document.getElementById('delCustName').textContent = '「' + cust.name + '」のカルテを削除します';
  document.getElementById('delCustOv').style.display = 'flex';
}
function confirmDeleteCust() {
  var salonId = getCurrentSalonId();
  if (!salonId) return;
  var batch = window.db.batch();
  batch.delete(salonCol(salonId, 'customers').doc(currentCustId));
  // 予約も削除
  var apptIds = [];
  for (var i = 0; i < allAppointments.length; i++) {
    if (allAppointments[i].customerId === currentCustId) apptIds.push(allAppointments[i].id);
  }
  for (var j = 0; j < apptIds.length; j++) {
    batch.delete(salonCol(salonId, 'appointments').doc(apptIds[j]));
  }
  batch.commit().then(function() {
    document.getElementById('delCustOv').style.display = 'none';
    currentCustId = null;
    document.getElementById('detailArea').style.display = 'none';
    document.getElementById('emptyState').style.display = '';
    reloadAll(function() { renderCustList(); });
  });
}

function openAddCust() {
  document.getElementById('ncName').value = '';
  document.getElementById('ncPhone').value = '';
  document.getElementById('ncEmail').value = '';
  document.getElementById('addCustOv').style.display = 'flex';
}
function closeAddCust() { document.getElementById('addCustOv').style.display = 'none'; }
function saveAddCust() {
  var name = document.getElementById('ncName').value.trim();
  var phone = document.getElementById('ncPhone').value.trim();
  var email = document.getElementById('ncEmail').value.trim();
  if (!name) { alert('氏名を入力してください'); return; }
  if (!phone) { alert('電話番号を入力してください'); return; }
  var newCust = { id: 'c' + Date.now(), name: name, phone: phone, email: email, isLine: false, stamps: 0 };
  dbAddCustomer(newCust, function(err, c) {
    if (err) { alert('追加に失敗しました'); return; }
    closeAddCust();
    reloadAll(function() { renderCustList(); selectCust(c.id); });
  });
}

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById('sortNew').style.background = mode === 'new' ? 'var(--accent)' : 'none';
  document.getElementById('sortNew').style.color = mode === 'new' ? '#fff' : 'var(--muted)';
  document.getElementById('sortOld').style.background = mode === 'old' ? 'var(--accent)' : 'none';
  document.getElementById('sortOld').style.color = mode === 'old' ? '#fff' : 'var(--muted)';
  renderCustList();
}

onFbReady(function() {
  reloadAll(function() { renderCustList(); });

  document.getElementById('custSearch').addEventListener('input', renderCustList);
  document.getElementById('custSearchPhone').addEventListener('input', renderCustList);
  document.getElementById('custSearchEmail').addEventListener('input', renderCustList);
  document.getElementById('addCustBtn').addEventListener('click', openAddCust);
  document.getElementById('sortNew').addEventListener('click', function() { setSortMode('new'); });
  document.getElementById('sortOld').addEventListener('click', function() { setSortMode('old'); });
  document.getElementById('editBtn').addEventListener('click', openEdit);
  document.getElementById('deleteBtn').addEventListener('click', deleteCust);
  document.getElementById('closeEditBtn').addEventListener('click', closeEdit);
  document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
  document.getElementById('cancelDelCustBtn').addEventListener('click', function() { document.getElementById('delCustOv').style.display = 'none'; });
  document.getElementById('confirmDelCustBtn').addEventListener('click', confirmDeleteCust);
  document.getElementById('cancelAddCustBtn').addEventListener('click', closeAddCust);
  document.getElementById('saveAddCustBtn').addEventListener('click', saveAddCust);
  document.getElementById('closeImgBtn').addEventListener('click', closeImgModal);
  document.getElementById('imgModal').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeImgModal(); });
  document.getElementById('cameraInput').addEventListener('change', handlePhoto);
  document.getElementById('tabMemo').addEventListener('click', function() { switchTab('memo'); });
  document.getElementById('tabHistory').addEventListener('click', function() { switchTab('history'); });
  document.getElementById('mergeBtn').addEventListener('click', openMerge);
  document.getElementById('cancelMergeBtn').addEventListener('click', function() { document.getElementById('mergeOv').style.display = 'none'; });
  document.getElementById('confirmMergeBtn').addEventListener('click', doMerge);
  document.getElementById('mergeSearch').addEventListener('input', function() { renderMergeResults(this.value.trim()); });
  setupMergePickBtn('mergeNameSrc', 'mergeNameFree');
  setupMergePickBtn('mergeNameDst', 'mergeNameFree');
  setupMergePickBtn('mergePhoneSrc', 'mergePhoneFree');
  setupMergePickBtn('mergePhoneDst', 'mergePhoneFree');
  setupMergePickBtn('mergeEmailSrc', 'mergeEmailFree');
  setupMergePickBtn('mergeEmailDst', 'mergeEmailFree');
});
</script>
</body>
