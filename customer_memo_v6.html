<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧客メモ - Salon Manager</title>
<style>
  :root{--accent:#b5845a;--accent-light:#f5ede4;--surface:#f5f4f0;--border:rgba(0,0,0,0.12);--text:#1a1a18;--muted:#73726c;--green:#7b9e87;--green-light:#e8f2eb;--blue:#7a8fbf;--blue-light:#eaeefc;--red:#c47b7b;--red-light:#faeaea;--bg:#ffffff;color-scheme:light;}
  *{box-sizing:border-box;margin:0;padding:0;color-scheme:light;}
  body{font-family:'Georgia',serif;color:#1a1a18!important;background:#ffffff!important;}
  input,textarea,select{background:#ffffff!important;color:#1a1a18!important;}
  .layout{display:flex;height:100vh;min-height:600px;}
  .left-col{width:200px;min-width:160px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .cust-search{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface);}
  .cust-search input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;}
  .cust-list{overflow-y:auto;flex:1;}
  .cust-item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);}
  .cust-item:hover{background:var(--accent-light);}
  .cust-item.active{background:var(--accent-light);border-left:3px solid var(--accent);}
  .cust-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
  .cust-info .cust-name{font-size:13px;font-weight:600;}
  .cust-info .cust-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .right-col{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .right-header{padding:14px 20px 12px;border-bottom:1px solid var(--border);background:var(--surface);}
  .rh-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .rh-title{font-size:15px;font-weight:600;}
  .rh-edit-btn{padding:5px 12px;border:1px solid var(--accent);border-radius:6px;background:none;color:var(--accent);font-size:11px;cursor:pointer;font-family:inherit;}
  .rh-edit-btn:hover{background:var(--accent);color:#fff;}
  .stats-bar{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .stat-item{flex:1;padding:7px 8px;text-align:center;border-right:1px solid var(--border);}
  .stat-item:last-child{border-right:none;}
  .stat-num{font-size:16px;font-weight:600;color:var(--accent);display:block;}
  .stat-label{font-size:10px;color:var(--muted);display:block;}
  .tab-bar{display:flex;border-bottom:1px solid var(--border);}
  .tab-btn{flex:1;padding:10px;font-size:12px;background:none;border:none;cursor:pointer;color:var(--muted);font-family:inherit;border-bottom:2px solid transparent;}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
  .tab-content{flex:1;overflow-y:auto;padding:16px 20px;}
  .slabel{font-size:10px;letter-spacing:.1em;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
  .memo-ta{width:100%;min-height:80px;padding:9px;border:1px solid var(--border);border-radius:8px;font-size:13px;line-height:1.6;resize:vertical;font-family:inherit;}
  .memo-ta:focus{outline:none;border-color:var(--accent);}
  .saved-msg{font-size:11px;color:var(--green);height:16px;margin-top:3px;}
  .visit-card{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
  .visit-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;user-select:none;}
  .visit-header:hover{background:var(--accent-light);}
  .vh-date{font-size:13px;font-weight:600;}
  .vh-menu{font-size:11px;color:var(--muted);margin-top:2px;}
  .vh-right{display:flex;align-items:center;gap:4px;flex-shrink:0;}
  .vh-pay{font-size:11px;font-weight:600;color:var(--accent);white-space:nowrap;}
  .vh-badge{font-size:9px;padding:2px 5px;border-radius:20px;font-weight:600;white-space:nowrap;}
  .badge-online{background:var(--green-light);color:#2e5c3a;}
  .badge-manual{background:var(--blue-light);color:#2c3a66;}
  .badge-cancel{background:var(--red-light);color:#7a2020;}
  .chevron{font-size:11px;color:var(--muted);transition:transform .2s;}
  .chevron.open{transform:rotate(90deg);}
  .visit-body{display:none;border-top:1px solid var(--border);}
  .visit-body.open{display:block;}
  .payment-row{display:flex;align-items:center;gap:4px;padding:10px 14px;background:var(--surface);flex-wrap:wrap;}
  .payment-row label{font-size:11px;color:var(--muted);white-space:nowrap;}
  .pay-input{width:80px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:right;font-family:inherit;}
  .pay-save{padding:5px 8px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
  .visit-memo-area{padding:10px 14px;}
  .vm-label{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
  .camera-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;}
  .vm-ta{width:100%;min-height:64px;padding:9px;border:1px solid var(--border);border-radius:7px;font-size:12px;line-height:1.6;resize:vertical;font-family:inherit;}
  .vm-ta:focus{outline:none;border-color:var(--accent);}
  .vm-saved{font-size:10px;color:var(--green);height:14px;margin-top:3px;}
  .memo-photos{padding:0 14px 10px;}
  .mp-label{font-size:10px;color:var(--muted);letter-spacing:.08em;margin-bottom:6px;}
  .mp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
  .mp-slot{aspect-ratio:1;border-radius:5px;overflow:hidden;border:1px solid var(--border);position:relative;background:var(--surface);}
  .mp-slot img{width:100%;height:100%;object-fit:cover;display:block;cursor:pointer;}
  .mp-del{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(196,123,123,.9);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .mp-empty{font-size:11px;color:var(--muted);padding:8px 0;text-align:center;}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50;align-items:center;justify-content:center;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:22px;width:320px;}
  .modal h3{font-size:14px;margin-bottom:14px;}
  .modal label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;margin-top:10px;}
  .modal input{width:100%;padding:7px 9px;border-radius:6px;border:1px solid var(--border);font-size:13px;font-family:inherit;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .mbt{flex:1;padding:7px;border-radius:7px;font-size:12px;border:1px solid var(--border);cursor:pointer;background:none;font-family:inherit;}
  .mbt.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .empty-state{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px;}
  .img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;}
  .img-modal.show{display:flex;}
  .img-modal img{max-width:90%;max-height:90%;border-radius:8px;}
  .img-modal-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;background:none;border:none;}
  .hidden-input{display:none;}
  .nav-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s;border-left:3px solid transparent;text-decoration:none;border-bottom:1px solid var(--border);}
  .nav-item:hover{background:var(--accent-light);color:var(--accent);}
</style>
</head>
<body>
<div class="layout">
  <div class="left-col">
    <div style="padding:8px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--accent);">Salon Manager</div>
    <a class="nav-item" href="salon_auth_v2.html" style="font-size:11px;">🏠 ダッシュボード</a>
    <a class="nav-item" href="salon_calendar_v7.html" style="font-size:11px;">📅 カレンダー</a>
    <a class="nav-item active" style="font-size:11px;">👤 顧客管理</a>
    <a class="nav-item" href="menu_settings_v3.html" style="font-size:11px;">✦ メニュー</a>
    <a class="nav-item" href="business_hours_v6.html" style="font-size:11px;">🕐 営業時間</a>
    <a class="nav-item" href="cancel_policy_v3.html" style="font-size:11px;">📋 キャンセル</a>
    <a class="nav-item" href="stamp_settings.html" style="font-size:11px;">🎫 スタンプ</a>
    <div style="border-top:1px solid var(--border);margin:4px 0;"></div>
    <div style="padding:10px 12px;border-bottom:1px solid var(--border);">
      <button onclick="openAddCust()" style="width:100%;padding:7px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">＋ 新規顧客を追加</button>
    </div>
    <div style="padding:6px 8px;border-bottom:1px solid var(--border);display:flex;gap:4px;">
      <button onclick="setSortMode('name')" id="sortName" style="flex:1;padding:4px 2px;font-size:10px;border:1px solid var(--border);border-radius:5px;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;">あいうえお</button>
      <button onclick="setSortMode('new')" id="sortNew" style="flex:1;padding:4px 2px;font-size:10px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--muted);cursor:pointer;font-family:inherit;">新しい順</button>
      <button onclick="setSortMode('old')" id="sortOld" style="flex:1;padding:4px 2px;font-size:10px;border:1px solid var(--border);border-radius:5px;background:none;color:var(--muted);cursor:pointer;font-family:inherit;">古い順</button>
    </div>
    <div class="cust-search">
      <input type="text" id="custSearch" placeholder="顧客名で検索..." oninput="renderCustList()">
    </div>
    <div class="cust-list" id="custList"></div>
  </div>
  <div class="right-col">
    <div id="emptyState" class="empty-state">← 顧客を選択してください</div>
    <div id="detailArea" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
      <div class="right-header">
        <div class="rh-top">
          <div class="rh-title" id="detailName"></div>
          <div style="display:flex;gap:6px;">
            <button class="rh-edit-btn" onclick="openEdit()">情報を編集</button>
            <button class="rh-edit-btn" onclick="openMerge()" style="border-color:var(--blue);color:var(--blue);">統合</button>
            <button class="rh-edit-btn" onclick="deleteCust()" style="border-color:var(--red);color:var(--red);">削除</button>
          </div>
        </div>
        <div class="stats-bar">
          <div class="stat-item"><span class="stat-num" id="statCount">0</span><span class="stat-label">来店回数</span></div>
          <div class="stat-item"><span class="stat-num" id="statTotal">—</span><span class="stat-label">累計支払い</span></div>
          <div class="stat-item"><span class="stat-num" id="statAvg">—</span><span class="stat-label">平均単価</span></div>
        </div>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" id="tabMemo" onclick="switchTab('memo')">カルテメモ</button>
        <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">来店履歴</button>
      </div>
      <div class="tab-content" id="tabContent"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>顧客情報を編集</h3>
    <label>お名前</label><input type="text" id="eName">
    <label>電話番号</label><input type="text" id="ePhone">
    <label>メールアドレス</label><input type="text" id="eEmail">
    <div class="modal-actions">
      <button class="mbt" onclick="closeEdit()">キャンセル</button>
      <button class="mbt primary" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<div class="img-modal" id="imgModal">
  <button class="img-modal-close" onclick="closeImgModal()">×</button>
  <img id="imgModalSrc" src="" alt="">
</div>

<input type="file" accept="image/*" class="hidden-input" id="cameraInput" onchange="handlePhoto(event)">

<script>
var SK='salon_db';
var DDB={salon:{id:null,name:'',email:''},settings:{openTime:'10:00',closeTime:'19:00',intervalMin:30,slotMin:30,closedDows:[2],weeklyClose:[]},menus:[{id:'m1',name:'フェイシャルトリートメント',duration:90,price:12000,type:'main',public:true},{id:'m2',name:'ボディケア',duration:60,price:8000,type:'main',public:true},{id:'m3',name:'フェイシャル＋アイ',duration:120,price:16000,type:'main',public:true}],customers:[{id:'c1',name:'山田 花子',phone:'090-1234-5678',email:'hanako_demo',isLine:false,stamps:0},{id:'c2',name:'田中 美咲',phone:'090-2222-3333',email:'misaki_demo',isLine:false,stamps:0}],appointments:[{id:'a1',customerId:'c2',name:'田中 美咲',date:'2026-04-02',start:'11:00',durationMin:120,intervalMin:30,menu:'フェイシャル＋アイ',status:'active'},{id:'a2',customerId:'c1',name:'山田 花子',date:'2026-04-03',start:'14:00',durationMin:90,intervalMin:30,menu:'フェイシャルトリートメント',status:'active'},{id:'a3',customerId:'c1',name:'山田 花子',date:'2026-04-04',start:'10:00',durationMin:60,intervalMin:20,menu:'ボディケア',status:'active'}],closeBlocks:[],cancelPolicy:{text:'',rates:[]}};

function dbLoad(){var r=localStorage.getItem(SK);if(!r){localStorage.setItem(SK,JSON.stringify(DDB));return JSON.parse(JSON.stringify(DDB));}var s=JSON.parse(r);return{salon:Object.assign({},DDB.salon,s.salon||{}),settings:Object.assign({},DDB.settings,s.settings||{}),menus:s.menus||DDB.menus,customers:s.customers||JSON.parse(JSON.stringify(DDB.customers)),appointments:s.appointments||DDB.appointments,closeBlocks:s.closeBlocks||[],cancelPolicy:s.cancelPolicy||DDB.cancelPolicy,stampCard:Object.assign({},{enabled:true,goal:10,reward:'',bonusStamps:[],color:'#b5845a'},s.stampCard||{})};}
function dbSave(db){localStorage.setItem(SK,JSON.stringify(db));}
function dbGetCustomers(){return dbLoad().customers;}
function dbUpdateCustomer(id,ch){var db=dbLoad();for(var i=0;i<db.customers.length;i++){if(db.customers[i].id===id){db.customers[i]=Object.assign({},db.customers[i],ch);dbSave(db);return;}}
}
function dbGetAppointments(){return dbLoad().appointments;}
function dbUpdateAppointment(id,ch){var db=dbLoad();for(var i=0;i<db.appointments.length;i++){if(db.appointments[i].id===id){db.appointments[i]=Object.assign({},db.appointments[i],ch);dbSave(db);return;}}
}

var currentCustId=null,currentTab='memo',expandedVisitId=null,activeUploadVisitId=null,memoTimers={},visitPhotos={},karteTimer=null;
var DOWS=['日','月','火','水','木','金','土'];

function renderCustList(){
  var q=document.getElementById('custSearch').value.trim().toLowerCase();
  var custs=dbGetCustomers().slice(),appts=dbGetAppointments();
  // 並び替え
  if(sortMode==='name'){
    custs.sort(function(a,b){return a.name.localeCompare(b.name,'ja');});
  } else if(sortMode==='new'){
    custs.sort(function(a,b){
      var ai=a.id||'';var bi=b.id||'';
      return bi.localeCompare(ai);
    });
  } else {
    custs.sort(function(a,b){
      var ai=a.id||'';var bi=b.id||'';
      return ai.localeCompare(bi);
    });
  }
  var list=document.getElementById('custList');
  list.innerHTML='';
  var found=false;
  for(var i=0;i<custs.length;i++){
    var c=custs[i];
    if(q&&c.name.toLowerCase().indexOf(q)<0)continue;
    found=true;
    var cnt=0;for(var j=0;j<appts.length;j++){if(appts[j].customerId===c.id&&appts[j].status==='active')cnt++;}
    var div=document.createElement('div');
    div.className='cust-item'+(currentCustId===c.id?' active':'');
    div.innerHTML='<div class="cust-avatar">'+c.name[0]+'</div><div class="cust-info"><div class="cust-name">'+c.name+'</div><div class="cust-sub">'+(cnt>0?'予約 '+cnt+'件':c.phone)+'</div></div>';
    (function(id){div.addEventListener('click',function(){selectCust(id);});})(c.id);
    list.appendChild(div);
  }
  if(!found)list.innerHTML='<div style="padding:16px;font-size:12px;color:var(--muted);text-align:center;">該当なし</div>';
}

function selectCust(id){
  currentCustId=id;expandedVisitId=null;renderCustList();
  document.getElementById('emptyState').style.display='none';
  document.getElementById('detailArea').style.display='flex';
  renderDetail();
}

function renderDetail(){
  var custs=dbGetCustomers(),cust=null;
  for(var i=0;i<custs.length;i++){if(custs[i].id===currentCustId){cust=custs[i];break;}}
  if(!cust)return;
  document.getElementById('detailName').textContent=cust.name;
  var appts=dbGetAppointments(),total=0,cnt=0,pcnt=0;
  for(var j=0;j<appts.length;j++){
    var a=appts[j];
    if(a.customerId!==currentCustId||a.status==='cancelled')continue;
    cnt++;
    if(a.payment!=null){total+=a.payment||0;pcnt++;}
  }
  var avg=pcnt?Math.round(total/pcnt):0;
  document.getElementById('statCount').textContent=cnt+'回';
  document.getElementById('statTotal').textContent=total>0?'¥'+total.toLocaleString():'—';
  document.getElementById('statAvg').textContent=avg>0?'¥'+avg.toLocaleString():'—';
  switchTab(currentTab);
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabMemo').classList.toggle('active',tab==='memo');
  document.getElementById('tabHistory').classList.toggle('active',tab==='history');
  if(tab==='memo')renderMemoTab();else renderHistoryTab();
}

function renderMemoTab(){
  var custs=dbGetCustomers(),cust=null;
  for(var i=0;i<custs.length;i++){if(custs[i].id===currentCustId){cust=custs[i];break;}}
  if(!cust)return;
  var tc=document.getElementById('tabContent');
  tc.innerHTML='';
  var lbl=document.createElement('div');lbl.className='slabel';lbl.innerHTML='カルテメモ <span style="font-size:10px;color:var(--accent);">自動保存</span>';
  var ta=document.createElement('textarea');ta.className='memo-ta';ta.id='karteText';ta.value=cust.karteNote||'';
  ta.addEventListener('input',onKarteInput);
  var saved=document.createElement('div');saved.id='karteSaved';saved.className='saved-msg';
  var sp=document.createElement('div');sp.style.height='12px';
  var lbl2=document.createElement('div');lbl2.className='slabel';lbl2.textContent='電話番号';
  var ph=document.createElement('div');ph.style.cssText='font-size:13px;font-weight:600;margin-bottom:8px;';ph.textContent=cust.phone;
  var lbl3=document.createElement('div');lbl3.className='slabel';lbl3.textContent='メールアドレス';
  var em=document.createElement('div');em.style.cssText='font-size:12px;color:var(--muted);';em.textContent=cust.email;
  // スタンプ付与セクション
  var sc=dbLoad().stampCard;
  if(sc&&sc.enabled){
    var goal=sc.goal||10;
    var custs2=dbGetCustomers(),cust2=null;
    for(var si=0;si<custs2.length;si++){if(custs2[si].id===currentCustId){cust2=custs2[si];break;}}
    var stamps=cust2?(cust2.stamps||0):0;
    var cycles=cust2?(cust2.cycles||0):0;
    var spDiv=document.createElement('div');
    spDiv.style.cssText='margin-top:14px;padding:12px 14px;background:var(--accent-light);border-radius:10px;border:1px solid rgba(181,132,90,.2);';
    var cycleLabel=cycles>0?'（現在'+(cycles+1)+'枚目のカード）':'';
    spDiv.innerHTML='<div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:8px;">🎫 スタンプカード'+cycleLabel+'</div>'
      +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
      +'<span style="font-size:13px;font-weight:600;">'+stamps+' / '+goal+' 個</span>'
      +'<button id="stAddBtn" style="padding:5px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">＋ スタンプ付与</button>'
      +'<button id="stRemBtn" style="padding:5px 14px;background:none;color:var(--red);border:1px solid var(--red);border-radius:7px;font-size:12px;cursor:pointer;font-family:inherit;">－ 1個取消</button>'
      +'</div>'
      +'<div id="stLog" style="margin-top:8px;font-size:11px;color:var(--muted);max-height:80px;overflow-y:auto;"></div>';
    // スタンプ履歴表示
    var log=cust2&&cust2.stampLog?cust2.stampLog:[];
    var logEl=spDiv.querySelector('#stLog');
    if(log.length){
      var logHtml='';
      for(var li=log.length-1;li>=Math.max(0,log.length-5);li--){
        var le=log[li];
        logHtml+='<div>'+le.date+' '+le.action+'</div>';
      }
      logEl.innerHTML=logHtml;
    }
    var addBtn=spDiv.querySelector('#stAddBtn');
    var remBtn=spDiv.querySelector('#stRemBtn');
    (function(cid){
      addBtn.addEventListener('click',function(){addStampFromMemo(cid);});

    })(currentCustId);
    tc.appendChild(spDiv);
  }
  tc.appendChild(lbl);tc.appendChild(ta);tc.appendChild(saved);tc.appendChild(sp);tc.appendChild(lbl2);tc.appendChild(ph);tc.appendChild(lbl3);tc.appendChild(em);
}

        +'<div style="font-size:10px;color:'+(a.payment!=null?'var(--green)':'var(--muted)')+';padding:2px 14px;" id="psaved_'+a.id+'">'+(a.payment!=null?'':'未入力')+'</div>'

function triggerCamera(visitId){activeUploadVisitId=visitId;document.getElementById('cameraInput').value='';document.getElementById('cameraInput').click();}
function handlePhoto(event){
  var file=event.target.files[0];if(!file)return;
  // ファイルタイプチェック
  if(file.type.indexOf('image/')<0){alert('画像ファイルを選択してください');return;}
  var reader=new FileReader();
  reader.onerror=function(){alert('画像の読み込みに失敗しました。別の画像をお試しください。');};
  reader.onload=function(e){
    if(!e.target.result){alert('画像データが空です');return;}
    var now=new Date(),time=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    var vid=activeUploadVisitId;
    if(vid){if(!visitPhotos[vid])visitPhotos[vid]=[];visitPhotos[vid].push({dataUrl:e.target.result,time:time});}
    renderHistoryTab();
  };
  reader.readAsDataURL(file);
}
function deletePhoto(visitId,idx){if(visitPhotos[visitId])visitPhotos[visitId].splice(idx,1);renderHistoryTab();}

// ===== スタンプ付与（カルテから） =====
function addStampFromMemo(custId){
  var db=dbLoad();
  var sc=db.stampCard||{goal:10};
  var goal=sc.goal||10;
  var cust=null;
  for(var i=0;i<db.customers.length;i++){if(db.customers[i].id===custId){cust=db.customers[i];break;}}
  if(!cust)return;
  cust.stamps=(cust.stamps||0)+1;
  var now=new Date();
  var dateStr=(now.getMonth()+1)+'/'+(now.getDate())+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  if(!cust.stampLog)cust.stampLog=[];
  if(cust.stamps>=goal){
    cust.cycles=(cust.cycles||0)+1;
    cust.stamps=0;
    cust.stampLog.push({date:dateStr,action:'スタンプ付与 → 満了！'+(cust.cycles+1)+'枚目のカードへ'});
  } else {
    cust.stampLog.push({date:dateStr,action:'スタンプ付与（'+cust.stamps+'/'+goal+'個）'});
  }
  dbSave(db);
  switchTab('memo');
}
function removeStampFromMemo(custId){
  var db=dbLoad();
  var sc=db.stampCard||{goal:10};
  var goal=sc.goal||10;
  var cust=null;
  for(var i=0;i<db.customers.length;i++){if(db.customers[i].id===custId){cust=db.customers[i];break;}}
  if(!cust||!cust.stamps){alert('スタンプが0個です');return;}
  cust.stamps=(cust.stamps||0)-1;
  var now=new Date();
  var dateStr=(now.getMonth()+1)+'/'+(now.getDate())+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  if(!cust.stampLog)cust.stampLog=[];
  cust.stampLog.push({date:dateStr,action:'スタンプ取消（'+cust.stamps+'/'+goal+'個）'});
  dbSave(db);
  switchTab('memo');
}

// ===== 顧客統合 =====
function openMerge(){
  var custs=dbGetCustomers(),cust=null;
  for(var i=0;i<custs.length;i++){if(custs[i].id===currentCustId){cust=custs[i];break;}}
  if(!cust)return;
  // 統合先リスト（自分以外）
  var sel=document.getElementById('mergeTarget');
  sel.innerHTML='';
  for(var j=0;j<custs.length;j++){
    if(custs[j].id===currentCustId)continue;
    var opt=document.createElement('option');
    opt.value=custs[j].id;
    opt.textContent=custs[j].name+' ('+custs[j].phone+')';
    sel.appendChild(opt);
  }
  if(!sel.options.length){alert('統合できる他の顧客がいません');return;}
  updateMergeFields();
  sel.addEventListener('change',updateMergeFields);
  document.getElementById('mergeOv').style.display='block';
}
function updateMergeFields(){
  var custs=dbGetCustomers(),cust=null,target=null;
  var targetId=document.getElementById('mergeTarget').value;
  for(var i=0;i<custs.length;i++){
    if(custs[i].id===currentCustId)cust=custs[i];
    if(custs[i].id===targetId)target=custs[i];
  }
  if(!cust||!target)return;
  // 氏名ボタン
  function makeBtns(containerId,inputId,v1,v2,label1,label2){
    var c=document.getElementById(containerId);
    c.innerHTML='';
    var b1=document.createElement('button');
    b1.textContent=label1+': '+v1;
    b1.style.cssText='padding:4px 8px;font-size:11px;border:1px solid var(--accent);border-radius:6px;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;';
    b1.onclick=function(){document.getElementById(inputId).value=v1;};
    var b2=document.createElement('button');
    b2.textContent=label2+': '+v2;
    b2.style.cssText='padding:4px 8px;font-size:11px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;font-family:inherit;';
    b2.onclick=function(){document.getElementById(inputId).value=v2;};
    c.appendChild(b1);c.appendChild(b2);
    document.getElementById(inputId).value=v1;
  }
  makeBtns('mergeNameBtns','mergeName',cust.name,target.name,'現在','統合先');
  makeBtns('mergePhoneBtns','mergePhone',cust.phone,target.phone,'現在','統合先');
  makeBtns('mergeEmailBtns','mergeEmail',cust.email||'',target.email||'','現在','統合先');
}
function confirmMerge(){
  var name=document.getElementById('mergeName').value.trim();
  var phone=document.getElementById('mergePhone').value.trim();
  var email=document.getElementById('mergeEmail').value.trim();
  var targetId=document.getElementById('mergeTarget').value;
  if(!name||!phone){alert('氏名と電話番号を入力してください');return;}
  if(!confirm('統合します。元に戻せません。よろしいですか？'))return;
  var db=dbLoad();
  // 統合先の予約を現在のIDに移行
  for(var i=0;i<db.appointments.length;i++){
    if(db.appointments[i].customerId===targetId){
      db.appointments[i].customerId=currentCustId;
      db.appointments[i].name=name;
    }
  }
  // 現在の顧客情報を更新（スタンプも合算）
  var currentCust=null,targetCust=null;
  for(var j=0;j<db.customers.length;j++){
    if(db.customers[j].id===currentCustId)currentCust=db.customers[j];
    if(db.customers[j].id===targetId)targetCust=db.customers[j];
  }
  if(currentCust&&targetCust){
    currentCust.name=name;
    currentCust.phone=phone;
    currentCust.email=email;
    currentCust.stamps=(currentCust.stamps||0)+(targetCust.stamps||0);
    currentCust.cycles=(currentCust.cycles||0)+(targetCust.cycles||0);
    // カルテメモを結合
    var memo1=currentCust.karteNote||'';
    var memo2=targetCust.karteNote||'';
    if(memo1&&memo2)currentCust.karteNote=memo1+'\n\n---統合前メモ---\n'+memo2;
    else if(memo2)currentCust.karteNote=memo2;
    // スタンプ履歴も結合
    var log1=currentCust.stampLog||[];
    var log2=targetCust.stampLog||[];
    currentCust.stampLog=log1.concat(log2);
  }
  // 統合元を削除
  db.customers=db.customers.filter(function(c){return c.id!==targetId;});
  dbSave(db);
  document.getElementById('mergeOv').style.display='none';
  renderCustList();
  renderDetail();
}

}

    <div style="display:flex;gap:10px;">
      <button onclick="document.getElementById('mergeOv').style.display='none'" style="flex:1;padding:12px;border-radius:10px;border:1.5px solid rgba(0,0,0,.12);background:none;font-size:14px;font-family:inherit;cursor:pointer;">キャンセル</button>
      <button onclick="confirmMerge()" style="flex:1;padding:12px;border-radius:10px;border:none;background:#7a8fbf;color:#fff;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;">統合する</button>
    </div>
  </div>
</div>

<!-- 顧客追加モーダル -->
<div id="addCustOv" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#fff;border-radius:14px;padding:24px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.15);">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;">新規顧客を追加</h3>
    <div style="margin-bottom:10px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">氏名 <span style="color:#c47b7b;">必須</span></label>
      <input type="text" id="ncName" placeholder="例：山田 花子" style="width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,.12);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a18;">
    </div>
    <div style="margin-bottom:10px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">電話番号 <span style="color:#c47b7b;">必須</span></label>
      <input type="tel" id="ncPhone" placeholder="例：090-1234-5678" style="width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,.12);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a18;">
    </div>
    <div style="margin-bottom:16px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">メールアドレス <span style="font-weight:400;color:#aaa;">任意</span></label>
      <input type="email" id="ncEmail" placeholder="例：hanako@example.com" style="width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,.12);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;color:#1a1a18;">
    </div>
    <div style="display:flex;gap:10px;">
      <button onclick="closeAddCust()" style="flex:1;padding:12px;border-radius:10px;border:1.5px solid rgba(0,0,0,.12);background:none;font-size:14px;font-family:inherit;cursor:pointer;color:#73726c;">キャンセル</button>
      <button onclick="saveAddCust()" style="flex:1;padding:12px;border-radius:10px;border:none;background:#b5845a;color:#fff;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;">追加する</button>
    </div>
  </div>
</div>
</body>
</html>
