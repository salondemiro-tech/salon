<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TORITA - シフト管理</title>
<!--
  salon_shift_v1.html  -  TORITA Phase I-step5
  作成: 2026/6/19
  設計:
    - 週単位でシフトを管理（今週・来週・再来週）
    - 各日付ごとに出勤スタッフをチェックして保存
    - 未登録の日 = 全員オフ（予約不可）
    - シフトドキュメントID = YYYY-MM-DD（日付ごとに1ドキュメント）
  DB: salons/{salonId}/shifts/{dateKey}
    フィールド: date(YYYY-MM-DD), staffIds([]), updatedAt
-->
<style>
  :root{
    --ac:#b5845a; --al:#f5ede4; --ad:#7a5535;
    --sf:#f8f7f4; --s2:#f0ede8;
    --bd:rgba(0,0,0,.10); --tx:#1a1a18; --mu:#73726c;
    --gn:#7b9e87; --gl:#eef3ef;
    --rd:#c47b7b; --rl:#faeaea;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Georgia','Hiragino Mincho ProN',serif;
    background:var(--s2); color:var(--tx);
    -webkit-text-size-adjust:100%; min-height:100vh;
  }
  .topbar{
    background:#fff; border-bottom:1px solid var(--bd);
    padding:12px 20px;
    display:flex; align-items:center; gap:12px;
    position:sticky; top:0; z-index:10;
  }
  .back-btn{
    background:none; border:none; font-size:20px;
    cursor:pointer; padding:4px 6px; color:var(--ac); line-height:1;
  }
  .page-title{ font-size:16px; font-weight:600; color:var(--ad); flex:1; }

  .wrap{max-width:640px; margin:0 auto; padding:18px 16px 60px;}

  /* 週ナビ */
  .week-nav{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px; gap:10px;
  }
  .week-label{
    font-size:14px; font-weight:600; color:var(--ad); text-align:center; flex:1;
  }
  .nav-btn{
    background:#fff; border:1.5px solid var(--bd);
    border-radius:9px; padding:8px 14px;
    font-size:13px; cursor:pointer; font-family:inherit; color:var(--mu);
    white-space:nowrap;
  }
  .nav-btn:hover{ border-color:var(--ac); color:var(--ac); }
  .nav-btn:disabled{ opacity:.4; cursor:default; }

  /* 日付カード */
  .day-list{ display:flex; flex-direction:column; gap:10px; }

  .day-card{
    background:#fff; border-radius:14px;
    border:1px solid var(--bd);
    overflow:hidden;
  }
  .day-card.today{ border-color:var(--ac); }
  .day-card.past{ opacity:.6; }

  .day-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px;
    border-bottom:1px solid var(--bd);
    cursor:pointer;
    user-select:none;
  }
  .day-header:hover{ background:var(--sf); }
  .day-card.today .day-header{ background:var(--al); }

  .day-date{
    font-size:15px; font-weight:600; color:var(--ad);
  }
  .day-card.today .day-date{ color:var(--ac); }
  .day-dow{
    font-size:12px; color:var(--mu); margin-left:8px;
  }
  .day-dow.sat{ color:#5a7eb5; }
  .day-dow.sun{ color:var(--rd); }

  .day-status{
    font-size:12px; padding:3px 10px; border-radius:10px;
    font-weight:600;
  }
  .day-status.on{ background:var(--gl); color:var(--gn); }
  .day-status.off{ background:var(--s2); color:var(--mu); }

  .day-body{ padding:14px 16px; }

  /* スタッフチェックリスト */
  .staff-checks{ display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
  .staff-check-item{
    display:flex; align-items:center; gap:10px;
    cursor:pointer;
  }
  .staff-check-item input[type=checkbox]{
    width:18px; height:18px; accent-color:var(--ac);
    flex-shrink:0; cursor:pointer;
  }
  .staff-color-dot{
    width:12px; height:12px; border-radius:50%; flex-shrink:0;
  }
  .staff-check-name{ font-size:14px; color:var(--tx); }

  .save-btn{
    width:100%; padding:11px;
    background:var(--ac); color:#fff;
    border:none; border-radius:10px;
    font-size:14px; font-weight:600;
    cursor:pointer; font-family:inherit;
  }
  .save-btn:active{ opacity:.85; }
  .save-btn:disabled{ opacity:.5; cursor:default; }

  .no-staff{
    font-size:13px; color:var(--mu); text-align:center; padding:8px 0;
  }

  /* 折りたたみ状態 */
  .day-body{ display:none; }
  .day-body.open{ display:block; }

  /* 今日マーク */
  .today-mark{
    display:inline-block;
    background:var(--ac); color:#fff;
    font-size:10px; padding:1px 6px; border-radius:6px;
    margin-left:6px; vertical-align:middle;
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">&#8592;</button>
  <div class="page-title">シフト管理</div>
</div>

<div class="wrap">
  <div class="week-nav">
    <button class="nav-btn" id="prevBtn" onclick="changeWeek(-1)">&#8592; 前の週</button>
    <div class="week-label" id="weekLabel"></div>
    <button class="nav-btn" id="nextBtn" onclick="changeWeek(1)">次の週 &#8594;</button>
  </div>
  <div class="day-list" id="dayList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="shared_db.js"></script>
<script src="shared_auth.js"></script>
<script src="shared_ui.js"></script>

<script>
(function () {

  var DOW_LABELS = ['日', '月', '火', '水', '木', '金', '土'];
  var WEEK_OFFSET = 0; // 0=今週, 1=来週, 2=再来週 ...
  var MAX_FUTURE_WEEKS = 4;

  var _salonId   = null;
  var _staffList = []; // [{id, name, color}]
  var _shiftMap  = {}; // { 'YYYY-MM-DD': [staffId, ...] }
  var _today     = toDateKey(new Date());

  /* ===== 起動 ===== */
  onFbReady(function () {
    requireSalonStaff(function (isStaff) {
      if (!isStaff) { window.location.href = 'salon_auth_v2_new.html'; return; }
      var user = firebase.auth().currentUser;
      _salonId = user ? user.uid : null;
      if (!_salonId) { window.location.href = 'salon_auth_v2_new.html'; return; }
      loadStaffThenRender();
    });
  });

  /* ===== スタッフ読み込み → 週表示 ===== */
  function loadStaffThenRender() {
    uiShowLoading('読み込み中...');
    firebase.firestore()
      .collection('salons').doc(_salonId)
      .collection('staffs').orderBy('name', 'asc').get()
      .then(function (snap) {
        _staffList = [];
        snap.forEach(function (doc) {
          if (doc.id === 'owner') { return; }
          var d = doc.data();
          _staffList.push({ id: doc.id, name: d.name || doc.id, color: d.color || '#ccc' });
        });
        return loadWeekShifts();
      })
      .catch(function (e) {
        uiForceHideLoading();
        uiToast('読み込みに失敗しました: ' + e.message);
      });
  }

  /* ===== 週のシフトを読み込む ===== */
  function loadWeekShifts() {
    var days = getWeekDays(WEEK_OFFSET);
    var startKey = days[0];
    var endKey   = days[6];

    return firebase.firestore()
      .collection('salons').doc(_salonId)
      .collection('shifts')
      .where('date', '>=', startKey)
      .where('date', '<=', endKey)
      .get()
      .then(function (snap) {
        uiForceHideLoading();
        _shiftMap = {};
        snap.forEach(function (doc) {
          var d = doc.data();
          _shiftMap[d.date] = d.staffIds || [];
        });
        renderWeek(days);
      });
  }

  /* ===== 週描画 ===== */
  function renderWeek(days) {
    var label = document.getElementById('weekLabel');
    label.textContent = days[0] + ' 〜 ' + days[6];

    document.getElementById('prevBtn').disabled = (WEEK_OFFSET <= 0);
    document.getElementById('nextBtn').disabled = (WEEK_OFFSET >= MAX_FUTURE_WEEKS);

    var list = document.getElementById('dayList');
    list.innerHTML = '';

    for (var i = 0; i < days.length; i++) {
      list.appendChild(buildDayCard(days[i]));
    }

    // 今日のカードを自動で開く
    var todayCard = document.getElementById('body_' + _today);
    if (todayCard) { todayCard.classList.add('open'); }
  }

  /* ===== 日カード生成 ===== */
  function buildDayCard(dateKey) {
    var date   = parseDate(dateKey);
    var dow    = date.getDay();
    var isPast = dateKey < _today;
    var isToday = dateKey === _today;
    var staffIds = _shiftMap[dateKey] || [];
    var hasShift = staffIds.length > 0;

    var card = document.createElement('div');
    card.className = 'day-card' +
      (isToday ? ' today' : '') +
      (isPast   ? ' past'  : '');

    /* ヘッダー（クリックで開閉） */
    var header = document.createElement('div');
    header.className = 'day-header';
    header.onclick = function () { toggleBody(dateKey); };

    var left = document.createElement('div');
    left.style.display = 'flex';
    left.style.alignItems = 'center';

    var dateEl = document.createElement('span');
    dateEl.className = 'day-date';
    dateEl.textContent = (date.getMonth() + 1) + '/' + date.getDate();
    left.appendChild(dateEl);

    if (isToday) {
      var todayMark = document.createElement('span');
      todayMark.className = 'today-mark';
      todayMark.textContent = '今日';
      left.appendChild(todayMark);
    }

    var dowEl = document.createElement('span');
    dowEl.className = 'day-dow' + (dow === 0 ? ' sun' : dow === 6 ? ' sat' : '');
    dowEl.textContent = '（' + DOW_LABELS[dow] + '）';
    left.appendChild(dowEl);

    header.appendChild(left);

    /* 出勤状況バッジ */
    var status = document.createElement('div');
    if (hasShift) {
      status.className = 'day-status on';
      status.textContent = staffIds.length + '人出勤';
    } else {
      status.className = 'day-status off';
      status.textContent = '全員オフ';
    }
    header.appendChild(status);
    card.appendChild(header);

    /* ボディ（チェックリスト） */
    var body = document.createElement('div');
    body.className = 'day-body';
    body.id = 'body_' + dateKey;

    if (_staffList.length === 0) {
      var ns = document.createElement('div');
      ns.className = 'no-staff';
      ns.textContent = 'スタッフが登録されていません';
      body.appendChild(ns);
    } else {
      var checks = document.createElement('div');
      checks.className = 'staff-checks';

      for (var j = 0; j < _staffList.length; j++) {
        (function (staff) {
          var label = document.createElement('label');
          label.className = 'staff-check-item';

          var cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.id = 'chk_' + dateKey + '_' + staff.id;
          cb.value = staff.id;
          cb.checked = staffIds.indexOf(staff.id) >= 0;
          if (isPast) { cb.disabled = true; }
          label.appendChild(cb);

          var dot = document.createElement('div');
          dot.className = 'staff-color-dot';
          dot.style.background = staff.color;
          label.appendChild(dot);

          var name = document.createElement('span');
          name.className = 'staff-check-name';
          name.textContent = staff.name;
          label.appendChild(name);

          checks.appendChild(label);
        })(_staffList[j]);
      }
      body.appendChild(checks);

      /* 保存ボタン（過去日は非表示） */
      if (!isPast) {
        var saveBtn = document.createElement('button');
        saveBtn.className = 'save-btn';
        saveBtn.textContent = '保存';
        saveBtn.onclick = (function (dk) {
          return function () { saveShift(dk); };
        })(dateKey);
        body.appendChild(saveBtn);
      }
    }

    card.appendChild(body);
    return card;
  }

  /* ===== 開閉トグル ===== */
  function toggleBody(dateKey) {
    var body = document.getElementById('body_' + dateKey);
    if (!body) { return; }
    body.classList.toggle('open');
  }

  /* ===== シフト保存 ===== */
  function saveShift(dateKey) {
    var checkedIds = [];
    for (var i = 0; i < _staffList.length; i++) {
      var cb = document.getElementById('chk_' + dateKey + '_' + _staffList[i].id);
      if (cb && cb.checked) { checkedIds.push(_staffList[i].id); }
    }

    uiShowLoading('保存中...');
    firebase.firestore()
      .collection('salons').doc(_salonId)
      .collection('shifts').doc(dateKey)
      .set({
        date: dateKey,
        staffIds: checkedIds,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      })
      .then(function () {
        uiForceHideLoading();
        _shiftMap[dateKey] = checkedIds;
        uiToast(checkedIds.length > 0
          ? checkedIds.length + '人の出勤を保存しました'
          : 'この日は全員オフとして保存しました');
        // バッジだけ更新
        refreshDayCard(dateKey);
      })
      .catch(function (e) {
        uiForceHideLoading();
        uiToast('保存に失敗しました: ' + e.message);
      });
  }

  /* ===== バッジ更新（カード全体を再描画しない軽量版） ===== */
  function refreshDayCard(dateKey) {
    var staffIds = _shiftMap[dateKey] || [];
    var hasShift = staffIds.length > 0;
    // status バッジを探して更新
    var body = document.getElementById('body_' + dateKey);
    if (!body) { return; }
    var card = body.parentElement;
    var status = card.querySelector('.day-status');
    if (!status) { return; }
    if (hasShift) {
      status.className = 'day-status on';
      status.textContent = staffIds.length + '人出勤';
    } else {
      status.className = 'day-status off';
      status.textContent = '全員オフ';
    }
  }

  /* ===== 週切り替え ===== */
  function changeWeek(dir) {
    var next = WEEK_OFFSET + dir;
    if (next < 0 || next > MAX_FUTURE_WEEKS) { return; }
    WEEK_OFFSET = next;
    uiShowLoading('読み込み中...');
    loadWeekShifts().catch(function (e) {
      uiForceHideLoading();
      uiToast('読み込みに失敗しました: ' + e.message);
    });
  }
  window.changeWeek = changeWeek;

  /* ===== ユーティリティ ===== */
  function toDateKey(d) {
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var day = ('0' + d.getDate()).slice(-2);
    return y + '-' + m + '-' + day;
  }

  function parseDate(key) {
    var parts = key.split('-');
    return new Date(
      parseInt(parts[0], 10),
      parseInt(parts[1], 10) - 1,
      parseInt(parts[2], 10)
    );
  }

  /* 指定週オフセットの月〜日（月曜始まり）7日分を返す */
  function getWeekDays(weekOffset) {
    var today = new Date();
    var dow   = today.getDay(); // 0=日
    // 月曜日に揃える
    var monday = new Date(today);
    monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1) + weekOffset * 7);
    var days = [];
    for (var i = 0; i < 7; i++) {
      var d = new Date(monday);
      d.setDate(monday.getDate() + i);
      days.push(toDateKey(d));
    }
    return days;
  }

})();
</script>
</body>
</html>
