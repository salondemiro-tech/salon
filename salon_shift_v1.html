<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TORITA - シフト管理</title>
<!--
  salon_shift_v1.html  -  TORITA Phase I-step5 v2
  作成: 2026/6/19
  設計:
    - 月カレンダー表示（前月・翌月ナビ）
    - 各日マスにスタッフのチェックボックス
    - 「まとめて保存」ボタン1つで月全体を保存
    - 未チェックの日 = 全員オフ（予約不可）
  DB: salons/{salonId}/shifts/{YYYY-MM-DD}
    フィールド: date, staffIds[], updatedAt
-->
<style>
  :root{
    --ac:#b5845a; --al:#f5ede4; --ad:#7a5535;
    --sf:#f8f7f4; --s2:#f0ede8;
    --bd:rgba(0,0,0,.10); --tx:#1a1a18; --mu:#73726c;
    --gn:#7b9e87; --gl:#eef3ef;
    --rd:#c47b7b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Georgia','Hiragino Mincho ProN',serif;
    background:var(--s2); color:var(--tx);
    -webkit-text-size-adjust:100%; min-height:100vh;
  }
  .topbar{
    background:#fff; border-bottom:1px solid var(--bd);
    padding:12px 20px;
    display:flex; align-items:center; gap:12px;
    position:sticky; top:0; z-index:10;
  }
  .back-btn{
    background:none; border:none; font-size:20px;
    cursor:pointer; padding:4px 6px; color:var(--ac); line-height:1;
  }
  .page-title{ font-size:16px; font-weight:600; color:var(--ad); flex:1; }

  .wrap{max-width:860px; margin:0 auto; padding:18px 12px 80px;}

  /* 月ナビ */
  .month-nav{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:16px; gap:10px;
  }
  .month-label{
    font-size:17px; font-weight:600; color:var(--ad); text-align:center; flex:1;
  }
  .nav-btn{
    background:#fff; border:1.5px solid var(--bd);
    border-radius:9px; padding:8px 16px;
    font-size:13px; cursor:pointer; font-family:inherit; color:var(--mu);
    white-space:nowrap;
  }
  .nav-btn:hover{ border-color:var(--ac); color:var(--ac); }
  .nav-btn:disabled{ opacity:.4; cursor:default; }

  /* スタッフ凡例 */
  .legend{
    display:flex; flex-wrap:wrap; gap:10px;
    margin-bottom:14px; padding:10px 14px;
    background:#fff; border-radius:10px; border:1px solid var(--bd);
  }
  .legend-item{
    display:flex; align-items:center; gap:5px;
    font-size:12px; color:var(--tx);
  }
  .legend-dot{
    width:10px; height:10px; border-radius:50%; flex-shrink:0;
  }

  /* カレンダーグリッド */
  .cal-header{
    display:grid; grid-template-columns:repeat(7, 1fr);
    gap:3px; margin-bottom:3px;
  }
  .cal-dow{
    text-align:center; font-size:11px; font-weight:600;
    color:var(--mu); padding:4px 0;
  }
  .cal-dow.sat{ color:#5a7eb5; }
  .cal-dow.sun{ color:var(--rd); }

  .cal-grid{
    display:grid; grid-template-columns:repeat(7, 1fr);
    gap:3px;
  }

  .cal-cell{
    background:#fff; border-radius:8px; border:1px solid var(--bd);
    padding:6px 5px; min-height:80px;
    display:flex; flex-direction:column;
  }
  .cal-cell.empty{
    background:transparent; border-color:transparent;
  }
  .cal-cell.past{
    background:var(--sf); opacity:.7;
  }
  .cal-cell.today{
    border-color:var(--ac); border-width:2px;
  }
  .cal-cell.sat .cell-date{ color:#5a7eb5; }
  .cal-cell.sun .cell-date{ color:var(--rd); }

  .cell-date{
    font-size:12px; font-weight:600; color:var(--ad);
    margin-bottom:5px; line-height:1;
  }
  .cell-date .today-dot{
    display:inline-block; width:5px; height:5px;
    background:var(--ac); border-radius:50%;
    margin-left:3px; vertical-align:middle;
  }

  /* 一括ON/OFFボタン */
  .cell-bulk{
    display:flex; gap:3px; margin-bottom:4px;
  }
  .bulk-btn{
    flex:1; border:none; border-radius:4px;
    font-size:9px; padding:2px 0;
    cursor:pointer; font-family:inherit; font-weight:600;
    line-height:1.4;
  }
  .bulk-btn.on{ background:var(--gl); color:var(--gn); }
  .bulk-btn.off{ background:var(--rl); color:var(--rd); }
  .bulk-btn:disabled{ opacity:.4; cursor:default; }

  /* スタッフチェック（コンパクト） */
  .cell-checks{
    display:flex; flex-direction:column; gap:3px; flex:1;
  }
  .cell-check{
    display:flex; align-items:center; gap:4px;
    cursor:pointer; line-height:1;
  }
  .cell-check input[type=checkbox]{
    width:13px; height:13px; accent-color:var(--ac);
    flex-shrink:0; cursor:pointer; margin:0;
  }
  .cell-check-dot{
    width:7px; height:7px; border-radius:50%; flex-shrink:0;
  }
  .cell-check-name{
    font-size:10px; color:var(--tx);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .cal-cell.past .cell-check input[type=checkbox]{
    cursor:default;
  }

  /* まとめて保存ボタン */
  .save-bar{
    position:fixed; bottom:0; left:0; right:0;
    background:#fff; border-top:1px solid var(--bd);
    padding:12px 16px;
    display:flex; align-items:center; gap:12px;
    z-index:20;
  }
  .save-bar-note{
    font-size:12px; color:var(--mu); flex:1;
    line-height:1.4;
  }
  .save-all-btn{
    flex-shrink:0;
    background:var(--ac); color:#fff;
    border:none; border-radius:12px;
    padding:13px 28px;
    font-size:15px; font-weight:600;
    cursor:pointer; font-family:inherit;
    white-space:nowrap;
  }
  .save-all-btn:active{ opacity:.85; }
  .save-all-btn:disabled{ opacity:.5; cursor:default; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">&#8592;</button>
  <div class="page-title">シフト管理</div>
</div>

<div class="wrap">
  <div class="month-nav">
    <button class="nav-btn" id="prevBtn" onclick="changeMonth(-1)">&#8592; 前月</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextBtn" onclick="changeMonth(1)">翌月 &#8594;</button>
  </div>

  <!-- スタッフ凡例 -->
  <div class="legend" id="legend"></div>

  <!-- カレンダー曜日ヘッダー -->
  <div class="cal-header">
    <div class="cal-dow">月</div>
    <div class="cal-dow">火</div>
    <div class="cal-dow">水</div>
    <div class="cal-dow">木</div>
    <div class="cal-dow">金</div>
    <div class="cal-dow sat">土</div>
    <div class="cal-dow sun">日</div>
  </div>

  <!-- カレンダーグリッド -->
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- まとめて保存バー -->
<div class="save-bar">
  <div class="save-bar-note">チェックを変更したらまとめて保存してください</div>
  <button class="save-all-btn" id="saveAllBtn" onclick="saveAll()">まとめて保存</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="shared_db.js"></script>
<script src="shared_auth.js"></script>
<script src="shared_ui.js"></script>

<script>
(function () {

  var _salonId   = null;
  var _staffList = []; // [{id, name, color}]
  var _shiftMap  = {}; // { 'YYYY-MM-DD': [staffId,...] }
  var _today     = dateKey(new Date());

  // 表示中の年月
  var _curYear  = new Date().getFullYear();
  var _curMonth = new Date().getMonth(); // 0-indexed

  // 過去に戻れる月数・未来に進める月数
  var MIN_MONTH_OFFSET = -1;
  var MAX_MONTH_OFFSET = 3;
  var _baseYear  = new Date().getFullYear();
  var _baseMonth = new Date().getMonth();

  /* ===== 起動 ===== */
  onFbReady(function () {
    requireSalonStaff(function (isStaff) {
      if (!isStaff) { window.location.href = 'salon_auth_v2_new.html'; return; }
      var user = firebase.auth().currentUser;
      _salonId = user ? user.uid : null;
      if (!_salonId) { window.location.href = 'salon_auth_v2_new.html'; return; }
      loadStaffThenRender();
    });
  });

  /* ===== スタッフ読み込み ===== */
  function loadStaffThenRender() {
    uiShowLoading('読み込み中...');
    firebase.firestore()
      .collection('salons').doc(_salonId)
      .collection('staffs').orderBy('name', 'asc').get()
      .then(function (snap) {
        _staffList = [];
        snap.forEach(function (doc) {
          if (doc.id === 'owner') { return; }
          var d = doc.data();
          _staffList.push({ id: doc.id, name: d.name || doc.id, color: d.color || '#ccc' });
        });
        buildLegend();
        return loadMonthShifts();
      })
      .catch(function (e) {
        uiForceHideLoading();
        uiToast('読み込みに失敗しました: ' + e.message);
      });
  }

  /* ===== 凡例 ===== */
  function buildLegend() {
    var leg = document.getElementById('legend');
    leg.innerHTML = '';
    if (_staffList.length === 0) {
      leg.textContent = 'スタッフが登録されていません';
      return;
    }
    for (var i = 0; i < _staffList.length; i++) {
      var item = document.createElement('div');
      item.className = 'legend-item';
      var dot = document.createElement('div');
      dot.className = 'legend-dot';
      dot.style.background = _staffList[i].color;
      item.appendChild(dot);
      var name = document.createElement('span');
      name.textContent = _staffList[i].name;
      item.appendChild(name);
      leg.appendChild(item);
    }
  }

  /* ===== 月シフト読み込み ===== */
  function loadMonthShifts() {
    var startKey = dateKey(new Date(_curYear, _curMonth, 1));
    var endKey   = dateKey(new Date(_curYear, _curMonth + 1, 0));

    return firebase.firestore()
      .collection('salons').doc(_salonId)
      .collection('shifts')
      .where('date', '>=', startKey)
      .where('date', '<=', endKey)
      .get()
      .then(function (snap) {
        uiForceHideLoading();
        _shiftMap = {};
        snap.forEach(function (doc) {
          var d = doc.data();
          if (d.date) { _shiftMap[d.date] = d.staffIds || []; }
        });
        renderCalendar();
      });
  }

  /* ===== カレンダー描画 ===== */
  function renderCalendar() {
    // 月ラベル
    document.getElementById('monthLabel').textContent =
      _curYear + '年' + (_curMonth + 1) + '月';

    // ナビボタン制御
    var offset = (_curYear - _baseYear) * 12 + (_curMonth - _baseMonth);
    document.getElementById('prevBtn').disabled = (offset <= MIN_MONTH_OFFSET);
    document.getElementById('nextBtn').disabled = (offset >= MAX_MONTH_OFFSET);

    var grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    // 月の1日の曜日（月曜始まり: 月=0, 日=6）
    var firstDay = new Date(_curYear, _curMonth, 1).getDay();
    var blanks = (firstDay === 0) ? 6 : firstDay - 1;
    var daysInMonth = new Date(_curYear, _curMonth + 1, 0).getDate();

    // 空白セル
    for (var b = 0; b < blanks; b++) {
      var empty = document.createElement('div');
      empty.className = 'cal-cell empty';
      grid.appendChild(empty);
    }

    // 日付セル
    for (var d = 1; d <= daysInMonth; d++) {
      grid.appendChild(buildCell(d));
    }
  }

  /* ===== 日付セル生成 ===== */
  function buildCell(day) {
    var dk = dateKey(new Date(_curYear, _curMonth, day));
    var dow = new Date(_curYear, _curMonth, day).getDay(); // 0=日,6=土
    var isPast   = dk < _today;
    var isToday  = dk === _today;
    var staffIds = _shiftMap[dk] || [];

    var cell = document.createElement('div');
    cell.className = 'cal-cell' +
      (isPast   ? ' past'   : '') +
      (isToday  ? ' today'  : '') +
      (dow === 6 ? ' sat'   : '') +
      (dow === 0 ? ' sun'   : '');

    // 日付
    var dateEl = document.createElement('div');
    dateEl.className = 'cell-date';
    dateEl.textContent = day;
    if (isToday) {
      var dot = document.createElement('span');
      dot.className = 'today-dot';
      dateEl.appendChild(dot);
    }
    cell.appendChild(dateEl);

    // スタッフチェック
    if (_staffList.length > 0) {
      // 一括ON/OFFボタン
      if (!isPast) {
        var bulk = document.createElement('div');
        bulk.className = 'cell-bulk';
        var btnOn = document.createElement('button');
        btnOn.className = 'bulk-btn on';
        btnOn.textContent = '全ON';
        btnOn.onclick = (function (dk2) {
          return function (e) {
            e.preventDefault();
            for (var si = 0; si < _staffList.length; si++) {
              var cb2 = document.getElementById('chk_' + dk2 + '_' + _staffList[si].id);
              if (cb2) { cb2.checked = true; }
            }
          };
        })(dk);
        bulk.appendChild(btnOn);
        var btnOff = document.createElement('button');
        btnOff.className = 'bulk-btn off';
        btnOff.textContent = '全OFF';
        btnOff.onclick = (function (dk2) {
          return function (e) {
            e.preventDefault();
            for (var si = 0; si < _staffList.length; si++) {
              var cb2 = document.getElementById('chk_' + dk2 + '_' + _staffList[si].id);
              if (cb2) { cb2.checked = false; }
            }
          };
        })(dk);
        bulk.appendChild(btnOff);
        cell.appendChild(bulk);
      }

      var checks = document.createElement('div');
      checks.className = 'cell-checks';
      for (var i = 0; i < _staffList.length; i++) {
        (function (staff) {
          var lbl = document.createElement('label');
          lbl.className = 'cell-check';

          var cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.id = 'chk_' + dk + '_' + staff.id;
          cb.value = staff.id;
          cb.checked = staffIds.indexOf(staff.id) >= 0;
          if (isPast) { cb.disabled = true; }
          lbl.appendChild(cb);

          var cdot = document.createElement('div');
          cdot.className = 'cell-check-dot';
          cdot.style.background = staff.color;
          lbl.appendChild(cdot);

          var cname = document.createElement('span');
          cname.className = 'cell-check-name';
          cname.textContent = staff.name;
          lbl.appendChild(cname);

          checks.appendChild(lbl);
        })(_staffList[i]);
      }
      cell.appendChild(checks);
    }

    return cell;
  }

  /* ===== まとめて保存 ===== */
  function saveAll() {
    var daysInMonth = new Date(_curYear, _curMonth + 1, 0).getDate();
    var batch = firebase.firestore().batch();
    var col = firebase.firestore()
      .collection('salons').doc(_salonId).collection('shifts');
    var count = 0;

    for (var d = 1; d <= daysInMonth; d++) {
      var dk = dateKey(new Date(_curYear, _curMonth, d));
      if (dk < _today) { continue; } // 過去日はスキップ

      var checkedIds = [];
      for (var i = 0; i < _staffList.length; i++) {
        var cb = document.getElementById('chk_' + dk + '_' + _staffList[i].id);
        if (cb && cb.checked) { checkedIds.push(_staffList[i].id); }
      }

      // チェックがある日 or 既存データがある日（解除も保存）
      var hadData = !!_shiftMap[dk];
      if (checkedIds.length > 0 || hadData) {
        batch.set(col.doc(dk), {
          date: dk,
          staffIds: checkedIds,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        _shiftMap[dk] = checkedIds;
        count++;
      }
    }

    if (count === 0) {
      uiToast('変更がありません');
      return;
    }

    var btn = document.getElementById('saveAllBtn');
    btn.disabled = true;
    uiShowLoading('保存中...');

    batch.commit()
      .then(function () {
        uiForceHideLoading();
        btn.disabled = false;
        uiToast('シフトを保存しました');
      })
      .catch(function (e) {
        uiForceHideLoading();
        btn.disabled = false;
        uiToast('保存に失敗しました: ' + e.message);
      });
  }
  window.saveAll = saveAll;

  /* ===== 月切り替え ===== */
  function changeMonth(dir) {
    var offset = (_curYear - _baseYear) * 12 + (_curMonth - _baseMonth) + dir;
    if (offset < MIN_MONTH_OFFSET || offset > MAX_MONTH_OFFSET) { return; }
    _curMonth += dir;
    if (_curMonth < 0) { _curMonth = 11; _curYear--; }
    if (_curMonth > 11) { _curMonth = 0;  _curYear++; }
    uiShowLoading('読み込み中...');
    loadMonthShifts().catch(function (e) {
      uiForceHideLoading();
      uiToast('読み込みに失敗しました: ' + e.message);
    });
  }
  window.changeMonth = changeMonth;

  /* ===== ユーティリティ ===== */
  function dateKey(d) {
    var y  = d.getFullYear();
    var m  = ('0' + (d.getMonth() + 1)).slice(-2);
    var dd = ('0' + d.getDate()).slice(-2);
    return y + '-' + m + '-' + dd;
  }

})();
</script>
</body>
</html>
