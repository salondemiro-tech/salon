<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ご予約 - TORITA</title>

<!-- Firebase SDK 9.23.0 compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- ★ claim Function 呼び出しに必須（D-step3 dbCustomerClaimMyCard が利用） -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="firebase-init.js"></script>
<!-- ★ DB抽象化層・顧客向け関数（dbCustomer*）。これが無いと「shared_db.js 読込失敗」になる -->
<script src="shared_db.js"></script>
<!-- ★ メニュー関連（menuList）。calendarLoadDay が所要時間参照に使う -->
<script src="shared_db_menu.js"></script>
<!-- ★ 空き状況計算（calendarLoadDay）。日時選択で使用 -->
<script src="shared_db_calendar.js"></script>

<style>
  :root{
    --ac:#b5845a;--al:#f5ede4;--ad:#7a5535;
    --bg:#fff;--sf:#f8f7f4;--s2:#f0ede8;
    --bd:rgba(0,0,0,.10);--tx:#1a1a18;--mu:#73726c;--hi:#b0afa9;
    --gn:#7b9e87;--gl:#e8f2eb;--gt:#1e4d2b;
    --rd:#c47b7b;--rl:#faeaea;--rt:#6b1f1f;
    --go:#c9a84c;--gol:#fdf6e3;
  }
  *{box-sizing:border-box;}
  body{
    font-family:Georgia,"Hiragino Mincho ProN",serif;
    background:var(--s2);color:var(--tx);
    margin:0;padding:0;min-height:100vh;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);
        box-shadow:0 0 40px rgba(0,0,0,.06);display:flex;flex-direction:column;}

  /* ヘッダー */
  .hdr{background:var(--al);padding:18px 20px;border-bottom:1px solid var(--bd);
       position:sticky;top:0;z-index:10;}
  .hdr-salon{font-size:17px;font-weight:600;color:var(--ad);}
  .hdr-sub{font-size:11px;color:var(--mu);margin-top:2px;letter-spacing:.04em;}

  /* ステップインジケータ */
  .steps{display:flex;gap:6px;padding:14px 20px 0;}
  .step-dot{flex:1;height:4px;border-radius:2px;background:var(--s2);transition:background .3s;}
  .step-dot.active{background:var(--ac);}
  .step-dot.done{background:var(--gn);}

  /* 本体 */
  .body{flex:1;padding:20px;}
  .step-title{font-size:19px;font-weight:600;color:var(--tx);margin:4px 0 4px;}
  .step-desc{font-size:13px;color:var(--mu);margin-bottom:18px;line-height:1.6;}

  /* メニューカード */
  .menu-cat-head{font-size:13px;font-weight:600;color:var(--ad);letter-spacing:.06em;
                 margin:18px 2px 10px;padding-bottom:5px;border-bottom:1px solid var(--bd);}
  .menu-cat-head:first-of-type{margin-top:6px;}
  .menu-card{border:1.5px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px;
             cursor:pointer;transition:all .15s;background:var(--bg);}
  .menu-card:active{transform:scale(.99);}
  .menu-card.selected{border-color:var(--ac);background:var(--al);box-shadow:0 2px 12px rgba(181,132,90,.15);}
  .menu-name{font-size:16px;font-weight:600;color:var(--tx);}
  .menu-meta{font-size:12px;color:var(--mu);margin-top:6px;display:flex;gap:14px;}
  .menu-price{font-size:15px;font-weight:600;color:var(--ad);}
  .menu-desc{font-size:12px;color:var(--mu);margin-top:8px;line-height:1.5;}

  /* オプション */
  .opt-row{display:flex;align-items:center;gap:12px;padding:12px;border:1.5px solid var(--bd);
           border-radius:10px;margin-bottom:8px;cursor:pointer;background:var(--bg);}
  .opt-row.selected{border-color:var(--ac);background:var(--al);}
  .opt-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--bd);
             flex-shrink:0;display:flex;align-items:center;justify-content:center;
             font-size:14px;color:#fff;}
  .opt-row.selected .opt-check{background:var(--ac);border-color:var(--ac);}
  .opt-info{flex:1;}
  .opt-name{font-size:14px;font-weight:600;}
  .opt-meta{font-size:11px;color:var(--mu);margin-top:2px;}

  /* カレンダー */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-month{font-size:15px;font-weight:600;}
  .cal-btn{background:none;border:1.5px solid var(--bd);border-radius:8px;width:36px;height:36px;
           cursor:pointer;font-size:15px;font-family:inherit;color:var(--tx);}
  .cal-btn:disabled{opacity:.3;cursor:default;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{text-align:center;font-size:11px;color:var(--mu);padding:4px 0;font-weight:600;}
  .cal-dow.sun{color:var(--rd);}.cal-dow.sat{color:#7a8fbf;}
  .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
           border-radius:9px;font-size:14px;cursor:pointer;border:1.5px solid transparent;
           background:var(--sf);}
  .cal-day.empty{background:none;cursor:default;}
  .cal-day.closed{color:var(--hi);background:none;cursor:default;text-decoration:line-through;}
  .cal-day.past{color:var(--hi);background:none;cursor:default;}
  .cal-day.selected{background:var(--ac);color:#fff;border-color:var(--ac);}
  .cal-day.today{border-color:var(--ac);}

  /* スロット */
  .slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
  .slot{padding:12px 4px;text-align:center;border:1.5px solid var(--bd);border-radius:10px;
        cursor:pointer;font-size:14px;background:var(--bg);}
  .slot.selected{background:var(--ac);color:#fff;border-color:var(--ac);}
  .slot.disabled{opacity:.3;cursor:default;background:var(--s2);}

  /* フォーム */
  .field{margin-bottom:14px;}
  .label{font-size:12px;color:var(--mu);font-weight:600;margin-bottom:6px;display:block;}
  .input{width:100%;padding:13px 14px;border:1.5px solid var(--bd);border-radius:10px;
         font-size:16px;font-family:inherit;background:var(--bg);color:var(--tx);}
  .input:focus{outline:none;border-color:var(--ac);}

  /* ボタン */
  .pbtn{width:100%;padding:15px;background:var(--ac);color:#fff;border:none;border-radius:12px;
        font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
  .pbtn:disabled{opacity:.4;cursor:default;}
  .sbtn{width:100%;padding:13px;background:none;color:var(--ac);border:2px solid var(--ac);
        border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-top:10px;font-weight:600;}
  .gbtn{width:100%;padding:12px;background:none;color:var(--mu);border:1.5px solid var(--bd);
        border-radius:12px;font-size:13px;cursor:pointer;font-family:inherit;margin-top:8px;}

  /* フッターバー（次へ） */
  .footer{padding:16px 20px;border-top:1px solid var(--bd);background:var(--bg);
          position:sticky;bottom:0;}
  .footer-summary{font-size:12px;color:var(--mu);margin-bottom:10px;text-align:center;}

  /* 確認サマリ */
  .sum-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bd);}
  .sum-label{font-size:13px;color:var(--mu);}
  .sum-value{font-size:14px;font-weight:600;text-align:right;}
  .sum-total{display:flex;justify-content:space-between;padding:16px 0 4px;}
  .sum-total .sum-value{font-size:20px;color:var(--ad);}

  /* 完了 */
  .complete{text-align:center;padding:40px 20px;}
  .complete-icon{width:72px;height:72px;border-radius:50%;background:var(--gl);
                 display:flex;align-items:center;justify-content:center;margin:0 auto 20px;
                 font-size:36px;color:var(--gt);}
  .complete-title{font-size:20px;font-weight:600;margin-bottom:10px;}
  .complete-desc{font-size:13px;color:var(--mu);line-height:1.7;}

  /* 状態表示 */
  .loading{text-align:center;padding:50px 20px;color:var(--mu);font-size:14px;}
  .spinner{width:32px;height:32px;border:3px solid var(--s2);border-top-color:var(--ac);
           border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .error-box{background:var(--rl);color:var(--rt);padding:14px;border-radius:10px;
             font-size:13px;line-height:1.6;margin-bottom:14px;border-left:3px solid var(--rd);}
  .info-box{background:var(--gol);color:#7a5800;padding:14px;border-radius:10px;
            font-size:13px;line-height:1.6;margin-bottom:14px;}
  .empty-msg{text-align:center;color:var(--mu);padding:30px 20px;font-size:14px;}

  /* メール確認バナー */
  .verify-banner{background:var(--gol);border:1px solid var(--go);border-radius:10px;
                 padding:14px;font-size:13px;color:#7a5800;line-height:1.6;margin-bottom:14px;}

  /* マイページ */
  .mypage-section{border:1.5px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px;background:var(--bg);}
  .mypage-section-title{font-size:13px;font-weight:600;color:var(--mu);margin-bottom:12px;letter-spacing:.04em;}
  .mypage-field{margin-bottom:12px;}
  .mypage-field label{display:block;font-size:12px;color:var(--mu);margin-bottom:4px;}
  .mypage-field input{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--tx);box-sizing:border-box;}
  .mypage-field input:focus{outline:none;border-color:var(--ac);}
  .mypage-msg{font-size:13px;padding:10px 12px;border-radius:8px;margin-bottom:10px;}
  .mypage-msg.ok{background:var(--gl);color:var(--gt);}
  .mypage-msg.err{background:var(--rl);color:var(--rt);}
  /* スタンプカード（顧客マイページ） */
  .mp-stamp-card{
    border-radius:14px; overflow:hidden;
    margin-bottom:14px; box-shadow:0 4px 16px rgba(0,0,0,.10);
  }
  .mp-stamp-header{
    padding:14px 16px 12px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .mp-stamp-title{font-size:12px;font-weight:700;color:#fff;letter-spacing:.05em;opacity:.9;}
  .mp-stamp-count-wrap{display:flex;align-items:baseline;gap:3px;}
  .mp-stamp-num{font-size:28px;font-weight:700;color:#fff;line-height:1;}
  .mp-stamp-goal{font-size:12px;color:rgba(255,255,255,.75);}
  .mp-stamp-dots{
    display:flex;flex-wrap:wrap;gap:7px;
    padding:10px 16px 14px;
    background:rgba(255,255,255,.15);
  }
  .mp-stamp-dot{
    width:22px;height:22px;border-radius:50%;
    background:rgba(255,255,255,.3);flex-shrink:0;
  }
  .mp-stamp-dot.on{background:#fff;}
  .mp-stamp-reward{
    padding:10px 16px;
    background:rgba(0,0,0,.15);
    font-size:12px;color:#fff;line-height:1.5;
  }
  .mp-stamp-bonus{
    padding:4px 16px 10px;
    background:rgba(0,0,0,.08);
    font-size:11.5px;color:#fff;
  }

  /* キャンセルモーダル */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
  .modal-sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;}
  .modal-title{font-size:17px;font-weight:600;margin-bottom:6px;}
  .modal-sub{font-size:13px;color:var(--mu);margin-bottom:16px;line-height:1.6;}
  .modal-warn{background:var(--rl);border-left:3px solid var(--rd);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--rt);line-height:1.6;margin-bottom:14px;}
  .modal-warn a{color:var(--rd);font-weight:600;}
  .modal-fee{background:var(--gol);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#7a5800;}
  .modal-fee-amount{font-size:20px;font-weight:600;margin-top:4px;}
  .policy-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
  .policy-modal-box{background:var(--bg);border-radius:16px;padding:22px;max-width:440px;width:100%;max-height:70vh;overflow-y:auto;}
  .policy-modal-title{font-size:15px;font-weight:600;margin-bottom:12px;}
  .policy-modal-text{font-size:13px;color:var(--tx);line-height:1.8;white-space:pre-wrap;}
  .policy-modal-close{width:100%;padding:12px;background:var(--s2);border:none;border-radius:10px;font-size:14px;cursor:pointer;margin-top:16px;font-family:inherit;}

  /* 予約履歴 */
  .hist-card{border:1.5px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px;background:var(--bg);}
  .hist-date{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:6px;}
  .hist-menu{font-size:14px;color:var(--tx);margin-bottom:4px;}
  .hist-meta{font-size:12px;color:var(--mu);display:flex;gap:12px;align-items:center;}
  .hist-status{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
  .hist-status.pending{background:var(--gol);color:#7a5800;}
  .hist-status.confirmed{background:var(--gl);color:var(--gt);}
  .hist-status.cancelled{background:var(--rl);color:var(--rt);}
  .hist-status.other{background:var(--s2);color:var(--mu);}

  /* auth-bar：ヘッダー下に常時表示 */
  .auth-bar{background:var(--sf);border-bottom:1px solid var(--bd);
            padding:6px 20px;display:flex;align-items:center;justify-content:space-between;}
  .auth-bar-email{font-size:11px;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%;}
  .auth-bar-btn{font-size:11px;color:var(--ac);background:none;border:none;cursor:pointer;
                font-family:inherit;padding:4px 0;white-space:nowrap;flex-shrink:0;}
</style>
</head>
<body>
<div id="debugBanner" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#000;color:#0f0;font-size:11px;font-family:monospace;padding:4px 8px;white-space:pre-wrap;max-height:120px;overflow-y:auto;"></div>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-salon" id="hdrSalon">読み込み中...</div>
    <div class="hdr-sub" id="hdrSub">ご予約</div>
  </div>
  <div class="auth-bar" id="authBar" style="display:none;">
    <div class="auth-bar-email" id="authBarEmail"></div>
    <div style="display:flex;gap:12px;flex-shrink:0;">
      <button class="auth-bar-btn" id="authBarMypageBtn">マイページ</button>
      <button class="auth-bar-btn" id="authBarHistoryBtn">予約履歴</button>
      <button class="auth-bar-btn" id="authBarLogoutBtn">ログアウト</button>
    </div>
  </div>
  <div class="steps" id="stepsBar" style="display:none;">
    <div class="step-dot" data-step="menu"></div>
    <div class="step-dot" data-step="date"></div>
    <div class="step-dot" data-step="identity"></div>
    <div class="step-dot" data-step="confirm"></div>
  </div>
  <div class="body" id="appBody">
    <div class="loading"><div class="spinner"></div>読み込んでいます...</div>
  </div>
  <div class="footer" id="appFooter" style="display:none;"></div>
</div>

<script>
// ============================================================
// customer_app_v2.html  -  TORITA 顧客予約アプリ（Phase D-step4）
//
// 設計書 DESIGN.md Phase D（D-1〜D-8）準拠。今回は D-2〜D-6（予約成立まで）。
//
// 構成方針（2026/5/28 確定）:
//   - 1ファイル SPA 風（画面切替・リロードなし）
//   - 状態は appState 単一オブジェクトに集約
//   - 画面ごとに renderMenuStep / renderDateStep / renderIdentityStep /
//     renderConfirmStep / renderCompleteStep に分割
//   - salonId は起動時 URL ?salon=xxx から1回だけ確定、以後手入力させない
//   - claim は「初回予約確定の直前」に dbCustomerClaimMyCard を呼ぶ
//   - 予約は dbCustomerCreateAppointment 直呼び（reservation.js は経由しない）
//   - ES5 互換（var/function/Promise.then のみ）
//
// 依存:
//   shared_db.js（D-step3版）, shared_db_calendar.js, firebase-*-compat.js
// ============================================================

// ------------------------------------------------------------
// 状態管理：単一オブジェクト
// ------------------------------------------------------------
var appState = {
  salonId: null,          // 起動時1回確定、以後変更不可
  salonInfo: null,        // { name, ... }
  settings: null,         // 営業時間など

  menus: null,            // 公開メニュー一覧
  selectedMenu: null,     // 選択したメニュー（オブジェクト）
  selectedOptions: [],    // 選択したオプションメニュー（配列）

  calYear: null,          // カレンダー表示中の年
  calMonth: null,         // カレンダー表示中の月（1-12）
  selectedDate: null,     // "2026-06-01"
  dayData: null,          // dbLoadCustomerBooking の結果
  availableSlots: null,   // computeAvailableSlots の結果
  selectedSlot: null,     // "14:00"
  nominatedStaffId: null, // 指名スタッフID（null=指名なし）
  staffList: null,        // メニューの eligibleStaffIds に対応するスタッフ情報

  user: null,             // Firebase Auth currentUser
  customerDocId: null,    // claim 後に確定

  step: 'loading',        // loading / menu / option / date / identity / confirm / complete
  busy: false,            // 二重送信防止
  slotConflictMsg: null,  // 空き再チェックで埋まっていた場合のメッセージ
  cancelPolicy: null      // キャンセル規定（履歴画面のキャンセル処理で使用）
};

// グローバル参照
var auth = null;

// ------------------------------------------------------------
// ユーティリティ
// ------------------------------------------------------------
function $(id){ return document.getElementById(id); }

// iPad用デバッグ表示
function debugLog(msg){
  var b = document.getElementById('debugBanner');
  if (b){ b.textContent += msg + '\n'; }
}

function esc(s){
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function setBody(html){ $('appBody').innerHTML = html; }
function setFooter(html){
  var f = $('appFooter');
  if (!html) { f.style.display='none'; f.innerHTML=''; return; }
  f.style.display='block'; f.innerHTML = html;
}

function showLoading(msg){
  setBody('<div class="loading"><div class="spinner"></div>' + esc(msg || '読み込んでいます...') + '</div>');
  setFooter('');
}

function yen(n){
  var v = parseInt(n, 10);
  if (isNaN(v)) return '—';
  return '¥' + v.toLocaleString('ja-JP');
}

// 円の手動フォーマット（toLocaleString が不安な環境の保険）
function yenSafe(n){
  var v = parseInt(n, 10);
  if (isNaN(v)) return '—';
  var s = String(v);
  var out = '';
  var c = 0;
  var i;
  for (i = s.length - 1; i >= 0; i--){
    out = s.charAt(i) + out;
    c++;
    if (c % 3 === 0 && i > 0) out = ',' + out;
  }
  return '¥' + out;
}

// auth-bar の表示更新
function updateAuthBar(){
  var bar = $('authBar');
  if (!bar) return;
  var user = appState.user;
  // ログイン済み＆メール確認済みのときだけ表示（identity/loading/accountCheck画面では非表示）
  var hideSteps = ['loading','identity','accountCheck'];
  if (user && user.emailVerified && hideSteps.indexOf(appState.step) < 0){
    bar.style.display = 'flex';
    $('authBarEmail').textContent = user.email || '';
    $('authBarLogoutBtn').onclick = doLogout;
    $('authBarHistoryBtn').onclick = function(){ goStep('history'); };
    $('authBarMypageBtn').onclick = function(){ goStep('mypage'); };
  } else {
    bar.style.display = 'none';
  }
}

// ステップバーの更新
function updateStepsBar(){
  var order = ['menu','date','identity','confirm'];
  var curIdx = order.indexOf(appState.step);
  // option は menu 扱い、complete は全部 done
  if (appState.step === 'option') curIdx = 0;
  if (appState.step === 'complete') curIdx = order.length;

  var bar = $('stepsBar');
  if (appState.step === 'loading') { bar.style.display='none'; return; }
  bar.style.display='flex';

  var dots = bar.querySelectorAll('.step-dot');
  var i;
  for (i = 0; i < dots.length; i++){
    dots[i].className = 'step-dot';
    if (i < curIdx) dots[i].className = 'step-dot done';
    else if (i === curIdx) dots[i].className = 'step-dot active';
  }
}

// 画面遷移の中心：step を変えて再描画
function goStep(step){
  appState.step = step;
  appState.busy = false;
  window.scrollTo(0, 0);
  render();
}

function render(){
  updateAuthBar();
  updateStepsBar();
  switch (appState.step){
    case 'accountCheck': renderAccountCheckStep(); break;
    case 'menu':     renderMenuStep(); break;
    case 'option':   renderOptionStep(); break;
    case 'date':     renderDateStep(); break;
    case 'identity': renderIdentityStep(); break;
    case 'confirm':  renderConfirmStep(); break;
    case 'complete': renderCompleteStep(); break;
    case 'history':  renderHistoryStep(); break;
    case 'mypage':   renderMypageStep(); break;
    default:         showLoading();
  }
}

// ------------------------------------------------------------
// 起動（D-2）
// ------------------------------------------------------------
function init(){
  if (!window.firebase || !firebase.apps || firebase.apps.length === 0){
    setBody('<div class="error-box">アプリの初期化に失敗しました。ページを再読み込みしてください。</div>');
    return;
  }
  try {
    auth = firebase.auth();
  } catch(e){
    setBody('<div class="error-box">認証システムの初期化に失敗しました。</div>');
    return;
  }

  // salonId を URL から1回だけ確定（shared_db.js が getCurrentSalonId で吸収）
  var sid = (typeof getCurrentSalonId === 'function') ? getCurrentSalonId() : null;
  if (!sid){
    var params = new URLSearchParams(window.location.search);
    sid = params.get('salon');
  }
  if (!sid){
    setBody('<div class="error-box">予約用のURLが正しくありません。<br>'
          + 'サロンからご案内されたリンクから再度アクセスしてください。</div>');
    $('hdrSalon').textContent = 'ご予約';
    return;
  }
  appState.salonId = sid;

  // 認証状態を監視（ログイン状態の変化に追従）
  // 初回発火で「ログイン済みか」を判定し、フローを分岐する。
  var firstAuthHandled = false;
  auth.onAuthStateChanged(function(user){
    appState.user = user || null;
    if (firstAuthHandled) { return; }
    firstAuthHandled = true;

    if (user && user.emailVerified){
      // ログイン時にAuth.emailとFirestore.emailの同期チェック（onFbReady内で実行）
      syncEmailIfChanged(user, function(){
        // emailChanged=1&next=mypage の場合はマイページへ直接遷移
        var urlParams = new URLSearchParams(location.search);
        var next = urlParams.get('next');
        if (next === 'mypage'){
          // URLパラメータをクリア（再遷移防止）
          history.replaceState(null, '', location.pathname + '?salon=' + encodeURIComponent(appState.salonId || ''));
          loadSalonInfo_then('mypage');
          return;
        }
        $('hdrSalon').textContent = 'ご予約';
        $('hdrSub').textContent = 'アカウント確認';
        goStep('accountCheck');
      });
    } else {
      // 未ログイン or メール未確認 → ログイン画面（D-4）から開始
      $('hdrSalon').textContent = 'ご予約';
      $('hdrSub').textContent = 'ログイン / 新規登録';
      goStep('identity');
    }
  });
}

// ログイン時にAuth.emailとFirestore customer.emailを自動同期
function syncEmailIfChanged(user, cb){
  var sid = (typeof getCurrentSalonId === 'function') ? getCurrentSalonId() : null;
  if (!sid || !user || !user.email){ cb(); return; }

  if (typeof onFbReady !== 'function'){ cb(); return; }

  onFbReady(function(){
    if (typeof dbCustomerResolveMyCard !== 'function'){ cb(); return; }

    dbCustomerResolveMyCard(function(res){
      if (!res || !res.customerDocId || !res.customer){ cb(); return; }
      var fsEmail = res.customer.email || '';
      if (fsEmail === user.email){ cb(); return; }

      // 不一致 → Firestoreを新メールで更新してから次へ
      firebase.firestore()
        .collection('salons').doc(sid).collection('customers').doc(res.customerDocId)
        .update({ email: user.email, updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
        .then(function(){ cb(); })
        .catch(function(e){
          console.warn('[syncEmailIfChanged] Firestore更新失敗:', e && e.message);
          cb();
        });
    });
  });
}


// 指定stepへ遷移するloadSalonInfo亜種
function loadSalonInfo_then(nextStep){
  showLoading('読み込んでいます...');
  if (typeof dbCustomerGetSalonInfo !== 'function'){
    goStep(nextStep); return;
  }
  // salonInfo / settings / cancelPolicy を3並列で取得
  var _got = { info: false, settings: false, cancel: false };
  function _checkDone(){
    if (_got.info && _got.settings && _got.cancel) {
      var name = (appState.salonInfo && appState.salonInfo.name)
                   ? appState.salonInfo.name : 'サロン';
      $('hdrSalon').textContent = name;
      $('hdrSub').textContent = 'ご予約';
      goStep(nextStep);
    }
  }
  dbCustomerGetSalonInfo(function(info){
    appState.salonInfo = info || null;
    _got.info = true;
    _checkDone();
  });
  if (typeof dbSalonGetConfig === 'function'){
    dbSalonGetConfig('settings', function(s){
      appState.settings = s || null;
      _got.settings = true;
      _checkDone();
    });
    dbSalonGetConfig('cancelPolicy', function(p){
      appState.cancelPolicy = p || null;
      _got.cancel = true;
      _checkDone();
    });
  } else {
    _got.settings = true;
    _got.cancel = true;
  }
}

function loadSalonInfo(){
  showLoading('サロン情報を読み込んでいます...');

  if (typeof dbCustomerGetSalonInfo !== 'function'){
    setBody('<div class="error-box">システムの読み込みに失敗しました（shared_db.js）。</div>');
    return;
  }

  dbCustomerGetSalonInfo(function(info){
    appState.salonInfo = info || null;
    var name = (info && info.name) ? info.name : 'サロン';
    $('hdrSalon').textContent = name;
    $('hdrSub').textContent = 'ご予約';

    // settings・cancelPolicy を並列取得
    if (typeof dbSalonGetConfig === 'function'){
      var loaded = { settings: false, cancel: false };
      function checkDone(){
        if (loaded.settings && loaded.cancel) goStep('menu');
      }
      dbSalonGetConfig('settings', function(s){
        appState.settings = s || null;
        loaded.settings = true;
        checkDone();
      });
      dbSalonGetConfig('cancelPolicy', function(p){
        appState.cancelPolicy = p || null;
        loaded.cancel = true;
        checkDone();
      });
    } else {
      goStep('menu');
    }
  });
}

// ============================================================
// D-3: メニュー選択（type:'main'）
// ============================================================
function renderMenuStep(){
  // メニュー未取得なら取得
  if (!appState.menus){
    showLoading('メニューを読み込んでいます...');
    if (typeof dbCustomerGetPublicMenus !== 'function'){
      setBody('<div class="error-box">メニューの読み込みに失敗しました。</div>');
      return;
    }
    dbCustomerGetPublicMenus(function(list){
      appState.menus = list || [];
      renderMenuStep();
    });
    return;
  }

  // main メニューを抽出（sortOrder 昇順）
  var mains = [];
  var i;
  for (i = 0; i < appState.menus.length; i++){
    var m = appState.menus[i];
    if (m && m.type === 'main'){ mains.push(m); }
  }
  mains.sort(function(a, b){
    var sa = (typeof a.sortOrder === 'number') ? a.sortOrder : 9999;
    var sb = (typeof b.sortOrder === 'number') ? b.sortOrder : 9999;
    return sa - sb;
  });

  if (mains.length === 0){
    setBody(
      '<div class="step-title">メニュー</div>' +
      '<div class="empty-msg">現在ご予約いただけるメニューがありません。<br>サロンにお問い合わせください。</div>'
    );
    setFooter('');
    return;
  }

  // ★ 2026/6/12: カテゴリ別グループ表示（facial / body / other）
  //   category 未設定の既存メニューは 'other' 扱い（マイグレーション不要）。
  //   存在するカテゴリが1種類のみの場合は見出しを出さない（従来通りの見た目）。
  var catDefs = [
    { key: 'facial', label: 'フェイシャル' },
    { key: 'body',   label: 'ボディ' },
    { key: 'other',  label: 'その他' }
  ];
  var groups = { facial: [], body: [], other: [] };
  for (i = 0; i < mains.length; i++){
    var cm = mains[i];
    var ck = (cm.category === 'facial' || cm.category === 'body') ? cm.category : 'other';
    groups[ck].push(cm);
  }
  var usedCats = 0;
  for (i = 0; i < catDefs.length; i++){
    if (groups[catDefs[i].key].length > 0){ usedCats++; }
  }
  var showHeads = (usedCats >= 2);

  function _menuCardHtml(menu){
    var sel = (appState.selectedMenu && appState.selectedMenu._id === menu._id) ? ' selected' : '';
    return '<div class="menu-card' + sel + '" data-mid="' + esc(menu._id) + '">' +
             '<div class="menu-name">' + esc(menu.name) + '</div>' +
             '<div class="menu-meta">' +
               '<span class="menu-price">' + yenSafe(menu.price) + '</span>' +
               '<span>約' + esc(menu.duration) + '分</span>' +
             '</div>' +
             (menu.description ? '<div class="menu-desc">' + esc(menu.description) + '</div>' : '') +
           '</div>';
  }

  var html = '<div class="step-title">メニューを選ぶ</div>' +
             '<div class="step-desc">ご希望のメニューをお選びください。</div>';
  var g, gi;
  for (g = 0; g < catDefs.length; g++){
    var glist = groups[catDefs[g].key];
    if (glist.length === 0){ continue; }
    if (showHeads){
      html += '<div class="menu-cat-head">' + esc(catDefs[g].label) + '</div>';
    }
    for (gi = 0; gi < glist.length; gi++){
      html += _menuCardHtml(glist[gi]);
    }
  }
  setBody(html);

  // カード選択
  var cards = $('appBody').querySelectorAll('.menu-card');
  for (i = 0; i < cards.length; i++){
    cards[i].addEventListener('click', function(){
      var mid = this.getAttribute('data-mid');
      var j;
      for (j = 0; j < mains.length; j++){
        if (mains[j]._id === mid){ appState.selectedMenu = mains[j]; break; }
      }
      // オプションがあるか確認して遷移先を決める
      var hasOptions = false;
      for (j = 0; j < appState.menus.length; j++){
        if (appState.menus[j] && appState.menus[j].type === 'option'){ hasOptions = true; break; }
      }
      if (hasOptions){ goStep('option'); }
      else { appState.selectedOptions = []; goStep('date'); }
    });
  }
  setFooter('');
}

// オプション選択（type:'option'）。任意。
function renderOptionStep(){
  var opts = [];
  var i;
  for (i = 0; i < appState.menus.length; i++){
    if (appState.menus[i] && appState.menus[i].type === 'option'){ opts.push(appState.menus[i]); }
  }
  opts.sort(function(a, b){
    var sa = (typeof a.sortOrder === 'number') ? a.sortOrder : 9999;

  });

  var html = '<div class="step-title">オプション</div>' +
             '<div class="step-desc">追加のオプションがあればお選びください（任意・複数可）。</div>';

    html += '<div class="opt-row' + sel + '" data-oid="' + esc(o._id) + '">' +

                '<div class="opt-name">' + esc(o.name) + '</div>' +
                '<div class="opt-meta">' + yenSafe(o.price) + ' / 約' + esc(o.duration) + '分</div>' +
              '</div>' +
            '</div>';
  }
  setBody(html);

  var rows = $('appBody').querySelectorAll('.opt-row');
  for (i = 0; i < rows.length; i++){
    rows[i].addEventListener('click', function(){
      var oid = this.getAttribute('data-oid');
      toggleOption(oid);
      renderOptionStep(); // 再描画でチェック反映
    });
  }

  setFooter(
    '<button class="pbtn" id="optNextBtn">日時を選ぶ</button>' +
    '<button class="gbtn" id="optBackBtn">メニュー選択に戻る</button>'
  );
  $('optNextBtn').addEventListener('click', function(){ goStep('date'); });
  $('optBackBtn').addEventListener('click', function(){ goStep('menu'); });
}

function isOptionSelected(oid){
  var i;
  for (i = 0; i < appState.selectedOptions.length; i++){
    if (appState.selectedOptions[i]._id === oid){ return true; }
  }
  return false;
}

function toggleOption(oid){
  var i;
  for (i = 0; i < appState.selectedOptions.length; i++){
    if (appState.selectedOptions[i]._id === oid){
      appState.selectedOptions.splice(i, 1);
      return;
    }
  }
  // 追加
  for (i = 0; i < appState.menus.length; i++){
    if (appState.menus[i]._id === oid){
      appState.selectedOptions.push(appState.menus[i]);
      return;
    }
  }
}

// 合計時間・合計金額
function totalDuration(){
  var d = (appState.selectedMenu && appState.selectedMenu.duration) ? appState.selectedMenu.duration : 0;
  var i;
  for (i = 0; i < appState.selectedOptions.length; i++){
    d += (appState.selectedOptions[i].duration || 0);
  }

}
function totalPrice(){
  var p = (appState.selectedMenu && appState.selectedMenu.price) ? appState.selectedMenu.price : 0;
  var i;
  for (i = 0; i < appState.selectedOptions.length; i++){
    p += (appState.selectedOptions[i].price || 0);
  }
  return p;
}

// I-step8: スタッフ指名（任意）
// ============================================================
function shouldShowNominate(){
  // planId='team' かつ メニューの eligibleStaffIds に複数スタッフがいる場合のみ表示
  if (!appState.selectedMenu) { return false; }
  var ids = appState.selectedMenu.eligibleStaffIds || [];
  // owner のみ or 0人 → ソロプランメニュー → スキップ
  if (ids.length === 0) { return false; }
  if (ids.length === 1 && ids[0] === 'owner') { return false; }
  return true;
}

function renderNominateStep(){
  if (!appState.selectedMenu) { goStep('menu'); return; }
  var ids = appState.selectedMenu.eligibleStaffIds || [];
  // staffList が未取得なら Firestore から取得
  if (!appState.staffList){
    showLoading('スタッフ情報を読み込んでいます...');
    var sid = appState.salonId;
    firebase.firestore()
      .collection('salons').doc(sid)
      .collection('staffs').orderBy('name','asc').get()
      .then(function(snap){
        var list = [];
        snap.forEach(function(doc){
          if (doc.id === 'owner') { return; }
          var d = doc.data();
          if (ids.indexOf(doc.id) >= 0) {
            list.push({ id: doc.id, name: d.name || doc.id, color: d.color || '#ccc' });
          }
        });
        appState.staffList = list;
        renderNominateStep();
      })
      .catch(function(){
        appState.staffList = [];
        renderNominateStep();
      });
    return;
  }

  var html = '<div class="step-title">スタッフを選ぶ</div>' +
             '<div class="step-desc">ご希望のスタッフを指名できます（任意）。</div>';

  // 指名なしカード
  var noSelClass = (!appState.nominatedStaffId) ? ' selected' : '';
  html += '<div class="menu-card' + noSelClass + '" id="nominateNone">' +
            '<div class="menu-name">指名なし</div>' +
            '<div class="menu-desc" style="margin-top:4px;">サロンがスタッフを割り当てます</div>' +
          '</div>';

  // スタッフカード
  var i;
  for (i = 0; i < appState.staffList.length; i++){
    var s = appState.staffList[i];
    var selClass = (appState.nominatedStaffId === s.id) ? ' selected' : '';
    html += '<div class="menu-card' + selClass + '" data-staffid="' + esc(s.id) + '">' +
              '<div style="display:flex;align-items:center;gap:10px;">' +
                '<div style="width:14px;height:14px;border-radius:50%;background:' + esc(s.color) + ';flex-shrink:0;"></div>' +
                '<div class="menu-name">' + esc(s.name) + '</div>' +
              '</div>' +
            '</div>';
  }

  setBody(html);
  setFooter(
    '<button class="pbtn" id="nominateNextBtn">日時を選ぶ</button>' +
    '<button class="gbtn" id="nominateBackBtn">戻る</button>'
  );

  // 指名なし
  document.getElementById('nominateNone').addEventListener('click', function(){
    appState.nominatedStaffId = null;
    renderNominateStep();
  });

  // スタッフ選択
  var cards = document.querySelectorAll('[data-staffid]');
  for (i = 0; i < cards.length; i++){
    cards[i].addEventListener('click', function(){
      appState.nominatedStaffId = this.getAttribute('data-staffid');
      renderNominateStep();
    });
  }

  document.getElementById('nominateNextBtn').addEventListener('click', function(){
    goStep('date');
  });
  document.getElementById('nominateBackBtn').addEventListener('click', function(){
    var hasOptions = false;
    var k;
    if (appState.menus) {
      for (k = 0; k < appState.menus.length; k++){
        if (appState.menus[k] && appState.menus[k].type === 'option'){ hasOptions = true; break; }
      }
    }
    goStep(hasOptions ? 'option' : 'menu');
  });
}

// ============================================================
// D-5: 日時選択（カレンダー + 空きスロット）
// ============================================================
var DOW_LABELS = ['日','月','火','水','木','金','土'];

function renderDateStep(){
  if (appState.calYear == null){
    var now = new Date();
    appState.calYear = now.getFullYear();
    appState.calMonth = now.getMonth() + 1;
  }
  drawCalendar();
  // 直前の予約確定で time_conflict が発生した場合のメッセージを表示
  if (appState.slotConflictMsg){
    var body = $('appBody');
    if (body){
      var msg = document.createElement('div');
      msg.className = 'error-box';
      msg.style.margin = '0 0 12px';
      msg.textContent = appState.slotConflictMsg;
      body.insertBefore(msg, body.firstChild);
    }
    appState.slotConflictMsg = null;
  }
}

function drawCalendar(){
  var y = appState.calYear;
  var mo = appState.calMonth;
  var settings = appState.settings || {};
  var closedDows = settings.closedDows || [];

  var bookingWeeks = (typeof settings.bookingWeeks === 'number') ? settings.bookingWeeks : 8;
  var today = new Date();
  today.setHours(0,0,0,0);
  var maxDate = new Date(today.getTime());
  maxDate.setDate(maxDate.getDate() + bookingWeeks * 7);

  var firstDow = new Date(y, mo - 1, 1).getDay();
  var daysInMonth = new Date(y, mo, 0).getDate();

  var curMonthFirst = new Date(y, mo - 1, 1);
  var thisMonthFirst = new Date(today.getFullYear(), today.getMonth(), 1);
  var prevDisabled = (curMonthFirst.getTime() <= thisMonthFirst.getTime());

  var html = '<div class="step-title">日時を選ぶ</div>' +
             '<div class="step-desc">ご希望の日付を選んでください。</div>' +
             '<div class="cal-nav">' +
               '<button class="cal-btn" id="calPrev"' + (prevDisabled ? ' disabled' : '') + '>\u2039</button>' +
               '<div class="cal-month">' + y + '年 ' + mo + '月</div>' +
               '<button class="cal-btn" id="calNext">\u203a</button>' +
             '</div>' +
             '<div class="cal-grid">';

  var i;
  for (i = 0; i < 7; i++){
    var cls = (i === 0) ? ' sun' : (i === 6 ? ' sat' : '');
    html += '<div class="cal-dow' + cls + '">' + DOW_LABELS[i] + '</div>';
  }
  for (i = 0; i < firstDow; i++){ html += '<div class="cal-day empty"></div>'; }

  for (i = 1; i <= daysInMonth; i++){
    var d = new Date(y, mo - 1, i);
    d.setHours(0,0,0,0);
    var dow = d.getDay();
    var dateKey = y + '-' + pad2(mo) + '-' + pad2(i);
    var isPast = (d.getTime() < today.getTime());
    var isFuture = (d.getTime() > maxDate.getTime());
    var isClosedDow = (closedDows.indexOf(dow) >= 0);
    var isToday = (d.getTime() === today.getTime());
    var isSelected = (appState.selectedDate === dateKey);

    var dcls = 'cal-day';
    var clickable = true;
    if (isPast || isFuture){ dcls += ' past'; clickable = false; }
    else if (isClosedDow){ dcls += ' closed'; clickable = false; }
    if (isToday) dcls += ' today';
    if (isSelected) dcls += ' selected';

    html += '<div class="' + dcls + '"' +
            (clickable ? ' data-date="' + dateKey + '"' : '') +
            '>' + i + '</div>';
  }
  html += '</div><div id="slotArea"></div>';

  setBody(html);
  setFooter('<button class="gbtn" id="dateBackBtn">メニュー選択に戻る</button>');
  $('dateBackBtn').addEventListener('click', function(){
    var hasOptions = false;
    var k;
    for (k = 0; k < appState.menus.length; k++){
      if (appState.menus[k] && appState.menus[k].type === 'option'){ hasOptions = true; break; }
    }
    goStep(hasOptions ? 'option' : 'menu');
  });

  if (!prevDisabled){
    $('calPrev').addEventListener('click', function(){
      appState.calMonth--;
      if (appState.calMonth < 1){ appState.calMonth = 12; appState.calYear--; }
      appState.selectedSlot = null;
      drawCalendar();
    });
  }
  $('calNext').addEventListener('click', function(){
    appState.calMonth++;
    if (appState.calMonth > 12){ appState.calMonth = 1; appState.calYear++; }
    appState.selectedSlot = null;
    drawCalendar();
  });

  var dayEls = $('appBody').querySelectorAll('.cal-day[data-date]');
  for (i = 0; i < dayEls.length; i++){
    dayEls[i].addEventListener('click', function(){
      var dk = this.getAttribute('data-date');
      appState.selectedDate = dk;
      appState.selectedSlot = null;
      drawCalendar();
      loadAndDrawSlots(dk);
    });
  }

  if (appState.selectedDate){
    loadAndDrawSlots(appState.selectedDate);
  }
}

function pad2(n){ return (n < 10 ? '0' : '') + n; }

function loadAndDrawSlots(dateKey){
  var area = $('slotArea');
  if (!area) return;

  // チームプランの場合：スタッフ選択 → スロット表示
  if (shouldShowNominate()){
    loadStaffForDate(dateKey);
    return;
  }

  // ソロプラン：従来通りスロット直接表示
  area.innerHTML = '<div class="loading" style="padding:24px;"><div class="spinner"></div>空き状況を確認中...</div>';

  if (typeof dbCustomerGetAvailableSlots !== 'function'){
    area.innerHTML = '<div class="error-box">空き状況の取得に失敗しました。</div>';
    return;
  }

  var menuId = appState.selectedMenu ? appState.selectedMenu._id : '';
  var optIds = [];
  var i;

// 空きスロット計算
function computeAvailableSlots(dayData, dateKey){
  var settings = dayData.settings || appState.settings || {};
  var openMin = hhmmToMin(settings.openTime || '10:00');
  var closeMin = hhmmToMin(settings.closeTime || '19:00');
  var slotMin = (typeof settings.slotMin === 'number' && settings.slotMin > 0) ? settings.slotMin : 30;
  var intervalMin = (typeof settings.intervalMin === 'number') ? settings.intervalMin : 0;

  var needMin = totalDuration();
  if (needMin <= 0) needMin = slotMin;

  var latestStart = closeMin - needMin;

  var busy = [];
  var appts = dayData.appointments || [];
  var i;
  for (i = 0; i < appts.length; i++){
    var ap = appts[i];
    if (!ap) continue;
    if (ap.status === 'cancelled') continue;
    var s = hhmmToMin(ap.start);
    var e = ap.end ? hhmmToMin(ap.end) : (s + (ap.durationMin || slotMin));
    if (isNaN(s)) continue;
    busy.push({ start: s - intervalMin, end: e + intervalMin });
  }

  var blocks = dayData.closeBlocks || [];
  for (i = 0; i < blocks.length; i++){
    var b = blocks[i];
    if (!b) continue;
    if (b.dateKey && b.dateKey !== dateKey) continue;
    var bs = b.start ? hhmmToMin(b.start) : openMin;
    var be = b.end ? hhmmToMin(b.end) : closeMin;
    busy.push({ start: bs, end: be });
  }

  var dObj = new Date(dateKey + 'T00:00:00');
  var dow = dObj.getDay();
  var weeklyClose = settings.weeklyClose || [];
  for (i = 0; i < weeklyClose.length; i++){
    var wc = weeklyClose[i];
    if (wc && wc.dow === dow){
      busy.push({ start: hhmmToMin(wc.start), end: hhmmToMin(wc.end) });
    }
  }

  var nowMin = -1;
  var today = new Date();
  var todayKey = today.getFullYear() + '-' + pad2(today.getMonth()+1) + '-' + pad2(today.getDate());
  if (dateKey === todayKey){
    nowMin = today.getHours() * 60 + today.getMinutes();
  }

  var slots = [];
  var t;
  for (t = openMin; t <= latestStart; t += slotMin){
    var slotStart = t;
    var slotEnd = t + needMin;
    var ok = true;
    if (nowMin >= 0 && slotStart <= nowMin){ ok = false; }
    if (ok){
      var j;
      for (j = 0; j < busy.length; j++){
        if (slotStart < busy[j].end && slotEnd > busy[j].start){ ok = false; break; }
      }
    }
    slots.push({ start: minToHHMM(slotStart), available: ok });
  }
  return slots;
}

function drawSlots(slots){
  var area = $('slotArea');
  if (!area) return;

  if (!slots || slots.length === 0){
    area.innerHTML = '<div class="empty-msg">この日はご予約いただけません。</div>';
    return;
  }
  var anyAvail = false;
  var i;
  for (i = 0; i < slots.length; i++){ if (slots[i].available){ anyAvail = true; break; } }
  if (!anyAvail){
    area.innerHTML = '<div class="empty-msg">この日は空きがありません。<br>別の日をお選びください。</div>';
    return;
  }

  var html = '<div style="margin-top:18px;font-size:13px;color:var(--mu);font-weight:600;">時間を選ぶ</div>'
           + '<div class="slot-grid">';
  for (i = 0; i < slots.length; i++){
    var s = slots[i];
    var sel = (appState.selectedSlot === s.start) ? ' selected' : '';
    if (s.available){
      html += '<div class="slot' + sel + '" data-slot="' + esc(s.start) + '">' + esc(s.start) + '</div>';
    } else {
      html += '<div class="slot disabled">' + esc(s.start) + '</div>';
    }
  }
  html += '</div>';
  area.innerHTML = html;

  var slotEls = area.querySelectorAll('.slot[data-slot]');
  for (i = 0; i < slotEls.length; i++){
    slotEls[i].addEventListener('click', function(){
      appState.selectedSlot = this.getAttribute('data-slot');
      drawSlots(slots);
      setFooter(
        '<div class="footer-summary">' +
          esc(formatDateJp(appState.selectedDate)) + ' ' + esc(appState.selectedSlot) + '〜　' +
          esc(appState.selectedMenu ? appState.selectedMenu.name : '') +
        '</div>' +
        '<button class="pbtn" id="toConfirmBtn">予約内容を確認する</button>'
      );
      $('toConfirmBtn').addEventListener('click', function(){ goStep('confirm'); });
    });
  }
}

function hhmmToMin(s){
  if (!s) return NaN;
  var parts = String(s).split(':');
  if (parts.length < 2) return NaN;
  return parseInt(parts[0],10) * 60 + parseInt(parts[1],10);
}
function minToHHMM(m){
  var h = Math.floor(m / 60);
  var mi = m % 60;
  return pad2(h) + ':' + pad2(mi);
}
function formatDateJp(dateKey){
  if (!dateKey) return '';
  var p = dateKey.split('-');
  if (p.length < 3) return dateKey;
  var d = new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
  return parseInt(p[1],10) + '月' + parseInt(p[2],10) + '日(' + DOW_LABELS[d.getDay()] + ')';
}

  // 既にログイン & メール確認済みなら、ここに来るべきでない（保険）

  if (identityMode === 'verify'){ renderVerifyView(); return; }

}

function identityErr(msg){
  var el = $('identityErr');
  if (el) el.innerHTML = '<div class="error-box">' + esc(msg) + '</div>';
}

function doLogin(){
  if (appState.busy) return;
  var email = ($('emailInput').value || '').trim();
  var pass = $('passInput').value || '';
  if (!email || !pass){ identityErr('メールアドレスとパスワードを入力してください。'); return; }

  appState.busy = true;
  $('loginBtn').disabled = true;
  $('loginBtn').textContent = 'ログイン中...';

  auth.signInWithEmailAndPassword(email, pass).then(function(cred){
    appState.user = cred.user;
    appState.busy = false;
    if (!cred.user.emailVerified){
      identityMode = 'verify'; render();
      return;
    }
    // ログイン成功 → メール同期 → サロン情報取得して予約フローへ
    syncEmailIfChanged(cred.user, function(){
      loadSalonInfo();
    });
  }).catch(function(err){
    appState.busy = false;
    if ($('loginBtn')){ $('loginBtn').disabled = false; $('loginBtn').textContent = 'ログイン'; }
    identityErr(authErrorMsg(err));
  });
}

function doSignup(){
  if (appState.busy) return;
  var name = ($('nameInput').value || '').trim();
  var email = ($('emailInput').value || '').trim();
  var phone = ($('phoneInput').value || '').trim();
  var pass = $('passInput').value || '';

  if (!name){ identityErr('お名前を入力してください。'); return; }
  if (!email){ identityErr('メールアドレスを入力してください。'); return; }
  if (pass.length < 6){ identityErr('パスワードは6文字以上で入力してください。'); return; }

  appState.busy = true;
  $('signupBtn').disabled = true;
  $('signupBtn').textContent = '登録中...';

  // 新規登録時に入力された name/phone は、claim 時に Function へ渡すため保持
  appState.pendingName = name;
  appState.pendingPhone = phone;

  auth.createUserWithEmailAndPassword(email, pass).then(function(cred){
    appState.user = cred.user;
    // displayName に名前を保存（次回ログイン済みフローでも name が取れるように）
    return cred.user.updateProfile({ displayName: name });
  }).then(function(){
    // 確認メール送信
    return auth.currentUser.sendEmailVerification();
  }).then(function(){
    appState.busy = false;
    identityMode = 'verify';
    render();
  }).catch(function(err){
    appState.busy = false;
    if ($('signupBtn')){ $('signupBtn').disabled = false; $('signupBtn').textContent = '登録して確認メールを送る'; }
    identityErr(authErrorMsg(err));
  });
}

function doVerifyCheck(){
  if (appState.busy) return;
  if (!appState.user){ identityMode = 'login'; render(); return; }

  appState.busy = true;
  $('verifyCheckBtn').disabled = true;
  $('verifyCheckBtn').textContent = '確認中...';

  // 最新の emailVerified を取りにいく
  appState.user.reload().then(function(){
    var u = auth.currentUser;
    appState.user = u;
    if (u && u.emailVerified){
      // IDトークンを強制再発行（Functions側の email_verified を確実に true にする）
      return u.getIdToken(true);
    }
    // メール未確認
    appState.busy = false;
    if ($('verifyCheckBtn')){ $('verifyCheckBtn').disabled = false; $('verifyCheckBtn').textContent = '確認できたので次へ'; }
    identityErr('まだ確認が完了していないようです。メール内のリンクをタップしてから、もう一度お試しください。');
    return null;
  }).then(function(token){
    if (!token) return;
    appState.busy = false;
    loadSalonInfo();
  }).catch(function(err){
    appState.busy = false;
    if ($('verifyCheckBtn')){ $('verifyCheckBtn').disabled = false; $('verifyCheckBtn').textContent = '確認できたので次へ'; }
    identityErr(authErrorMsg(err));
  });
}

function doResendVerify(){
  if (appState.busy || !appState.user) return;
  appState.busy = true;
  $('resendBtn').disabled = true;
  $('resendBtn').textContent = '送信中...';
  appState.user.sendEmailVerification().then(function(){
    appState.busy = false;

function authErrorMsg(err){
  var code = (err && err.code) ? err.code : '';
  switch (code){
    case 'auth/invalid-email': return 'メールアドレスの形式が正しくありません。';
    case 'auth/user-not-found': return 'このメールアドレスは登録されていません。新規登録をお試しください。';
    case 'auth/wrong-password': return 'パスワードが正しくありません。';
    case 'auth/invalid-credential': return 'メールアドレスまたはパスワードが正しくありません。';
    case 'auth/email-already-in-use': return 'このメールアドレスは既に登録されています。ログインをお試しください。';
    case 'auth/weak-password': return 'パスワードは6文字以上で設定してください。';
    case 'auth/too-many-requests': return '試行回数が多すぎます。しばらく待ってからお試しください。';
    case 'auth/network-request-failed': return '通信エラーが発生しました。電波状況をご確認ください。';
    default: return 'エラーが発生しました（' + esc(code || 'unknown') + '）。もう一度お試しください。';
  }
}

// 予約確定処理：空き再チェック → claim → 予約作成
function doBooking(){
  if (appState.busy) return;
  appState.busy = true;
  var btn = $('bookBtn');
  if (btn){ btn.disabled = true; btn.textContent = '空き状況を確認中...'; }

  confirmErr('');

  // Step 0: 予約確定直前に空き状況を再取得して再判定（getAvailableSlots Function 経由）
  if (typeof dbCustomerGetAvailableSlots !== 'function'){
    bookingFail('システムエラー（空き確認関数が見つかりません）。');
    return;
  }

  var preCheckMenuId = appState.selectedMenu ? appState.selectedMenu._id : '';
  var preCheckOptIds = [];
  var j;
  for (j = 0; j < appState.selectedOptions.length; j++){
    preCheckOptIds.push(appState.selectedOptions[j]._id);
  }

  dbCustomerGetAvailableSlots(appState.selectedDate, preCheckMenuId, preCheckOptIds, function(err0, result0){
    if (err0 || !result0 || !result0.slots){
      bookingFail('空き状況の確認に失敗しました。時間をおいて再度お試しください。');
      return;
    }

    // 最新スロットで再判定
    var freshSlots = result0.slots;
    var stillAvailable = false;
    var i;
    for (i = 0; i < freshSlots.length; i++){
      if (freshSlots[i].start === appState.selectedSlot && freshSlots[i].available){
        stillAvailable = true;
        break;
      }
    }

    if (!stillAvailable){
      // 埋まっていた → stateを最新に更新して日時選択へ戻す
      appState.busy = false;
      appState.availableSlots = freshSlots;
      appState.selectedSlot = null;
      appState.slotConflictMsg = 'その時間は先に埋まりました。別の時間をお選びください。';
      goStep('date');
      return;
    }

    // 空きあり → 以降の処理へ
    if (btn){ btn.textContent = '予約を送信中...'; }

    if (typeof dbCustomerClaimMyCard !== 'function'){
      bookingFail('システムエラー（claim 関数が見つかりません）。');
      return;
    }

  var claimData = {
    name: appState.pendingName || (appState.user.displayName || ''),
    phone: appState.pendingPhone || ''
  };

  // Step 1: claim（初回予約確定の直前）
  dbCustomerClaimMyCard(claimData, function(err, res){
    if (err || !res || !res.customerDocId){
      if (res && res.result === 'needs_merge_review'){
        bookingFail('お客様の情報が複数登録されている可能性があるため、'
                  + 'サロンでの確認が必要です。お手数ですがサロンへ直接ご連絡ください。');
        return;
      }
      var msg = (err && err.message) ? err.message : 'カルテの紐付けに失敗しました。';
      bookingFail('予約処理でエラーが発生しました（' + esc(msg) + '）。時間をおいて再度お試しください。');
      return;
    }

    appState.customerDocId = res.customerDocId;

    // Step 2: 予約作成（直前にAuthを強制更新して最新メールを取得）
    if (typeof dbCustomerCreateAppointment !== 'function'){
      bookingFail('システムエラー（予約関数が見つかりません）。');
      return;
    }

    var authUser = firebase.auth().currentUser;
    var reloadPromise = authUser ? authUser.reload() : Promise.resolve();
    reloadPromise.then(function(){
      var freshUser = firebase.auth().currentUser;
      var notifyEmail = (freshUser && freshUser.email) ? freshUser.email : '';

      debugLog('[4.booking] nom=' + appState.nominatedStaffId);
      var apptData = {
        dateKey: appState.selectedDate,
        start: appState.selectedSlot,
        menuId: appState.selectedMenu._id,
        optionMenuIds: optionIds(),
        customerEmail: notifyEmail,   // 予約時点の最新メール（Auth正）
        nominatedStaffId: appState.nominatedStaffId || null  // I-step8: 指名スタッフ
      };

      dbCustomerCreateAppointment(apptData, function(err2, addRes){
        if (err2 || !addRes){
          var m2 = (err2 && err2.message) ? err2.message : '予約の作成に失敗しました。';
          bookingFail('予約の確定に失敗しました（' + esc(m2) + '）。'
                    + 'その時間帯が埋まった可能性があります。日時を選び直してください。');
          return;
        }
        appState.busy = false;
        appState.lastAppointmentId = addRes._id || null;
        goStep('complete');
      });
    });
  });
  }, appState.nominatedStaffId || null); // 確定直前チェック・nominatedStaffId追加
}

function optionIds(){
  var ids = [];
  var i;
  for (i = 0; i < appState.selectedOptions.length; i++){
    ids.push(appState.selectedOptions[i]._id);
  }
  return ids;
}

function confirmErr(msg){
  var el = $('confirmErr');
  if (!el) return;

function bookingFail(msg){
  appState.busy = false;
  var btn = $('bookBtn');
  if (btn){ btn.disabled = false; btn.textContent = 'この内容で予約する'; }
  confirmErr(msg);
  window.scrollTo(0, 0);
}

function buildStampCardHtml(stampInfo){
  // stampInfo = { customer, customerDocId, stampCard }
  var card = stampInfo ? stampInfo.stampCard : null;
  if (!card || !card.enabled) { return ''; }

  var goal  = (typeof card.goal === 'number') ? card.goal : 10;
  var count = (stampInfo.customer && typeof stampInfo.customer.stampCount === 'number')
                ? stampInfo.customer.stampCount : 0;
  var color = card.color || '#b5845a';

  // ドット HTML
  var dots = '';
  var i;
  var total = Math.max(goal, count);
  for (i = 0; i < total; i++) {
    dots += '<div class="mp-stamp-dot' + (i < count ? ' on' : '') + '"></div>';
  }

  // ボーナスメッセージ
  var bonus = '';
  if (Array.isArray(card.bonusStamps)) {
    var j;
    for (j = 0; j < card.bonusStamps.length; j++) {
      var b = card.bonusStamps[j];
      if (b && typeof b.at === 'number' && count >= b.at && b.reward) {
        bonus = '🎉 ' + b.at + '枚達成：' + esc(b.reward);
      }
    }
  }
  if (count >= goal && card.reward) {
    bonus = '🎊 ゴール達成！' + esc(card.reward);
  }

  return '<div class="mp-stamp-card">' +
    '<div class="mp-stamp-header" style="background:' + esc(color) + ';">' +
      '<div class="mp-stamp-title">🎟 スタンプカード</div>' +
      '<div class="mp-stamp-count-wrap">' +
        '<span class="mp-stamp-num">' + count + '</span>' +
        '<span class="mp-stamp-goal">&nbsp;/ ' + goal + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="mp-stamp-dots" style="background:' + esc(color) + ';">' + dots + '</div>' +
    (card.reward
      ? '<div class="mp-stamp-reward">🎁 ' + esc(card.reward) + '</div>'
      : '') +
    (bonus
      ? '<div class="mp-stamp-bonus">' + bonus + '</div>'
      : '') +
  '</div>';
}

        '<div id="mypageEmailMsg"></div>' +

        showMypageMsg(msgEl, 'err', msg);

      var newPw2 = document.getElementById('mpNewPw2').value || '';
      if (!currentPw){ showMypageMsg(msgEl, 'err', '現在のパスワードを入力してください。'); return; }
      if (newPw.length < 6){ showMypageMsg(msgEl, 'err', '新しいパスワードは6文字以上で入力してください。'); return; }
      if (newPw !== newPw2){ showMypageMsg(msgEl, 'err', '新しいパスワードが一致しません。'); return; }
      btn.disabled = true;
      btn.textContent = '変更中...';
      hideMypageMsg(msgEl);

      var user = firebase.auth().currentUser;
      if (!user){ showMypageMsg(msgEl, 'err', 'ログイン状態を確認できません。'); btn.disabled = false; btn.textContent = 'パスワードを変更'; return; }

      var credential = firebase.auth.EmailAuthProvider.credential(user.email, currentPw);
      user.reauthenticateWithCredential(credential).then(function(){
        return user.updatePassword(newPw);
      }).then(function(){
        showMypageMsg(msgEl, 'ok', 'パスワードを変更しました。');
        document.getElementById('mpCurrentPw').value = '';
        document.getElementById('mpNewPw').value = '';
        document.getElementById('mpNewPw2').value = '';
        btn.disabled = false;
        btn.textContent = 'パスワードを変更';
      }).catch(function(e){
        var msg = 'パスワードの変更に失敗しました。';
        if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') msg = '現在のパスワードが正しくありません。';
        if (e.code === 'auth/requires-recent-login') msg = 'セキュリティのため再ログインが必要です。一度ログアウトして再度ログインしてください。';
        showMypageMsg(msgEl, 'err', msg);
        btn.disabled = false;
        btn.textContent = 'パスワードを変更';
      });
    });

    document.getElementById('mypageBackBtn').addEventListener('click', function(){ goStep('menu'); });
    }); // dbCustomerGetMyStampInfo
  }).catch(function(){ // reload失敗時はそのまま続行
    appState.user = firebase.auth().currentUser;
    goStep('mypage');
  });
}

function showMypageMsg(el, type, msg){
  if (!el) return;
  el.className = 'mypage-msg ' + type;
  el.textContent = msg;
  el.style.display = 'block';
}
function hideMypageMsg(el){
  if (!el) return;
  el.style.display = 'none';
  el.textContent = '';
}

// キャンセル期限チェック
// deadline: '前日まで'|'2日前まで'|'3日前まで'
// 戻り値: true=期限内（キャンセル可）、false=期限切れ
function isCancelable(dateKey, start){
  var settings = appState.settings || {};
  var deadline = settings.deadline || '前日まで';
  var now = new Date();
  var apptDate = new Date(dateKey + 'T' + start + ':00+09:00');
  var diffDays = (apptDate.getTime() - now.getTime()) / (1000 * 60 * 60 * 24);
  if (deadline === '3日前まで') return diffDays > 3;
  if (deadline === '2日前まで') return diffDays > 2;
  return diffDays > 1; // '前日まで' デフォルト
}

// キャンセル料計算
// 戻り値: { fee: 数値, percent: 数値 }
function calcCancelFee(item){
  var pol = appState.cancelPolicy || {};
  var rates = pol.rates || [];
  if (!rates.length || !item.priceSnapshot) return { fee: 0, percent: 0 };
  var now = new Date();
  var apptDate = new Date(item.dateKey + 'T' + (item.start || '00:00') + ':00+09:00');
  var diffDays = (apptDate.getTime() - now.getTime()) / (1000 * 60 * 60 * 24);
  var percent = 0;
  var i;
  for (i = 0; i < rates.length; i++){
    var r = rates[i];
    var lbl = r.label || '';
    var m = lbl.match(/(\d+)日前/);
    if (m){
      if (diffDays <= parseInt(m[1], 10)) percent = r.percent;
    } else if (lbl.indexOf('前日') >= 0){
      if (diffDays <= 1) percent = r.percent;
    } else if (lbl.indexOf('当日') >= 0){
      if (diffDays <= 0) percent = r.percent;
    }
  }
  var fee = Math.round(item.priceSnapshot * percent / 100);
  return { fee: fee, percent: percent };
}

// キャンセル規定モーダル表示
function showPolicyModal(){
  var pol = appState.cancelPolicy || {};
  var text = pol.text || '（キャンセル規定が設定されていません）';
  var overlay = document.createElement('div');
  overlay.className = 'policy-modal-overlay';
  overlay.id = 'policyModalOverlay';
  overlay.innerHTML =
    '<div class="policy-modal-box">' +
      '<div class="policy-modal-title">キャンセル・変更ポリシー</div>' +
      '<div class="policy-modal-text" id="policyModalText"></div>' +
      '<button class="policy-modal-close" id="policyModalClose">閉じる</button>' +
    '</div>';
  document.body.appendChild(overlay);
  document.getElementById('policyModalText').textContent = text;
  document.getElementById('policyModalClose').addEventListener('click', function(){
    var el = document.getElementById('policyModalOverlay');
    if (el) el.parentNode.removeChild(el);
  });
  overlay.addEventListener('click', function(e){
    if (e.target === overlay){
      var el = document.getElementById('policyModalOverlay');
      if (el) el.parentNode.removeChild(el);
    }
  });
}

// キャンセル確認モーダル表示
function showCancelModal(item){
  var feeInfo = calcCancelFee(item);
  var hasFee = feeInfo.fee > 0;
  var menuName = item.menuNameSnapshot || item.menuId || '';
  var dateLabel = formatDateJp(item.dateKey) + ' ' + (item.start || '') + '〜';

  var warnHtml = '';
  if (hasFee){
    warnHtml =
      '<div class="modal-warn">' +
        'この予約はキャンセル料が発生する期間です。別日・別時間での取り直しをご希望の方は' +
        '一度サロンに連絡しキャンセル料・変更手数料についてご確認ください。' +
        'キャンセル・変更ポリシーは' +
        '<a href="#" id="cancelPolicyLink">こちら</a>' +
        'からもご確認いただけます。' +
      '</div>' +
      '<div class="modal-fee">' +
        'キャンセル料' +
        '<div class="modal-fee-amount">' + esc(yenSafe(feeInfo.fee)) +
          '<span style="font-size:13px;font-weight:normal;margin-left:6px;">（' + feeInfo.percent + '%）</span>' +
        '</div>' +
      '</div>';
  }

  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'cancelModalOverlay';
  overlay.innerHTML =
    '<div class="modal-sheet">' +
      '<div class="modal-title">予約をキャンセルしますか？</div>' +
      '<div class="modal-sub">' + esc(dateLabel) + '<br>' + esc(menuName) + '</div>' +
      warnHtml +
      '<button class="pbtn" id="cancelExecBtn" style="background:var(--rd);">キャンセルを実行する</button>' +
      '<button class="gbtn" id="cancelAbortBtn">戻る</button>' +
    '</div>';
  document.body.appendChild(overlay);

  if (hasFee){
    document.getElementById('cancelPolicyLink').addEventListener('click', function(e){
      e.preventDefault();
      showPolicyModal();
    });
  }

  document.getElementById('cancelAbortBtn').addEventListener('click', function(){
    var el = document.getElementById('cancelModalOverlay');
    if (el) el.parentNode.removeChild(el);
  });

  document.getElementById('cancelExecBtn').addEventListener('click', function(){
    var btn = document.getElementById('cancelExecBtn');
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    btn.textContent = '処理中...';
    doCancel(item, function(err){
      var el = document.getElementById('cancelModalOverlay');
      if (el) el.parentNode.removeChild(el);
      if (err){
        setBody('<div class="error-box">キャンセルに失敗しました。もう一度お試しください。</div>' +
                '<button class="gbtn" id="histBackBtn2">予約履歴に戻る</button>');
        var b = document.getElementById('histBackBtn2');
        if (b) b.addEventListener('click', function(){ goStep('history'); });
      } else {
        // 履歴を再描画（再取得）
        goStep('history');
      }
    });
  });
}

// キャンセル実行（Firestoreのstatus更新）
function doCancel(item, cb){
  var sid = (typeof getCurrentSalonId === 'function') ? getCurrentSalonId() : null;
  var uid = (typeof getCurrentUserUid === 'function') ? getCurrentUserUid() : null;
  if (!sid || !uid || !item._id){
    cb(new Error('not authenticated'));
    return;
  }
  var feeInfo = calcCancelFee(item);
  var db = firebase.firestore();
  var updateData = {
    status: 'cancelled_by_customer',
    cancelledBy: 'customer',
    cancelledAt: firebase.firestore.FieldValue.serverTimestamp(),
    cancelFeeSnapshot: feeInfo.fee,
    cancelFeePercentSnapshot: feeInfo.percent
  };
  db.collection('salons').doc(sid)
    .collection('appointments').doc(item._id)
    .update(updateData)
    .then(function(){ cb(null); })
    .catch(function(e){ cb(e); });
}

function renderHistoryStep(){
  setFooter('');
  showLoading('予約履歴を読み込んでいます...');

  if (typeof dbLoadCustomerHistory !== 'function'){
    setBody('<div class="error-box">予約履歴を読み込めませんでした（shared_db.js）。</div>');
    return;
  }

  dbLoadCustomerHistory(function(result){
    if (!result){
      setBody('<div class="error-box">予約履歴の取得に失敗しました。</div>');
      return;
    }

    var items = result.merged || [];

    function statusBadge(st){
      if (st === 'confirmed')           return '<span class="hist-status confirmed">確定</span>';
      if (st === 'pending')             return '<span class="hist-status pending">確認中</span>';
      if (st === 'cancelled' ||
          st === 'cancelled_by_customer') return '<span class="hist-status cancelled">キャンセル</span>';
      return '<span class="hist-status other">' + esc(st || '—') + '</span>';
    }

    function resolveMenuName(item){
      if (item.menuNameSnapshot) return item.menuNameSnapshot;
      var menus = appState.menus || [];
      var i;
      for (i = 0; i < menus.length; i++){
        if (menus[i]._id === item.menuId) return menus[i].name;
      }
      return '削除済みメニュー';
    }

    var html = '<div class="step-title">予約履歴</div>';

    if (items.length === 0){
      html += '<div class="empty-msg">予約履歴はありません。</div>';
    } else {
      var i;
      for (i = 0; i < items.length; i++){
        var item = items[i];
        var st = item.status || '';
        var menuName = resolveMenuName(item);
        var price = (item.priceSnapshot != null) ? yenSafe(item.priceSnapshot) : '';
        var duration = item.durationSnapshot ? (item.durationSnapshot + '分') : '';
        var isCancelled = (st === 'cancelled' || st === 'cancelled_by_customer' || st === 'no_show');
        var isActive = (st === 'pending' || st === 'confirmed');

        // キャンセルボタン判定
        var cancelBtnHtml = '';
        if (isActive){
          var cancelable = isCancelable(item.dateKey, item.start || '00:00');
          if (cancelable){
            cancelBtnHtml = '<button class="gbtn hist-cancel-btn" data-idx="' + i + '" style="margin-top:10px;color:var(--rd);border-color:var(--rd);">キャンセルする</button>';
          } else {
            cancelBtnHtml = '<button class="gbtn" disabled style="margin-top:10px;opacity:.5;cursor:default;">キャンセル期限を過ぎています — サロンへ直接ご連絡ください</button>';
          }
        }

        html += '<div class="hist-card">' +
          '<div class="hist-date">' + esc(formatDateJp(item.dateKey)) + ' ' + esc(item.start || '') + '〜</div>' +
          '<div class="hist-menu">' + esc(menuName) + '</div>' +
          '<div class="hist-meta">' +
            statusBadge(st) +
            (price ? '<span>' + esc(price) + '</span>' : '') +
            (duration ? '<span>' + esc(duration) + '</span>' : '') +
          '</div>' +
          cancelBtnHtml +
        '</div>';
      }
    }

    html += '<button class="gbtn" id="histBackBtn">予約画面に戻る</button>';

    setBody(html);

    // キャンセルボタンのイベント登録
    var cancelBtns = document.querySelectorAll('.hist-cancel-btn');
    var allItems = items; // クロージャ用
    var j;
    for (j = 0; j < cancelBtns.length; j++){
      (function(btn){
        var idx = parseInt(btn.getAttribute('data-idx'), 10);
        btn.addEventListener('click', function(){
          showCancelModal(allItems[idx]);
        });
      })(cancelBtns[j]);
    }

    document.getElementById('histBackBtn').addEventListener('click', function(){ goStep('menu'); });
  });
}
