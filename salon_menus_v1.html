<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>TORITA - メニュー設定</title>
<!--
  C-5 メニュー設定画面 v1（DESIGN.md 0-2 メニュースキーマ / 3-3 menusルール準拠）
  機能:
    - メニュー一覧（dbSalonListMenus、sortOrder順、公開/非公開バッジ）
    - 新規追加（dbSalonCreateMenu）
    - 編集（dbSalonUpdateMenu）
    - 削除（dbSalonDeleteMenu。注意喚起あり）
    - 並び替え（▲▼ボタンで sortOrder 更新、dbSalonReorderMenus）
    - ★2026/6/12 カテゴリ（facial/body/other、mainのみ）と複製ボタンを追加
    - ★2026/6/13 メイン一覧をカテゴリ別グループ表示に変更（▲▼はカテゴリ内で完結）
  フェーズ1方針 (DESIGN.md 0-2):
    - 「施術可能スタッフ」「必要設備」UIは出さない（自動で['owner']/['default']）
    - public/非公開トグル、main/option タイプは設定する
  ロード順序:
    firebase-*-compat → firebase-init.js → shared_db.js → shared_auth.js → shared_ui.js
  ES5 互換: var/function のみ
-->
<style>
  :root{
    --ac:#b5845a; --al:#f5ede4; --ad:#7a5535;
    --bg:#fff; --sf:#f8f7f4; --s2:#f0ede8;
    --bd:rgba(0,0,0,.10); --tx:#1a1a18; --mu:#73726c;
    --gn:#7b9e87; --gl:#eef3ef;
    --rd:#c47b7b; --rl:#faeaea; --rt:#6b1f1f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Georgia','Hiragino Mincho ProN',serif;
    background:var(--s2); color:var(--tx);
    -webkit-text-size-adjust:100%; min-height:100vh;
  }

  .topbar{
    background:#fff; border-bottom:1px solid var(--bd);
    padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:10;
  }
  .back-link{
    background:none; border:none; cursor:pointer;
    font-family:inherit; font-size:13px; color:var(--mu);
    display:flex; align-items:center; gap:5px;
  }
  .back-link:hover{color:var(--ac);}
  .topbar-title{
    font-size:15px; font-weight:600; color:var(--ad);
    letter-spacing:.03em;
  }
  .topbar-spacer{width:60px;}

  .wrap{max-width:680px; margin:0 auto; padding:18px 14px 40px;}

  .toolbar{
    display:flex; gap:9px; margin-bottom:14px;
    justify-content:flex-end;
  }
  .btn-add{
    background:var(--ac); color:#fff; border:none;
    border-radius:11px; padding:10px 20px; cursor:pointer;
    font-family:inherit; font-size:14px; font-weight:600;
  }
  .btn-add:hover{background:var(--ad);}

  /* セクション見出し */
  .sec-head{
    font-size:13px; color:var(--ad); margin:18px 4px 8px;
    letter-spacing:.05em;
  }

  /* ★ カテゴリ小見出し（メインメニュー内のグループ） */
  .cat-head{
    font-size:12px; color:var(--mu); margin:14px 6px 6px;
    letter-spacing:.06em; font-weight:600;
  }

  /* メニュー一覧 */
  .menu-list{
    background:#fff; border-radius:13px;
    box-shadow:0 4px 16px rgba(0,0,0,.07);
    overflow:hidden;
  }
  .menu-row{
    display:flex; align-items:center; gap:10px;
    padding:14px 14px; border-bottom:1px solid var(--bd);
  }
  .menu-row:last-child{border-bottom:none;}
  .menu-main{flex:1; min-width:0; cursor:pointer;}
  .menu-main:hover .menu-name{color:var(--ac);}
  .menu-name{font-size:15px; font-weight:600; color:var(--tx);}
  .menu-sub{font-size:12px; color:var(--mu); margin-top:3px;}
  .menu-badges{
    display:flex; gap:5px; flex-wrap:wrap;
    margin-top:5px;
  }
  .badge{
    font-size:11px; padding:2px 7px; border-radius:6px;
    background:var(--al); color:var(--ad);
  }
  .badge.priv{background:var(--rl); color:var(--rt);}
  .badge.opt{background:var(--gl); color:var(--gn);}

  /* 並び替えボタン */
  .reorder{
    display:flex; flex-direction:column; gap:4px;
    flex-shrink:0;
  }
  .rb{
    width:30px; height:24px; border-radius:6px;
    border:1px solid var(--bd); background:var(--sf);
    cursor:pointer; font-family:inherit; line-height:1;
    color:var(--ad); font-size:13px;
  }
  .rb:hover:not(:disabled){background:var(--al); border-color:var(--ac);}
  .rb:disabled{opacity:.35; cursor:not-allowed;}

  .empty{
    text-align:center; color:var(--mu);
    padding:48px 20px; font-size:14px;
  }

  /* パネル（C-4 と同じ構造） */
  .panel-ov{
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.42); z-index:50;
    overflow-y:auto; padding:24px 12px;
  }
  .panel-ov.show{display:block;}
  .panel{
    max-width:560px; margin:0 auto;
    background:#fff; border-radius:15px;
    box-shadow:0 12px 40px rgba(0,0,0,.22);
    overflow:hidden;
  }
  .panel-head{
    background:var(--al); padding:18px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-head h2{font-size:17px; color:var(--ad); font-weight:600;}
  .panel-close{
    background:none; border:none; cursor:pointer;
    font-size:22px; color:var(--mu); line-height:1;
  }
  .panel-body{padding:20px;}

  .field{margin-bottom:16px;}
  .field label{
    display:block; font-size:12px; color:var(--mu);
    margin-bottom:5px; letter-spacing:.02em;
  }
  .field input, .field textarea, .field select{
    width:100%; background:var(--sf);
    border:1px solid var(--bd); border-radius:9px;
    padding:10px 12px; font-family:inherit;
    font-size:14px; color:var(--tx);
  }
  .field input:focus, .field textarea:focus, .field select:focus{
    outline:none; border-color:var(--ac); background:#fff;
  }
  .field textarea{resize:vertical; min-height:60px;}
  .row-2{display:flex; gap:10px;}
  .row-2 .field{flex:1;}

  /* スイッチ風（公開/非公開トグル） */
  .toggle-row{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--sf); border:1px solid var(--bd);
    border-radius:9px; padding:10px 12px;
  }
  .toggle-row .label{font-size:14px; color:var(--tx);}
  .toggle-row .sub{font-size:11px; color:var(--mu); margin-top:2px;}
  .toggle-row .left{flex:1; min-width:0;}
  .tg{
    position:relative; width:46px; height:26px;
    background:var(--bd); border-radius:13px;
    cursor:pointer; flex-shrink:0;
    transition:background .15s;
  }
  .tg.on{background:var(--ac);}
  .tg::after{
    content:''; position:absolute; left:3px; top:3px;
    width:20px; height:20px; background:#fff;
    border-radius:50%; transition:left .15s;
    box-shadow:0 1px 3px rgba(0,0,0,.2);
  }
  .tg.on::after{left:23px;}

  .panel-actions{
    display:flex; gap:10px; padding:16px 20px;
    border-top:1px solid var(--bd); background:var(--sf);
  }
  .btn{
    flex:1; border:none; border-radius:10px;
    padding:12px; cursor:pointer;
    font-family:inherit; font-size:14px; font-weight:600;
  }
  .btn-primary{background:var(--ac); color:#fff;}
  .btn-primary:hover{background:var(--ad);}
  .btn-ghost{background:var(--s2); color:var(--mu);}
  .btn-ghost:hover{background:var(--bd);}
  .btn-danger{
    background:var(--rl); color:var(--rt);
    flex:0 0 auto; padding:12px 16px;
  }
  .btn-danger:hover{background:#f3d9d9;}

  .form-note{
    font-size:12px; color:var(--mu);
    background:var(--sf); border-radius:8px;
    padding:10px 12px; margin-bottom:16px; line-height:1.6;
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-link" onclick="goDashboard()">&#8592; 戻る</button>
  <div class="topbar-title">メニュー設定</div>
  <div class="topbar-spacer"></div>
</div>

<div class="wrap">
  <div class="toolbar">
    <button class="btn-add" onclick="openCreate()">＋ メニューを追加</button>
  </div>

  <div class="sec-head">メインメニュー</div>
  <div id="mainList">
    <div class="menu-list"><div class="empty">読み込み中...</div></div>
  </div>

  <div class="sec-head">オプションメニュー</div>
  <div class="menu-list" id="optList">
    <div class="empty">読み込み中...</div>
  </div>
</div>

<div class="panel-ov" id="panelOv">
  <div class="panel">
    <div class="panel-head">
      <h2 id="panelTitle">メニュー</h2>
      <button class="panel-close" onclick="closePanel()">&#215;</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
    <div class="panel-actions" id="panelActions"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="firebase-init.js"></script>
<script src="shared_db.js"></script>
<script src="shared_auth.js"></script>
<script src="shared_ui.js"></script>

<script>
(function () {

  var _all = [];          // 全メニュー（sortOrder昇順）
  var _mode = '';         // 'view' | 'edit' | 'create'
  var _curId = null;
  var _formPublic = true; // フォーム中の公開トグル状態

  function esc(s) {
    s = (s == null) ? '' : String(s);
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function _v(id) {
    var el = document.getElementById(id);
    return el ? String(el.value || '').trim() : '';
  }
  function _vint(id, fallback) {
    var s = _v(id);
    if (s === '') { return fallback; }
    var n = parseInt(s, 10);
    return (isNaN(n) || n < 0) ? fallback : n;
  }
  function goDashboard() {
    window.location.href = 'salon_dashboard_v1.html';
  }
  window.goDashboard = goDashboard;

  // ----- 一覧 -----
  function loadList() {
    uiShowLoading('読み込み中...');
    dbSalonListMenus(function (list) {
      uiHideLoading();
      if (list == null) {
        uiToast('メニュー一覧の取得に失敗しました');
        renderAll([]);
        return;
      }
      _all = list;
      renderAll(_all);
    });
  }

  // ★ カテゴリ判定（未設定は 'other' 扱い。顧客アプリと同じルール）
  function _catKey(m) {
    return (m && (m.category === 'facial' || m.category === 'body'))
      ? m.category : 'other';
  }

  function renderAll(list) {
    var mains = [];
    var opts  = [];
    var i;
    for (i = 0; i < list.length; i++) {
      if (list[i] && list[i].type === 'option') {
        opts.push(list[i]);
      } else {
        mains.push(list[i]);
      }
    }
    renderMainGroups(document.getElementById('mainList'), mains);
    renderSection(document.getElementById('optList'),  opts,  'option');
  }

  // ★ メインメニューをカテゴリ別（フェイシャル/ボディ/その他）に
  //   小見出し付きでグループ表示。空のカテゴリは出さない。
  //   ▲▼並び替えはカテゴリ内に閉じる。
  function renderMainGroups(box, mains) {
    box.innerHTML = '';
    if (!mains || mains.length === 0) {
      var card0 = document.createElement('div');
      card0.className = 'menu-list';
      var em = document.createElement('div');
      em.className = 'empty';
      em.textContent = 'メインメニューはまだありません';
      card0.appendChild(em);
      box.appendChild(card0);
      return;
    }
    var defs = [
      { key: 'facial', label: 'フェイシャル' },
      { key: 'body',   label: 'ボディ' },
      { key: 'other',  label: 'その他' }
    ];
    var g, i;
    for (g = 0; g < defs.length; g++) {
      var glist = [];
      for (i = 0; i < mains.length; i++) {
        if (_catKey(mains[i]) === defs[g].key) { glist.push(mains[i]); }
      }
      if (glist.length === 0) { continue; }
      var head = document.createElement('div');
      head.className = 'cat-head';
      head.textContent = defs[g].label;
      box.appendChild(head);
      var card = document.createElement('div');
      card.className = 'menu-list';
      for (i = 0; i < glist.length; i++) {
        card.appendChild(buildRow(glist[i], glist, i, defs[g].key));
      }
      box.appendChild(card);
    }
  }

  function renderSection(box, list, kind) {
    box.innerHTML = '';
    if (!list || list.length === 0) {
      var em = document.createElement('div');
      em.className = 'empty';
      em.textContent = (kind === 'option')
        ? 'オプションメニューはまだありません'
        : 'メインメニューはまだありません';
      box.appendChild(em);
      return;
    }
    var i;
    for (i = 0; i < list.length; i++) {
      box.appendChild(buildRow(list[i], list, i, kind));
    }
  }

  // ★ カテゴリ表示名（facial/body/other → 日本語）
  function _catLabel(c) {
    if (c === 'facial') { return 'フェイシャル'; }
    if (c === 'body') { return 'ボディ'; }
    return 'その他';
  }

  function buildRow(m, sectionList, idxInSection, kind) {
    var row = document.createElement('div');
    row.className = 'menu-row';

    // 並び替え
    var rb = document.createElement('div');
    rb.className = 'reorder';
    var up = document.createElement('button');
    up.className = 'rb';
    up.textContent = '\u25B2';
    if (idxInSection === 0) { up.disabled = true; }
    up.onclick = function () {
      moveItem(m._id, kind, -1);
    };
    var dn = document.createElement('button');
    dn.className = 'rb';
    dn.textContent = '\u25BC';
    if (idxInSection === sectionList.length - 1) { dn.disabled = true; }
    dn.onclick = function () {
      moveItem(m._id, kind, +1);
    };
    rb.appendChild(up);
    rb.appendChild(dn);
    row.appendChild(rb);

    // 本体
    var main = document.createElement('div');
    main.className = 'menu-main';
    main.onclick = function () { openDetail(m._id); };

    var nm = document.createElement('div');
    nm.className = 'menu-name';
    nm.textContent = m.name || '(名前なし)';
    main.appendChild(nm);

    var sub = document.createElement('div');
    sub.className = 'menu-sub';
    var bits = [];
    if (typeof m.duration === 'number') { bits.push(m.duration + ' 分'); }
    if (typeof m.price === 'number') {
      bits.push('¥' + m.price.toLocaleString());
    }
    sub.textContent = bits.join('  ・  ');
    main.appendChild(sub);

    var bd = document.createElement('div');
    bd.className = 'menu-badges';
    // ★ カテゴリはグループ見出し表示に変更したためバッジは廃止（2026/6/13）
    if (m.type === 'option') {
      var b1 = document.createElement('span');
      b1.className = 'badge opt';
      b1.textContent = 'オプション';
      bd.appendChild(b1);
    }
    if (m.public === false) {
      var b2 = document.createElement('span');
      b2.className = 'badge priv';
      b2.textContent = '非公開';
      bd.appendChild(b2);
    }
    if (bd.childNodes.length > 0) {
      main.appendChild(bd);
    }

    row.appendChild(main);
    return row;
  }

  // ----- 並び替え -----
  // ★ kind は 'option' / 'facial' / 'body' / 'other' のいずれか（グループキー）。
  //   並び替えは同グループ内に閉じる。sortOrder はグループ内で 0..n-1 に振り直す
  //   （グループごとに独立して表示順を決めるので、グループ間で値が重複しても問題ない）。
  function moveItem(menuId, kind, dir) {
    var section = [];
    var i;
    for (i = 0; i < _all.length; i++) {
      var t;
      if (kind === 'option') {
        t = (_all[i].type === 'option') ? 'option' : '';
      } else {
        t = (_all[i].type === 'option') ? '' : _catKey(_all[i]);
      }
      if (t === kind) { section.push(_all[i]); }
    }
    // 現在位置
    var idx = -1;
    for (i = 0; i < section.length; i++) {
      if (section[i]._id === menuId) { idx = i; break; }
    }
    if (idx < 0) { return; }
    var newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= section.length) { return; }
    // 入れ替え
    var tmp = section[idx];
    section[idx] = section[newIdx];
    section[newIdx] = tmp;
    // sortOrder を 0..n-1 で振り直し
    var orderList = [];
    for (i = 0; i < section.length; i++) {
      orderList.push({ _id: section[i]._id, sortOrder: i });
      section[i].sortOrder = i;
    }

    // ローカル先行反映（楽観UIだが保存待ち中も操作ロック）
    uiShowLoading('並び替え中...');
    dbSalonReorderMenus(orderList, function (ok) {
      uiHideLoading();
      if (!ok) {
        uiToast('並び替えの保存に失敗しました');
        // 失敗時は再取得で実体に合わせる
        loadList();
        return;
      }
      // _all をローカルでも再ソート
      _all.sort(function (a, b) {
        var at = (a.type === 'option') ? 1 : 0;
        var bt = (b.type === 'option') ? 1 : 0;
        if (at !== bt) { return at - bt; }
        var ao = (typeof a.sortOrder === 'number') ? a.sortOrder : 999999;
        var bo = (typeof b.sortOrder === 'number') ? b.sortOrder : 999999;
        return ao - bo;
      });
      renderAll(_all);
    });
  }

  // ----- 詳細 -----
  function openDetail(menuId) {
    _mode = 'view';
    _curId = menuId;
    var m = null;
    var i;
    for (i = 0; i < _all.length; i++) {
      if (_all[i]._id === menuId) { m = _all[i]; break; }
    }
    if (!m) {
      uiToast('メニューが見つかりません');
      return;
    }
    renderDetail(m);
    showPanel();
  }

  function renderDetail(m) {
    document.getElementById('panelTitle').textContent = m.name || 'メニュー';
    var body = document.getElementById('panelBody');
    body.innerHTML = '';

    body.appendChild(_roField('メニュー名', m.name || '-'));
    body.appendChild(_roField('種別',
      (m.type === 'option') ? 'オプション' : 'メイン'));
    if (m.type !== 'option') {
      body.appendChild(_roField('カテゴリ', _catLabel(m.category)));
    }
    body.appendChild(_roField('施術時間', (m.duration || 0) + ' 分'));
    body.appendChild(_roField('料金',
      '¥' + (m.price || 0).toLocaleString()));
    body.appendChild(_roField('公開状態',
      (m.public === false) ? '非公開（顧客には見えません）' : '公開'));
    if (m.description) {
      body.appendChild(_roField('説明', m.description));
    }
    if (m.contraindications) {
      body.appendChild(_roField('禁忌・注意', m.contraindications));
    }

    var act = document.getElementById('panelActions');
    act.innerHTML = '';
    var bEdit = document.createElement('button');
    bEdit.className = 'btn btn-primary';
    bEdit.textContent = '編集';
    bEdit.onclick = function () { openEdit(m); };
    act.appendChild(bEdit);
    // ★ 複製: 内容をコピーした新規フォームを開く（保存するまで作成されない）
    var bDup = document.createElement('button');
    bDup.className = 'btn btn-ghost';
    bDup.textContent = '複製';
    bDup.onclick = function () { openDuplicate(m); };
    act.appendChild(bDup);
    var bClose = document.createElement('button');
    bClose.className = 'btn btn-ghost';
    bClose.textContent = '閉じる';
    bClose.onclick = closePanel;
    act.appendChild(bClose);
  }

  function _roField(label, val) {
    var f = document.createElement('div');
    f.className = 'field';
    var l = document.createElement('label');
    l.textContent = label;
    f.appendChild(l);
    var d = document.createElement('div');
    d.style.fontSize = '14px';
    d.style.color = 'var(--tx)';
    d.style.padding = '4px 0';
    d.style.whiteSpace = 'pre-wrap';
    d.textContent = val;
    f.appendChild(d);
    return f;
  }

  // ----- 編集 -----
  function openEdit(m) {
    _mode = 'edit';
    _curId = m._id;
    _formPublic = (m.public !== false);
    document.getElementById('panelTitle').textContent = 'メニューを編集';
    renderForm(m);

    var act = document.getElementById('panelActions');
    act.innerHTML = '';
    var bSave = document.createElement('button');
    bSave.className = 'btn btn-primary';
    bSave.textContent = '保存';
    bSave.onclick = saveEdit;
    act.appendChild(bSave);
    var bCancel = document.createElement('button');
    bCancel.className = 'btn btn-ghost';
    bCancel.textContent = 'キャンセル';
    bCancel.onclick = function () { openDetail(_curId); };
    act.appendChild(bCancel);
    var bDel = document.createElement('button');
    bDel.className = 'btn btn-danger';
    bDel.textContent = '削除';
    bDel.onclick = doDelete;
    act.appendChild(bDel);
  }

  function saveEdit() {
    var name = _v('fName');
    if (!name) { uiToast('メニュー名は必須です'); return; }
    var dur = _vint('fDur', -1);
    if (dur <= 0) { uiToast('施術時間（分）は1以上を入れてください'); return; }
    var pr = _vint('fPrice', 0);
    var sel = document.getElementById('fType');
    var typ = (sel && sel.value === 'option') ? 'option' : 'main';
    // ★ カテゴリ（mainのみ。optionのときは送らない＝既存値はそのまま）
    var catSel = document.getElementById('fCat');
    var cat = (typ === 'main' && catSel) ? catSel.value : null;
    if (cat !== 'facial' && cat !== 'body' && cat !== 'other') { cat = null; }

    var patch = {
      name: name,
      duration: dur,
      price: pr,
      type: typ,
      public: _formPublic,
      description: _v('fDesc'),
      contraindications: _v('fContra')
    };
    if (cat) { patch.category = cat; }

    uiShowLoading('保存中...');
    dbSalonUpdateMenu(_curId, patch, function (ok) {
      uiHideLoading();
      if (!ok) { uiToast('保存に失敗しました'); return; }
      uiToast('保存しました');
      // ローカル更新
      var i;
      for (i = 0; i < _all.length; i++) {
        if (_all[i]._id === _curId) {
          _all[i].name = patch.name;
          _all[i].duration = patch.duration;
          _all[i].price = patch.price;
          _all[i].type = patch.type;
          _all[i].public = patch.public;
          _all[i].description = patch.description;
          _all[i].contraindications = patch.contraindications;
          if (patch.category) { _all[i].category = patch.category; }
          break;
        }
      }
      openDetail(_curId);
      renderAll(_all);
    });
  }

  function doDelete() {
    uiConfirmDelete(
      'このメニューを削除します。よろしいですか？'
      + '\n（過去予約は名前のスナップショットが残るので影響しませんが、'
      + '今後の予約導線から外したいだけなら「非公開」にする方が安全です）',
      function () {
        uiShowLoading('削除中...');
        dbSalonDeleteMenu(_curId, function (ok) {
          uiHideLoading();
          if (!ok) { uiToast('削除に失敗しました'); return; }
          uiToast('削除しました');
          var i;
          for (i = 0; i < _all.length; i++) {
            if (_all[i]._id === _curId) { _all.splice(i, 1); break; }
          }
          closePanel();
          renderAll(_all);
        });
      },
      null
    );
  }

  // ----- 新規 -----
  function openCreate() {
    _mode = 'create';
    _curId = null;
    _formPublic = true;
    document.getElementById('panelTitle').textContent = 'メニューを追加';
    renderForm(null);

    var act = document.getElementById('panelActions');
    act.innerHTML = '';
    var bSave = document.createElement('button');
    bSave.className = 'btn btn-primary';
    bSave.textContent = '追加';
    bSave.onclick = doCreate;
    act.appendChild(bSave);
    var bCancel = document.createElement('button');
    bCancel.className = 'btn btn-ghost';
    bCancel.textContent = 'キャンセル';
    bCancel.onclick = closePanel;
    act.appendChild(bCancel);

    showPanel();
  }
  window.openCreate = openCreate;

  // ----- 複製 -----
  // 既存メニューの内容をコピーした「新規追加」フォームを開く。
  // 名前に「のコピー」を付ける。「追加」を押すまでFirestoreには書き込まれない。
  function openDuplicate(m) {
    _mode = 'create';
    _curId = null;
    _formPublic = (m.public !== false);
    document.getElementById('panelTitle').textContent = 'メニューを複製';
    renderForm({
      name: (m.name || '') + 'のコピー',
      duration: m.duration,
      price: m.price,
      type: m.type,
      category: m.category,
      public: m.public,
      description: m.description,
      contraindications: m.contraindications
    });

    var act = document.getElementById('panelActions');
    act.innerHTML = '';
    var bSave = document.createElement('button');
    bSave.className = 'btn btn-primary';
    bSave.textContent = '追加';
    bSave.onclick = doCreate;
    act.appendChild(bSave);
    var bCancel = document.createElement('button');
    bCancel.className = 'btn btn-ghost';
    bCancel.textContent = 'キャンセル';
    bCancel.onclick = closePanel;
    act.appendChild(bCancel);

    showPanel();
  }

  function doCreate() {
    var name = _v('fName');
    if (!name) { uiToast('メニュー名は必須です'); return; }
    var dur = _vint('fDur', -1);
    if (dur <= 0) { uiToast('施術時間（分）は1以上を入れてください'); return; }
    var pr = _vint('fPrice', 0);
    var sel = document.getElementById('fType');
    var typ = (sel && sel.value === 'option') ? 'option' : 'main';
    // ★ カテゴリ（mainのみ）
    var catSel = document.getElementById('fCat');
    var cat = (typ === 'main' && catSel) ? catSel.value : null;
    if (cat !== 'facial' && cat !== 'body' && cat !== 'other') { cat = null; }
    // 新規は同種別の末尾に配置（既存の最大 sortOrder + 1）
    var maxSo = -1;
    var i;
    for (i = 0; i < _all.length; i++) {
      var t = (_all[i].type === 'option') ? 'option' : 'main';
      if (t !== typ) { continue; }
      var so = (typeof _all[i].sortOrder === 'number')
        ? _all[i].sortOrder : -1;
      if (so > maxSo) { maxSo = so; }
    }
    var data = {
      name: name,
      duration: dur,
      price: pr,
      type: typ,
      public: _formPublic,
      description: _v('fDesc'),
      contraindications: _v('fContra'),
      sortOrder: maxSo + 1
    };
    if (cat) { data.category = cat; }

    uiShowLoading('追加中...');
    dbSalonCreateMenu(data, function (res) {
      uiHideLoading();
      if (res == null || !res._id) {
        uiToast('追加に失敗しました');
        return;
      }
      uiToast('追加しました');
      var newM = {
        _id: res._id,
        name: data.name,
        duration: data.duration,
        price: data.price,
        type: data.type,
        category: data.category,
        public: data.public,
        description: data.description,
        contraindications: data.contraindications,
        sortOrder: data.sortOrder,
        eligibleStaffIds: ['owner'],
        requiredResourceIds: ['default']
      };
      _all.push(newM);
      _all.sort(function (a, b) {
        var at = (a.type === 'option') ? 1 : 0;
        var bt = (b.type === 'option') ? 1 : 0;
        if (at !== bt) { return at - bt; }
        var ao = (typeof a.sortOrder === 'number') ? a.sortOrder : 999999;
        var bo = (typeof b.sortOrder === 'number') ? b.sortOrder : 999999;
        return ao - bo;
      });
      closePanel();
      renderAll(_all);
    });
  }

  // ----- フォーム共通 -----
  function renderForm(m) {
    var body = document.getElementById('panelBody');
    body.innerHTML = '';

    var note = document.createElement('div');
    note.className = 'form-note';
    note.textContent =
      '「公開」をオンにすると、顧客の予約画面に表示されます。'
      + 'オフにすると下書き・内部用として保管できます（顧客には見えません）。';
    body.appendChild(note);

    body.appendChild(_inField('メニュー名（必須）',
      'fName', m ? m.name : '', 'text'));

    // 種別セレクト
    var ft = document.createElement('div');
    ft.className = 'field';
    var fl = document.createElement('label');
    fl.textContent = '種別';
    ft.appendChild(fl);
    var sel = document.createElement('select');
    sel.id = 'fType';
    var o1 = document.createElement('option');
    o1.value = 'main'; o1.textContent = 'メイン';
    var o2 = document.createElement('option');
    o2.value = 'option'; o2.textContent = 'オプション';
    sel.appendChild(o1); sel.appendChild(o2);
    if (m && m.type === 'option') { sel.value = 'option'; }
    else { sel.value = 'main'; }
    ft.appendChild(sel);
    body.appendChild(ft);

    // ★ カテゴリセレクト（mainのみ。オプション選択時は非表示）
    var fc = document.createElement('div');
    fc.className = 'field';
    fc.id = 'fCatField';
    var fcl = document.createElement('label');
    fcl.textContent = 'カテゴリ（顧客の予約画面の分類に使われます）';
    fc.appendChild(fcl);
    var csel = document.createElement('select');
    csel.id = 'fCat';
    var c1 = document.createElement('option');
    c1.value = 'facial'; c1.textContent = 'フェイシャル';
    var c2 = document.createElement('option');
    c2.value = 'body'; c2.textContent = 'ボディ';
    var c3 = document.createElement('option');
    c3.value = 'other'; c3.textContent = 'その他';
    csel.appendChild(c1); csel.appendChild(c2); csel.appendChild(c3);
    if (m && (m.category === 'facial' || m.category === 'body')) {
      csel.value = m.category;
    } else {
      csel.value = 'other';
    }
    fc.appendChild(csel);
    if (sel.value === 'option') { fc.style.display = 'none'; }
    body.appendChild(fc);

    // 種別を切り替えたらカテゴリ欄の表示/非表示を連動
    sel.onchange = function () {
      var f = document.getElementById('fCatField');
      if (!f) { return; }
      f.style.display = (sel.value === 'option') ? 'none' : '';
    };

    var r2 = document.createElement('div');
    r2.className = 'row-2';
    r2.appendChild(_inField('施術時間（分・必須）',
      'fDur', m ? String(m.duration || '') : '', 'number'));
    r2.appendChild(_inField('料金（円）',
      'fPrice', m ? String(m.price || '') : '', 'number'));
    body.appendChild(r2);

    // 公開トグル
    var tr = document.createElement('div');
    tr.className = 'toggle-row';
    var left = document.createElement('div');
    left.className = 'left';
    var lab = document.createElement('div');
    lab.className = 'label';
    lab.textContent = '公開（予約画面に表示）';
    left.appendChild(lab);
    var sub = document.createElement('div');
    sub.className = 'sub';
    sub.textContent = 'オフ=下書き・内部用';
    left.appendChild(sub);
    tr.appendChild(left);
    var tg = document.createElement('div');
    tg.className = _formPublic ? 'tg on' : 'tg';
    tg.id = 'fPubTg';
    tg.onclick = function () {
      _formPublic = !_formPublic;
      tg.className = _formPublic ? 'tg on' : 'tg';
    };
    tr.appendChild(tg);
    var ftog = document.createElement('div');
    ftog.className = 'field';
    ftog.appendChild(tr);
    body.appendChild(ftog);

    body.appendChild(_taField('説明（顧客の予約画面に表示）',
      'fDesc', m ? (m.description || '') : ''));
    body.appendChild(_taField('禁忌・注意事項（顧客の予約画面に表示）',
      'fContra', m ? (m.contraindications || '') : ''));
  }

  function _inField(label, id, val, type) {
    var f = document.createElement('div');
    f.className = 'field';
    var l = document.createElement('label');
    l.textContent = label;
    f.appendChild(l);
    var inp = document.createElement('input');
    inp.type = type || 'text';
    inp.id = id;
    inp.value = (val == null) ? '' : val;
    if (type === 'number') { inp.inputMode = 'numeric'; }
    f.appendChild(inp);
    return f;
  }
  function _taField(label, id, val) {
    var f = document.createElement('div');
    f.className = 'field';
    var l = document.createElement('label');
    l.textContent = label;
    f.appendChild(l);
    var ta = document.createElement('textarea');
    ta.id = id;
    ta.value = (val == null) ? '' : val;
    f.appendChild(ta);
    return f;
  }

  function showPanel() {
    document.getElementById('panelOv').className = 'panel-ov show';
  }
  function closePanel() {
    document.getElementById('panelOv').className = 'panel-ov';
    _mode = '';
    _curId = null;
  }
  window.closePanel = closePanel;

  document.getElementById('panelOv').onclick = function (e) {
    if (e.target === this) { closePanel(); }
  };

  onFbReady(function () {
    requireSalonStaff(function (isStaff) {
      if (!isStaff) {
        window.location.href = 'salon_auth_v2_new.html';
        return;
      }
      loadList();
    });
  });

})();
</script>
</body>
</html>
