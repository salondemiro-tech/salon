<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TORITA - ダッシュボード</title>
<!--
  salon_dashboard_v1.html  -  TORITA Phase C / C-2  ★DEBUG版
  この版は checkPlan の結果(uid/email/exists/planStatus)を画面に表示する。
  原因特定後、通常版に戻すこと。
-->
<style>
  :root{
    --ac:#b5845a; --al:#f5ede4; --ad:#7a5535;
    --bg:#fff; --sf:#f8f7f4; --s2:#f0ede8;
    --bd:rgba(0,0,0,.10); --tx:#1a1a18; --mu:#73726c;
    --gn:#7b9e87; --gl:#eef3ef;
    --rd:#c47b7b; --rl:#faeaea; --rt:#6b1f1f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Georgia','Hiragino Mincho ProN',serif;
    background:var(--s2);
    color:var(--tx);
    -webkit-text-size-adjust:100%;
    min-height:100vh;
  }
  .topbar{
    background:#fff; border-bottom:1px solid var(--bd);
    padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:10;
  }
  .brand{display:flex; flex-direction:column;}
  .brand-mark{
    font-size:20px; color:var(--ac); font-weight:600;
    letter-spacing:.05em; line-height:1.2;
  }
  .brand-sub{font-size:10px; color:var(--mu); letter-spacing:.04em;}
  .logout-btn{
    background:none; border:1.5px solid var(--bd);
    border-radius:9px; padding:8px 14px;
    font-size:12.5px; color:var(--mu); cursor:pointer;
    font-family:inherit;
  }
  .logout-btn:hover{border-color:var(--ac); color:var(--ac);}
  .wrap{max-width:760px; margin:0 auto; padding:22px 18px 40px;}

  /* ===== DEBUG パネル ===== */
  .debug-box{
    background:#1a1a18; color:#9fe89f;
    border-radius:12px; padding:16px 18px; margin-bottom:20px;
    font-family:monospace; font-size:14px; line-height:1.9;
    word-break:break-all; white-space:pre-wrap;
  }
  .debug-box b{color:#ffd27a;}

  .salon-card{
    background:#fff; border-radius:16px;
    box-shadow:0 6px 24px rgba(0,0,0,.09);
    padding:24px 22px; margin-bottom:22px;
  }
  .salon-name{
    font-size:22px; font-weight:600; color:var(--ad);
    margin-bottom:6px; word-break:break-word;
  }
  .salon-meta{font-size:13px; color:var(--mu); line-height:1.9;}
  .salon-meta .label{
    display:inline-block; min-width:78px; color:var(--ac); font-weight:600;
  }
  .skeleton{
    color:transparent; background:var(--s2);
    border-radius:6px; display:inline-block; min-width:120px;
  }
  .sec-title{
    font-size:13px; color:var(--mu); font-weight:600;
    letter-spacing:.05em; margin:4px 4px 12px;
  }
  .nav-grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:13px;}
  @media (min-width:560px){.nav-grid{grid-template-columns:repeat(3, 1fr);}}
  .nav-card{
    background:#fff; border:1px solid var(--bd);
    border-radius:14px; padding:20px 16px;
    text-align:center; cursor:pointer;
    transition:transform .12s, box-shadow .12s, border-color .12s;
    text-decoration:none; color:var(--tx);
    display:flex; flex-direction:column; align-items:center;
    min-height:118px; justify-content:center;
  }
  .nav-card:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 22px rgba(0,0,0,.10);
    border-color:var(--ac);
  }
  .nav-card.disabled{cursor:default; opacity:.55;}
  .nav-card.disabled:hover{transform:none; box-shadow:none; border-color:var(--bd);}
  .nav-ico{font-size:26px; margin-bottom:9px; line-height:1;}
  .nav-label{font-size:14px; font-weight:600; color:var(--ad); margin-bottom:3px;}
  .nav-desc{font-size:11px; color:var(--mu); line-height:1.5;}
  .nav-badge{
    display:inline-block; margin-top:7px;
    font-size:10px; color:var(--mu);
    background:var(--s2); border-radius:10px; padding:2px 9px;
  }
  .customer-url-box{
    margin-top:14px;
    background:var(--sf); border:1px solid var(--bd);
    border-radius:10px; padding:12px 14px;
  }
  .customer-url-label{
    font-size:11px; color:var(--ac); font-weight:600;
    letter-spacing:.04em; margin-bottom:6px;
  }
  .customer-url-row{display:flex; align-items:center; gap:8px;}
  .customer-url-text{
    font-size:11.5px; color:var(--tx);
    word-break:break-all; flex:1; line-height:1.5;
  }
  .copy-btn{
    flex-shrink:0; background:var(--ac); color:#fff;
    border:none; border-radius:8px;
    padding:6px 12px; font-size:11.5px;
    cursor:pointer; font-family:inherit; white-space:nowrap;
  }
  .copy-btn:active{opacity:.8;}
  footer{
    text-align:center; font-size:10.5px; color:var(--mu);
    margin-top:26px; letter-spacing:.03em;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="brand-mark">TORITA</span>
    <span class="brand-sub">SALON MANAGER (DEBUG)</span>
  </div>
  <button class="logout-btn" onclick="doLogout()">ログアウト</button>
</div>

<div class="wrap">

  <!-- ★DEBUG: 結果をここに表示 -->
  <div class="debug-box" id="debugBox">診断中...</div>

  <div class="salon-card">
    <div class="salon-name" id="salonName">
      <span class="skeleton">読み込み中</span>
    </div>
    <div class="salon-meta">
      <div>
        <span class="label">営業時間</span>
        <span id="salonHours"><span class="skeleton">--:-- 〜 --:--</span></span>
      </div>
      <div>
        <span class="label">メール</span>
        <span id="salonEmail"><span class="skeleton">loading</span></span>
      </div>
    </div>
    <div class="customer-url-box">
      <div class="customer-url-label">📋 顧客用予約URL（お客様にお渡しください）</div>
      <div class="customer-url-row">
        <div class="customer-url-text" id="customerUrl"><span class="skeleton">読み込み中</span></div>
        <button class="copy-btn" onclick="copyCustomerUrl()">コピー</button>
      </div>
    </div>
  </div>

  <div class="sec-title">予約・顧客</div>
  <div class="nav-grid" id="navGrid1"></div>

  <div class="sec-title" style="margin-top:22px;">店舗設定</div>
  <div class="nav-grid" id="navGrid2"></div>

  <footer>&copy; TORITA</footer>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="firebase-init.js"></script>
<script src="shared_db.js"></script>
<script src="shared_auth.js"></script>
<script src="shared_ui.js"></script>

<script>
(function () {

  // ★DEBUG: 画面とalertの両方に出す
  function debugShow(text) {
    var el = document.getElementById('debugBox');
    if (el) { el.innerHTML = text; }
  }

  var NAV1 = [
    { ico: '\uD83D\uDCC5', label: 'カレンダー', desc: '予約の確認・登録',
      href: 'salon_calendar_v8.html', ready: true },
    { ico: '\uD83D\uDC65', label: '顧客管理', desc: '顧客一覧・詳細',
      href: 'salon_customers_v1.html', ready: true },
    { ico: '\uD83D\uDCCB', label: '顧客カルテ', desc: '施術履歴・メモ・写真',
      href: 'salon_karte_v1.html', ready: true }
  ];
  var NAV2 = [
    { ico: '\u2702\uFE0F', label: 'メニュー設定', desc: 'メニュー・料金',
      href: 'salon_menus_v1.html', ready: true },
    { ico: '\uD83D\uDD52', label: '営業時間', desc: '開店・定休日',
      href: 'salon_hours_v1.html', ready: true },
    { ico: '\uD83D\uDCDD', label: 'キャンセル規定', desc: 'キャンセル受付',
      href: 'salon_cancel_v1.html', ready: true },
    { ico: '\u2B50', label: 'スタンプ設定', desc: 'スタンプカード',
      href: 'salon_stamp_v1.html', ready: true }
  ];

  function buildCard(item) {
    var card = document.createElement(item.ready ? 'a' : 'div');
    card.className = 'nav-card' + (item.ready ? '' : ' disabled');
    if (item.ready) { card.setAttribute('href', item.href); }
    var ico = document.createElement('div');
    ico.className = 'nav-ico'; ico.textContent = item.ico; card.appendChild(ico);
    var lbl = document.createElement('div');
    lbl.className = 'nav-label'; lbl.textContent = item.label; card.appendChild(lbl);
    var desc = document.createElement('div');
    desc.className = 'nav-desc'; desc.textContent = item.desc; card.appendChild(desc);
    if (!item.ready) {
      var badge = document.createElement('span');
      badge.className = 'nav-badge'; badge.textContent = '準備中'; card.appendChild(badge);
    }
    return card;
  }
  function renderNav() {
    var g1 = document.getElementById('navGrid1');
    var g2 = document.getElementById('navGrid2');
    var i;
    for (i = 0; i < NAV1.length; i++) { g1.appendChild(buildCard(NAV1[i])); }
    for (i = 0; i < NAV2.length; i++) { g2.appendChild(buildCard(NAV2[i])); }
  }
  function setText(id, text) {
    var el = document.getElementById(id);
    if (el) { el.textContent = (text == null) ? '' : String(text); }
  }
  function renderSalon(data) {
    var info = (data && data.info) ? data.info : null;
    var settings = (data && data.settings) ? data.settings : null;
    if (info && info.name) {
      setText('salonName', info.name);
      document.title = 'TORITA - ' + info.name;
    } else { setText('salonName', '(サロン名未設定)'); }
    setText('salonEmail', (info && info.email) ? info.email : '-');
    if (settings && settings.openTime && settings.closeTime) {
      setText('salonHours', settings.openTime + ' 〜 ' + settings.closeTime);
    } else { setText('salonHours', '-'); }
  }

  var _customerUrl = '';
  function setCustomerUrl(salonId) {
    var base = window.location.href.replace(/\/[^\/]*$/, '/');
    _customerUrl = base + 'customer_app_v2.html?salon=' + salonId;
    var el = document.getElementById('customerUrl');
    if (el) { el.textContent = _customerUrl; }
  }
  function copyCustomerUrl() {
    if (!_customerUrl) { return; }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(_customerUrl).then(function () {
        uiToast('URLをコピーしました');
      }).catch(function () { _fallbackCopy(_customerUrl); });
    } else { _fallbackCopy(_customerUrl); }
  }
  window.copyCustomerUrl = copyCustomerUrl;
  function _fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); uiToast('URLをコピーしました'); }
    catch (e) { uiToast('コピーに失敗しました'); }
    document.body.removeChild(ta);
  }
  function doLogout() {
    uiConfirm('ログアウトしますか?', function () {
      authLogout(function () { window.location.href = 'salon_auth_v2_new.html'; });
    });
  }
  window.doLogout = doLogout;

  renderNav();

  onFbReady(function () {
    requireSalonStaff(function (isStaff) {
      if (!isStaff) {
        debugShow('<b>結果:</b> isStaff=false → ログイン画面へ飛ばされる状態');
        window.alert('isStaff=false (サロン本人と認識されていない)');
        return;
      }

      var user = firebase.auth().currentUser;
      var uid = user ? user.uid : null;
      var email = user ? user.email : null;

      if (!uid) {
        debugShow('<b>結果:</b> uid=null');
        window.alert('uid=null');
        return;
      }

      // ★ ローディングは出さない（固まり防止）。代わりに毎回 debugShow。
      var isJustCheckedOut =
        window.location.search.indexOf('checkout=success') >= 0;

      function checkPlan(retriesLeft) {
        debugShow(
          '診断中... 残りリトライ=' + retriesLeft + '<br>' +
          '<b>uid:</b> ' + uid + '<br>' +
          '<b>email:</b> ' + email + '<br>' +
          '<b>checkout=success?:</b> ' + isJustCheckedOut
        );

        firebase.firestore()
          .collection('salons').doc(uid)
          .collection('config').doc('settings')
          .get()
          .then(function (doc) {
            var exists = doc.exists;
            var st = exists ? (doc.data().planStatus || null) : null;

            var msg =
              'uid=' + uid + '\n' +
              'email=' + email + '\n' +
              'exists=' + exists + '\n' +
              'planStatus=' + st;

            debugShow(
              '<b>=== 診断結果 ===</b><br>' +
              '<b>uid:</b> ' + uid + '<br>' +
              '<b>email:</b> ' + email + '<br>' +
              '<b>doc.exists:</b> ' + exists + '<br>' +
              '<b>planStatus:</b> ' + st + '<br>' +
              '<b>checkout=success?:</b> ' + isJustCheckedOut
            );

            // ★ここで必ずalertを出す（iPadでも確実に見える）
            window.alert('【診断結果】\n' + msg);

            if (st === 'trial' || st === 'active') {
              setCustomerUrl(uid);
              dbLoadSalonDashboard(function (data) {
                if (!data) { uiToast('サロン情報の取得に失敗しました'); renderSalon(null); return; }
                renderSalon(data);
              });
              return;
            }

            if (isJustCheckedOut && retriesLeft > 0) {
              setTimeout(function () { checkPlan(retriesLeft - 1); }, 2000);
              return;
            }
            // 未契約確定 → 本来は billing へ。DEBUG版は遷移せず表示だけ残す。
            debugShow(
              '<b>未契約と判定されました</b><br>' +
              'planStatus=' + st + ' (trial/activeでない)<br>' +
              '通常版ならここで salon_billing_v1.html へ遷移します。'
            );
          })
          .catch(function (err) {
            debugShow(
              '<b>=== .catch (読み取りエラー) ===</b><br>' +
              '<b>uid:</b> ' + uid + '<br>' +
              '<b>email:</b> ' + email + '<br>' +
              '<b>error.code:</b> ' + (err && err.code) + '<br>' +
              '<b>error.message:</b> ' + (err && err.message)
            );
            window.alert('【読み取りエラー】\ncode=' + (err && err.code) +
              '\nmessage=' + (err && err.message));
          });
      }

      checkPlan(isJustCheckedOut ? 5 : 0);
    });
  });

})();
</script>
</body>
</html>
