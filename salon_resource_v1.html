<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TORITA - 設備設定</title>
<!--
  salon_resource_v1.html  -  TORITA Phase I-step3 v3
  作成: 2026/6/19
  設計:
    - 場所（スペース）と機器（equipment）の2セクション
    - タイプ選択なし。名前だけで登録
  DB: salons/{salonId}/resources/{resourceId}
    フィールド: name, category('space'|'equipment'), active, createdAt, updatedAt
-->
<style>
  :root{
    --ac:#b5845a; --al:#f5ede4; --ad:#7a5535;
    --sf:#f8f7f4; --s2:#f0ede8;
    --bd:rgba(0,0,0,.10); --tx:#1a1a18; --mu:#73726c;
    --rd:#c47b7b;
    --sp:#7b9e87; --sl:#eef3ef;
    --eq:#7b8eb5; --el:#eef0f8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Georgia','Hiragino Mincho ProN',serif;
    background:var(--s2); color:var(--tx);
    -webkit-text-size-adjust:100%; min-height:100vh;
  }
  .topbar{
    background:#fff; border-bottom:1px solid var(--bd);
    padding:12px 20px;
    display:flex; align-items:center; gap:12px;
    position:sticky; top:0; z-index:10;
  }
  .back-btn{
    background:none; border:none; font-size:20px;
    cursor:pointer; padding:4px 6px; color:var(--ac); line-height:1;
  }
  .page-title{ font-size:16px; font-weight:600; color:var(--ad); flex:1; }

  .wrap{max-width:600px; margin:0 auto; padding:22px 18px 60px;}

  .section{ margin-bottom:28px; }
  .section-header{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px;
  }
  .section-title{
    font-size:13px; font-weight:600; letter-spacing:.05em;
    display:flex; align-items:center; gap:7px;
  }
  .section-title.space{ color:var(--sp); }
  .section-title.equipment{ color:var(--eq); }
  .section-badge{
    font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600;
  }
  .section-badge.space{ background:var(--sl); color:var(--sp); }
  .section-badge.equipment{ background:var(--el); color:var(--eq); }
  .section-desc{
    font-size:11.5px; color:var(--mu); margin-bottom:10px; line-height:1.6;
  }

  .add-btn{
    padding:9px 16px; border:none; border-radius:10px;
    font-size:13px; font-weight:600; cursor:pointer; font-family:inherit;
    white-space:nowrap;
  }
  .add-btn.space{ background:var(--sp); color:#fff; }
  .add-btn.equipment{ background:var(--eq); color:#fff; }
  .add-btn:active{ opacity:.85; }

  .resource-list{ display:flex; flex-direction:column; gap:9px; }

  .resource-card{
    background:#fff; border-radius:12px; border:1px solid var(--bd);
    padding:14px 16px;
    display:flex; align-items:center; gap:12px;
  }
  .resource-card.space{ border-left:3px solid var(--sp); }
  .resource-card.equipment{ border-left:3px solid var(--eq); }

  .resource-ico{ font-size:22px; flex-shrink:0; line-height:1; }
  .resource-name{
    flex:1; font-size:14px; font-weight:600; color:var(--ad);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .resource-actions{ display:flex; gap:7px; flex-shrink:0; }
  .icon-btn{
    background:none; border:1.5px solid var(--bd);
    border-radius:8px; padding:6px 9px; font-size:13px;
    cursor:pointer; font-family:inherit; color:var(--mu);
    transition:border-color .12s, color .12s;
  }
  .icon-btn:hover{ border-color:var(--ac); color:var(--ac); }
  .icon-btn.del:hover{ border-color:var(--rd); color:var(--rd); }

  .empty-card{
    background:#fff; border-radius:12px;
    border:1.5px dashed var(--bd);
    padding:18px; text-align:center;
    color:var(--mu); font-size:13px; line-height:1.7;
  }

  /* モーダル */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .modal{
    background:#fff; border-radius:18px;
    padding:26px 24px; width:100%; max-width:400px;
    box-shadow:0 20px 60px rgba(0,0,0,.2);
  }
  .modal-title{ font-size:17px; font-weight:600; color:var(--ad); margin-bottom:20px; }
  .form-label{
    display:block; font-size:12px; color:var(--ac);
    font-weight:600; margin-bottom:6px; letter-spacing:.04em;
  }
  .form-input{
    width:100%; border:1.5px solid var(--bd); border-radius:9px;
    padding:10px 12px; font-size:14px; font-family:inherit;
    color:var(--tx); background:#fff; outline:none; -webkit-appearance:none;
  }
  .form-input:focus{ border-color:var(--ac); }
  .modal-actions{ display:flex; gap:10px; margin-top:22px; }
  .btn-cancel{
    flex:1; padding:12px; background:none; border:1.5px solid var(--bd);
    border-radius:10px; font-size:14px; cursor:pointer; font-family:inherit; color:var(--mu);
  }
  .btn-save{
    flex:2; padding:12px; color:#fff; border:none;
    border-radius:10px; font-size:14px; font-weight:600;
    cursor:pointer; font-family:inherit;
  }
  .btn-save.space{ background:var(--sp); }
  .btn-save.equipment{ background:var(--eq); }
  .btn-save:disabled{ opacity:.5; cursor:default; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">&#8592;</button>
  <div class="page-title">設備設定</div>
</div>

<div class="wrap">

  <div class="section">
    <div class="section-header">
      <div class="section-title space">
        &#x1F4CD; 場所
        <span class="section-badge space">予約時に必ず占有</span>
      </div>
      <button class="add-btn space" onclick="openAddModal('space')">&#43; 追加</button>
    </div>
    <div class="section-desc">ベッド・ブース・スタジオなど施術を行う場所</div>
    <div class="resource-list" id="spaceList"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title equipment">
        &#x2699;&#xFE0F; 機器
        <span class="section-badge equipment">メニューで指定時のみ</span>
      </div>
      <button class="add-btn equipment" onclick="openAddModal('equipment')">&#43; 追加</button>
    </div>
    <div class="section-desc">フェイシャル機器・痩身機器など専門機材（不要なサロンは登録不要）</div>
    <div class="resource-list" id="equipmentList"></div>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">場所を追加</div>
    <label class="form-label" id="nameLabel">場所名</label>
    <input class="form-input" id="inputName" type="text" maxlength="20">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save space" id="saveBtn" onclick="saveResource()">追加する</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script src="shared_db.js"></script>
<script src="shared_auth.js"></script>
<script src="shared_ui.js"></script>

<script>
(function () {

  var _salonId    = null;
  var _editingId  = null;
  var _editingCat = 'space';

  onFbReady(function () {
    requireSalonStaff(function (isStaff) {
      if (!isStaff) { window.location.href = 'salon_auth_v2_new.html'; return; }
      var user = firebase.auth().currentUser;
      _salonId = user ? user.uid : null;
      if (!_salonId) { window.location.href = 'salon_auth_v2_new.html'; return; }
      loadList();
    });
  });

  function loadList() {
    uiShowLoading('読み込み中...');
    firebase.firestore()
      .collection('salons').doc(_salonId)
      .collection('resources')
      .orderBy('name', 'asc')
      .get()
      .then(function (snap) {
        uiForceHideLoading();
        var spaces = [];
        var equips = [];
        snap.forEach(function (doc) {
          if (doc.id === 'default') { return; }
          var d = doc.data();
          var item = { id: doc.id, data: d };
          if (d.category === 'equipment') { equips.push(item); }
          else { spaces.push(item); }
        });
        renderSection('spaceList',     spaces, 'space',     'まだ登録されていません');
        renderSection('equipmentList', equips, 'equipment', '機器が不要なサロンはそのままでOKです');
      })
      .catch(function (e) {
        uiForceHideLoading();
        uiToast('読み込みに失敗しました: ' + e.message);
      });
  }

  function renderSection(listId, items, category, emptyMsg) {
    var list = document.getElementById(listId);
    list.innerHTML = '';
    if (items.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty-card';
      empty.textContent = emptyMsg;
      list.appendChild(empty);
      return;
    }
    for (var i = 0; i < items.length; i++) {
      list.appendChild(buildCard(items[i], category));
    }
  }

  function buildCard(item, category) {
    var d = item.data;
    var card = document.createElement('div');
    card.className = 'resource-card ' + category;

    var ico = document.createElement('div');
    ico.className = 'resource-ico';
    ico.textContent = category === 'equipment' ? '\u2699\uFE0F' : '\uD83D\uDCCD';
    card.appendChild(ico);

    var name = document.createElement('div');
    name.className = 'resource-name';
    name.textContent = d.name || '（名前なし）';
    card.appendChild(name);

    var actions = document.createElement('div');
    actions.className = 'resource-actions';

    var editBtn = document.createElement('button');
    editBtn.className = 'icon-btn';
    editBtn.textContent = '\u270F\uFE0F';
    editBtn.onclick = (function (id, data, cat) {
      return function () { openEditModal(id, data, cat); };
    })(item.id, d, category);
    actions.appendChild(editBtn);

    var delBtn = document.createElement('button');
    delBtn.className = 'icon-btn del';
    delBtn.textContent = '\uD83D\uDDD1\uFE0F';
    delBtn.onclick = (function (id, data) {
      return function () { confirmDelete(id, data); };
    })(item.id, d);
    actions.appendChild(delBtn);

    card.appendChild(actions);
    return card;
  }

  function openAddModal(category) {
    _editingId  = null;
    _editingCat = category;
    var isEquip = category === 'equipment';
    document.getElementById('modalTitle').textContent = isEquip ? '機器を追加' : '場所を追加';
    document.getElementById('nameLabel').textContent  = isEquip ? '機器名（例：フェイシャル機器A）' : '場所名（例：ベッド1）';
    document.getElementById('inputName').value = '';
    document.getElementById('inputName').placeholder = isEquip ? '例：フェイシャル機器A' : '例：ベッド1';
    var btn = document.getElementById('saveBtn');
    btn.textContent = '追加する';
    btn.className = 'btn-save ' + category;
    btn.disabled = false;
    document.getElementById('modalOverlay').style.display = 'flex';
    setTimeout(function () { document.getElementById('inputName').focus(); }, 100);
  }
  window.openAddModal = openAddModal;

  function openEditModal(id, data, category) {
    _editingId  = id;
    _editingCat = category;
    var isEquip = category === 'equipment';
    document.getElementById('modalTitle').textContent = isEquip ? '機器を編集' : '場所を編集';
    document.getElementById('nameLabel').textContent  = isEquip ? '機器名' : '場所名';
    document.getElementById('inputName').value = data.name || '';
    var btn = document.getElementById('saveBtn');
    btn.textContent = '保存';
    btn.className = 'btn-save ' + category;
    btn.disabled = false;
    document.getElementById('modalOverlay').style.display = 'flex';
    setTimeout(function () { document.getElementById('inputName').focus(); }, 100);
  }

  function saveResource() {
    var name = (document.getElementById('inputName').value || '').trim();
    if (!name) {
      uiToast(_editingCat === 'equipment' ? '機器名を入力してください' : '場所名を入力してください');
      return;
    }
    var saveBtn = document.getElementById('saveBtn');
    if (saveBtn) { saveBtn.disabled = true; }

    var col = firebase.firestore()
      .collection('salons').doc(_salonId).collection('resources');

    var payload = {
      name: name,
      category: _editingCat,
      active: true,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    if (_editingId) {
      col.doc(_editingId).update(payload)
        .then(function () { closeModal(); uiToast('保存しました'); loadList(); })
        .catch(function (e) {
          if (saveBtn) { saveBtn.disabled = false; }
          uiToast('保存に失敗しました: ' + e.message);
        });
    } else {
      payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      col.add(payload)
        .then(function () { closeModal(); uiToast(name + ' を追加しました'); loadList(); })
        .catch(function (e) {
          if (saveBtn) { saveBtn.disabled = false; }
          uiToast('追加に失敗しました: ' + e.message);
        });
    }
  }
  window.saveResource = saveResource;

  function confirmDelete(id, data) {
    uiConfirm('"' + (data.name || 'この項目') + '" を削除しますか？', function () {
      uiShowLoading('削除中...');
      firebase.firestore()
        .collection('salons').doc(_salonId).collection('resources').doc(id)
        .delete()
        .then(function () {
          uiForceHideLoading();
          uiToast((data.name || '項目') + ' を削除しました');
          loadList();
        })
        .catch(function (e) {
          uiForceHideLoading();
          uiToast('削除に失敗しました: ' + e.message);
        });
    });
  }

  function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
  window.closeModal = closeModal;

  function overlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) { closeModal(); }
  }
  window.overlayClick = overlayClick;

})();
</script>
</body>
</html>
