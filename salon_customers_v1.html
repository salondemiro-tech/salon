<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>TORITA - 顧客管理</title>
<!--
  C-4 顧客管理画面 v1（DESIGN.md 3-3 / DESIGN_v8_1 準拠）
  機能:
    - 顧客一覧（dbSalonListCustomers・isMerged 除外済み）
    - 顧客詳細パネル（画面内・dbSalonGetCustomer + 履歴）
    - サロン側新規登録（dbSalonCreateCustomer）
    - メモ / スタンプ編集（dbSalonUpdateCustomer）
    - 顧客統合（merge）機能 2026/6/7 実装
  ロード順序 (shared_auth.js ヘッダ契約):
    firebase-*-compat → firebase-init.js → shared_db.js → shared_auth.js
      → shared_ui.js
  ES5 互換: var / function のみ（const/let/アロー/async/await 禁止）
-->
<style>
  :root{
    --ac:#b5845a; --al:#f5ede4; --ad:#7a5535;
    --bg:#fff; --sf:#f8f7f4; --s2:#f0ede8;
    --bd:rgba(0,0,0,.10); --tx:#1a1a18; --mu:#73726c;
    --gn:#7b9e87; --gl:#eef3ef;
    --rd:#c47b7b; --rl:#faeaea; --rt:#6b1f1f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Georgia','Hiragino Mincho ProN',serif;
    background:var(--s2); color:var(--tx);
    -webkit-text-size-adjust:100%; min-height:100vh;
  }

  .topbar{
    background:#fff; border-bottom:1px solid var(--bd);
    padding:14px 18px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:10;
  }
  .back-link{
    background:none; border:none; cursor:pointer;
    font-family:inherit; font-size:13px; color:var(--mu);
    display:flex; align-items:center; gap:5px;
  }
  .back-link:hover{color:var(--ac);}
  .topbar-title{
    font-size:15px; font-weight:600; color:var(--ad);
    letter-spacing:.03em;
  }
  .topbar-spacer{width:60px;}

  .wrap{max-width:680px; margin:0 auto; padding:18px 14px 40px;}

  /* ===== ツールバー（検索 + 新規登録） ===== */
  .toolbar{
    display:flex; gap:9px; margin-bottom:14px;
  }
  .search-box{
    flex:1; background:#fff; border:1px solid var(--bd);
    border-radius:11px; padding:11px 14px;
    font-family:inherit; font-size:14px; color:var(--tx);
  }
  .search-box:focus{outline:none; border-color:var(--ac);}
  .btn-add{
    background:var(--ac); color:#fff; border:none;
    border-radius:11px; padding:0 18px; cursor:pointer;
    font-family:inherit; font-size:14px; font-weight:600;
    white-space:nowrap;
  }
  .btn-add:hover{background:var(--ad);}

  /* ===== 顧客一覧 ===== */
  .cust-list{
    background:#fff; border-radius:13px;
    box-shadow:0 4px 16px rgba(0,0,0,.07);
    overflow:hidden;
  }
  .cust-row{
    display:flex; align-items:center; gap:12px;
    padding:14px 16px; cursor:pointer;
    border-bottom:1px solid var(--bd);
  }
  .cust-row:last-child{border-bottom:none;}
  .cust-row:hover{background:var(--al);}
  .cust-avatar{
    width:38px; height:38px; border-radius:50%;
    background:var(--al); color:var(--ad);
    display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:600; flex-shrink:0;
  }
  .cust-main{flex:1; min-width:0;}
  .cust-name{font-size:15px; font-weight:600; color:var(--tx);}
  .cust-sub{font-size:12px; color:var(--mu); margin-top:2px;}
  .cust-badge{
    font-size:11px; color:var(--ac);
    background:var(--al); border-radius:7px;
    padding:3px 8px; flex-shrink:0;
  }
  .cust-badge.self{color:var(--gn); background:var(--gl);}

  .empty{
    text-align:center; color:var(--mu);
    padding:48px 20px; font-size:14px;
  }

  /* ===== 詳細パネル（画面内・uiModal は textContent のみのため独自） ===== */
  .panel-ov{
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.42); z-index:50;
    overflow-y:auto; padding:24px 12px;
  }
  .panel-ov.show{display:block;}
  .panel{
    max-width:560px; margin:0 auto;
    background:#fff; border-radius:15px;
    box-shadow:0 12px 40px rgba(0,0,0,.22);
    overflow:hidden;
  }
  .panel-head{
    background:var(--al); padding:18px 20px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-head h2{
    font-size:17px; color:var(--ad); font-weight:600;
  }
  .panel-close{
    background:none; border:none; cursor:pointer;
    font-size:22px; color:var(--mu); line-height:1;
  }
  .panel-body{padding:20px;}

  .field{margin-bottom:16px;}
  .field label{
    display:block; font-size:12px; color:var(--mu);
    margin-bottom:5px; letter-spacing:.02em;
  }
  .field input, .field textarea{
    width:100%; background:var(--sf);
    border:1px solid var(--bd); border-radius:9px;
    padding:10px 12px; font-family:inherit;
    font-size:14px; color:var(--tx);
  }
  .field input:focus, .field textarea:focus{
    outline:none; border-color:var(--ac); background:#fff;
  }
  .field textarea{resize:vertical; min-height:70px;}

  .stamp-row{
    display:flex; align-items:center; gap:12px;
  }
  .stamp-btn{
    width:34px; height:34px; border-radius:50%;
    border:1px solid var(--bd); background:var(--sf);
    cursor:pointer; font-size:18px; color:var(--ad);
    font-family:inherit; line-height:1;
  }
  .stamp-btn:hover{background:var(--al); border-color:var(--ac);}
  .stamp-val{
    font-size:20px; font-weight:600; color:var(--ad);
    min-width:42px; text-align:center;
  }

  .row-2{display:flex; gap:10px;}
  .row-2 .field{flex:1;}

  .panel-actions{
    display:flex; gap:10px; padding:16px 20px;
    border-top:1px solid var(--bd); background:var(--sf);
  }
  .btn{
    flex:1; border:none; border-radius:10px;
    padding:12px; cursor:pointer;
    font-family:inherit; font-size:14px; font-weight:600;
  }
  .btn-primary{background:var(--ac); color:#fff;}
  .btn-primary:hover{background:var(--ad);}
  .btn-ghost{background:var(--s2); color:var(--mu);}
  .btn-ghost:hover{background:var(--bd);}
  .btn-danger{
    background:var(--rl); color:var(--rt);
    flex:0 0 auto; padding:12px 16px;
  }
  .btn-danger:hover{background:#f3d9d9;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}

  /* ===== 履歴 ===== */
  .hist-sec{margin-top:20px;}
  .hist-sec h3{
    font-size:13px; color:var(--ad);
    margin-bottom:9px; letter-spacing:.03em;
  }
  .hist-item{
    background:var(--sf); border-radius:9px;
    padding:10px 13px; margin-bottom:7px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .hist-date{font-size:13px; color:var(--tx);}
  .hist-menu{font-size:12px; color:var(--mu); margin-top:2px;}
  .hist-stat{
    font-size:11px; padding:3px 8px; border-radius:6px;
    background:var(--gl); color:var(--gn);
  }
  .hist-stat.cancel{background:var(--rl); color:var(--rt);}
  .hist-empty{font-size:13px; color:var(--mu); padding:8px 0;}

  /* merge ボックス */
  .merge-box{
    margin-top:20px; padding:14px;
    border:1px dashed var(--bd); border-radius:10px;
    text-align:center;
  }
  .merge-box p{font-size:12px; color:var(--mu); margin-bottom:8px;}

  .form-note{
    font-size:12px; color:var(--mu);
    background:var(--sf); border-radius:8px;
    padding:10px 12px; margin-bottom:16px; line-height:1.6;
  }

  /* ===== 統合モーダル ===== */
  .merge-ov{
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.55); z-index:100;
    overflow-y:auto; padding:24px 12px;
  }
  .merge-ov.show{display:block;}
  .merge-modal{
    max-width:520px; margin:0 auto;
    background:#fff; border-radius:15px;
    box-shadow:0 12px 40px rgba(0,0,0,.28);
    overflow:hidden;
  }
  .merge-head{
    background:#fff3cd; padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:2px solid #e6b800;
  }
  .merge-head h2{font-size:16px; color:#7a5800; font-weight:600;}
  .merge-close{
    background:none; border:none; cursor:pointer;
    font-size:22px; color:var(--mu); line-height:1;
  }
  .merge-body{padding:18px 20px;}

  .merge-warn{
    background:#fff3cd; border:1px solid #e6b800;
    border-radius:9px; padding:12px 14px;
    font-size:13px; color:#7a5800; margin-bottom:14px;
    line-height:1.6;
  }

  /* 候補カード */
  .candidate-card{
    border:2px solid var(--bd); border-radius:10px;
    padding:13px 15px; margin-bottom:9px; cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .candidate-card:hover{border-color:var(--ac); background:var(--al);}
  .candidate-card.selected{border-color:var(--ac); background:var(--al);}
  .candidate-name{font-size:15px; font-weight:600; color:var(--tx);}
  .candidate-sub{font-size:12px; color:var(--mu); margin-top:3px;}

  /* 検索エリア（手動） */
  .merge-search-row{display:flex; gap:8px; margin-bottom:10px;}
  .merge-search-input{
    flex:1; background:#fff; border:1px solid var(--bd);
    border-radius:9px; padding:10px 13px;
    font-family:inherit; font-size:14px; color:var(--tx);
  }
  .merge-search-input:focus{outline:none; border-color:var(--ac);}
  .btn-search{
    background:var(--s2); border:none; border-radius:9px;
    padding:0 14px; cursor:pointer; font-family:inherit;
    font-size:13px; color:var(--mu); white-space:nowrap;
  }
  .btn-search:hover{background:var(--bd);}

  /* 情報選択テーブル */
  .pick-table{width:100%; border-collapse:collapse; margin-bottom:14px;}
  .pick-table th{
    font-size:11px; color:var(--mu); font-weight:normal;
    padding:6px 8px; text-align:left;
    border-bottom:1px solid var(--bd);
  }
  .pick-table td{
    padding:8px 8px; font-size:13px;
    border-bottom:1px solid var(--bd); vertical-align:top;
  }
  .pick-table tr.pick-row{cursor:pointer;}
  .pick-table tr.pick-row:hover td{background:var(--al);}
  .pick-cell-label{
    font-size:11px; color:var(--mu); margin-bottom:3px;
  }
  .pick-cell-val{color:var(--tx); word-break:break-all;}

  .stamp-merge-note{
    font-size:13px; color:var(--mu); background:var(--sf);
    border-radius:8px; padding:10px 13px; margin-bottom:14px;
  }

  /* 確認ステップ */
  .confirm-box{
    background:var(--sf); border-radius:10px;
    padding:14px 16px; margin-bottom:14px;
    font-size:13px; line-height:1.8; color:var(--tx);
  }
  .confirm-box strong{color:var(--ad);}
  .confirm-danger{
    background:var(--rl); border-radius:9px;
    padding:11px 14px; font-size:13px;
    color:var(--rt); font-weight:600; margin-bottom:14px;
  }

  .merge-actions{
    display:flex; gap:9px; padding:14px 20px;
    border-top:1px solid var(--bd); background:var(--sf);
  }
  .merge-actions .btn{flex:1;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-link" onclick="goDashboard()">&#8592; 戻る</button>
  <div class="topbar-title">顧客管理</div>
  <div class="topbar-spacer"></div>
</div>

<div class="wrap">
  <div class="toolbar">
    <input type="text" class="search-box" id="searchBox"
           placeholder="名前・電話で検索" oninput="onSearch()">
    <button class="btn-add" onclick="openCreate()">＋ 新規</button>
  </div>
  <div class="cust-list" id="custList">
    <div class="empty">読み込み中...</div>
  </div>
</div>

<!-- 詳細 / 編集パネル -->
<div class="panel-ov" id="panelOv">
  <div class="panel">
    <div class="panel-head">
      <h2 id="panelTitle">顧客詳細</h2>
      <button class="panel-close" onclick="closePanel()">&#215;</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
    <div class="panel-actions" id="panelActions"></div>
  </div>
</div>

<!-- 統合モーダル -->
<div class="merge-ov" id="mergeOv">
  <div class="merge-modal">
    <div class="merge-head">
      <h2>&#x26A0;&#xFE0F; 顧客カルテの統合</h2>
      <button class="merge-close" id="mergeCloseBtn">&#215;</button>
    </div>
    <div class="merge-body" id="mergeBody"></div>
    <div class="merge-actions" id="mergeActions"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>

<script src="firebase-init.js"></script>
<script src="shared_db.js"></script>
<script src="shared_auth.js"></script>
<script src="shared_ui.js"></script>

<script>
(function () {

  var _all = [];           // 全顧客（isMerged 除外済み）
  var _filtered = [];      // 検索フィルタ後
  var _mode = '';          // 'view' | 'edit' | 'create'
  var _curDocId = null;    // 表示中の customerDocId

  function esc(s) {
    s = (s == null) ? '' : String(s);
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function _norm(s) {
    s = (s == null) ? '' : String(s);
    s = s.replace(/[\uFF01-\uFF5E]/g, function (ch) {
      return String.fromCharCode(ch.charCodeAt(0) - 0xFEE0);
    });
    s = s.replace(/[\s\u3000]+/g, '');
    return s.toLowerCase();
  }
  function _v(id) {
    var el = document.getElementById(id);
    return el ? String(el.value || '').trim() : '';
  }

  function goDashboard() {
    window.location.href = 'salon_dashboard_v1.html';
  }
  window.goDashboard = goDashboard;

  // ----- 一覧読み込み -----
  function loadList() {
    uiShowLoading('読み込み中...');
    dbSalonListCustomers(function (list) {
      uiHideLoading();
      if (list == null) {
        uiToast('顧客一覧の取得に失敗しました');
        renderList([]);
        return;
      }
      list.sort(function (a, b) {
        var an = (a && a.name) ? String(a.name) : '';
        var bn = (b && b.name) ? String(b.name) : '';
        if (an === bn) { return 0; }
        return (an < bn) ? -1 : 1;
      });
      _all = list;
      applyFilter();

      try {
        var params = new URLSearchParams(window.location.search);
        var did = params.get('docId');
        if (did) {
          openDetail(did);
        }
      } catch (e) {}
    });
  }

  function applyFilter() {
    var q = '';
    var sb = document.getElementById('searchBox');
    if (sb) { q = _norm(sb.value); }
    if (!q) {
      _filtered = _all.slice();
    } else {
      _filtered = [];
      var i, c, hay;
      for (i = 0; i < _all.length; i++) {
        c = _all[i];
        hay = _norm((c.name || '') + (c.phone || ''));
        if (hay.indexOf(q) >= 0) { _filtered.push(c); }
      }
    }
    renderList(_filtered);
  }
  function onSearch() { applyFilter(); }
  window.onSearch = onSearch;

  function renderList(list) {
    var box = document.getElementById('custList');
    box.innerHTML = '';
    if (!list || list.length === 0) {
      var em = document.createElement('div');
      em.className = 'empty';
      em.textContent = (_all.length === 0)
        ? 'まだ顧客が登録されていません'
        : '該当する顧客がいません';
      box.appendChild(em);
      return;
    }
    var i;
    for (i = 0; i < list.length; i++) {
      box.appendChild(buildRow(list[i]));
    }
  }

  function buildRow(c) {
    var row = document.createElement('div');
    row.className = 'cust-row';

    var av = document.createElement('div');
    av.className = 'cust-avatar';
    av.textContent = (c.name ? String(c.name).charAt(0) : '?');
    row.appendChild(av);

    var main = document.createElement('div');
    main.className = 'cust-main';
    var nm = document.createElement('div');
    nm.className = 'cust-name';
    nm.textContent = c.name || '(名前なし)';
    main.appendChild(nm);
    var sub = document.createElement('div');
    sub.className = 'cust-sub';
    var bits = [];
    if (c.phone) { bits.push(c.phone); }
    if (typeof c.stampCount === 'number') {
      bits.push('スタンプ ' + c.stampCount);
    }
    sub.textContent = bits.join('  ・  ');
    main.appendChild(sub);
    row.appendChild(main);

    var bd = document.createElement('div');
    if (c.createdSource === 'self' || c.authUid) {
      bd.className = 'cust-badge self';
      bd.textContent = 'アプリ';
    } else {
      bd.className = 'cust-badge';
      bd.textContent = 'サロン';
    }
    row.appendChild(bd);

    row.onclick = function () { openDetail(c._id); };
    return row;
  }

  // ----- 詳細表示 -----
  function openDetail(docId) {
    _mode = 'view';
    _curDocId = docId;
    uiShowLoading('読み込み中...');

    var _got = { cust: false, hist: false };
    var _c = null;
    var _hist = null;
    var _custOk = true;

    function _tryRender() {
      if (!_got.cust || !_got.hist) { return; }
      uiHideLoading();
      if (!_custOk) { uiToast('顧客情報の取得に失敗しました'); return; }
      renderDetail(_c, _hist);
      showPanel();
    }

    dbSalonGetCustomer(docId, function (c) {
      if (c == null) { _custOk = false; }
      _c = c;
      _got.cust = true;
      _tryRender();
    });

    dbSalonGetCustomerHistory(docId, function (hist) {
      _hist = hist;
      _got.hist = true;
      _tryRender();
    });
  }

  function renderDetail(c, hist) {
    document.getElementById('panelTitle').textContent =
      c.name || '顧客詳細';
    var body = document.getElementById('panelBody');
    body.innerHTML = '';

    body.appendChild(_roField('お名前', c.name || '-'));
    body.appendChild(_roField('電話番号', c.phone || '-'));
    body.appendChild(_roField('メール', c.email || '-'));
    body.appendChild(_roField('登録区分',
      (c.createdSource === 'self' || c.authUid)
        ? '顧客アプリ登録' : 'サロン登録'));

    body.appendChild(_roField('メモ', c.memo || '(なし)'));

    var sc = (typeof c.stampCount === 'number') ? c.stampCount : 0;
    body.appendChild(_roField('スタンプ', String(sc) + ' 個'));

    // 来店履歴
    var sec = document.createElement('div');
    sec.className = 'hist-sec';
    var h3 = document.createElement('h3');
    h3.textContent = '来店履歴';
    sec.appendChild(h3);

    var arr = (hist && hist.merged) ? hist.merged : [];
    if (!arr || arr.length === 0) {
      var he = document.createElement('div');
      he.className = 'hist-empty';
      he.textContent = '履歴はまだありません';
      sec.appendChild(he);
    } else {
      var i, a, item, dt, mn, st;
      var lim = (arr.length > 30) ? 30 : arr.length;
      for (i = 0; i < lim; i++) {
        a = arr[i];
        item = document.createElement('div');
        item.className = 'hist-item';
        var left = document.createElement('div');
        dt = document.createElement('div');
        dt.className = 'hist-date';
        dt.textContent = (a.dateKey || '') +
          (a.start ? ('  ' + a.start) : '');
        left.appendChild(dt);
        mn = document.createElement('div');
        mn.className = 'hist-menu';
        mn.textContent = a.menuNameSnapshot || a.menuName || '';
        left.appendChild(mn);
        item.appendChild(left);
        st = document.createElement('div');
        if (a.status === 'cancelled' || a.status === 'no_show') {
          st.className = 'hist-stat cancel';
          st.textContent = (a.status === 'no_show') ? '不来店' : 'キャンセル';
        } else {
          st.className = 'hist-stat';
          st.textContent = '来店';
        }
        item.appendChild(st);
        sec.appendChild(item);
      }
    }
    body.appendChild(sec);

    // 統合（merge）ボタン
    var mb = document.createElement('div');
    mb.className = 'merge-box';
    var mp = document.createElement('p');
    mp.textContent = '同一人物の重複カルテを統合します（取り消し不可）';
    mb.appendChild(mp);
    var mbtn = document.createElement('button');
    mbtn.style.background = 'var(--al)';
    mbtn.style.color = 'var(--ad)';
    mbtn.style.border = '1px solid var(--ac)';
    mbtn.style.borderRadius = '8px';
    mbtn.style.padding = '9px 16px';
    mbtn.style.fontFamily = 'inherit';
    mbtn.style.fontSize = '13px';
    mbtn.style.cursor = 'pointer';
    mbtn.textContent = '\uD83D\uDD17 カルテを統合する';
    (function(docId, hasMergeFlag, custData) {
      mbtn.onclick = function() { openMerge(docId, hasMergeFlag, custData); };
    })(c._id, c.needsMergeReview === true, c);

  // ----- 編集 -----
  function openEdit(c) {
    _mode = 'edit';

    document.getElementById('panelTitle').textContent = '顧客を編集';
    var body = document.getElementById('panelBody');
    body.innerHTML = '';

    body.appendChild(_inField('電話番号', 'fPhone', c.phone || '', 'text'));

    bCancel.onclick = function () { openDetail(_curDocId); };
    act.appendChild(bCancel);
    var bDel = document.createElement('button');
    bDel.className = 'btn btn-danger';
    bDel.textContent = '削除';

  function bumpStamp(delta) {
    var el = document.getElementById('fStampVal');
    if (!el) { return; }
    var n = parseInt(el.textContent, 10);
    if (isNaN(n)) { n = 0; }
    n += delta;
    if (n < 0) { n = 0; }
    el.textContent = String(n);
  }

  function saveEdit() {
    var name = _v('fName');
    if (!name) {
      uiToast('お名前は必須です');
      return;
    }
    var sv = document.getElementById('fStampVal');
    var stamp = sv ? parseInt(sv.textContent, 10) : 0;
    if (isNaN(stamp) || stamp < 0) { stamp = 0; }

    var patch = {
      name: name,
      phone: _v('fPhone'),
      email: _v('fEmail'),
      memo: _v('fMemo'),
      stampCount: stamp
    };
    uiShowLoading('保存中...');
    dbSalonUpdateCustomer(_curDocId, patch, function (ok) {
      uiHideLoading();
      if (!ok) {
        uiToast('保存に失敗しました');
        return;
      }
      uiToast('保存しました');
      var i;
      for (i = 0; i < _all.length; i++) {
        if (_all[i] && _all[i]._id === _curDocId) {
          _all[i].name = patch.name;
          _all[i].phone = patch.phone;
          _all[i].email = patch.email;
          _all[i].memo = patch.memo;
          _all[i].stampCount = patch.stampCount;
          break;
        }
      }
      _all.sort(function (a, b) {
        var an = (a && a.name) ? String(a.name) : '';
        var bn = (b && b.name) ? String(b.name) : '';
        if (an === bn) { return 0; }
        return (an < bn) ? -1 : 1;
      });
      openDetail(_curDocId);
      applyFilter();
    });
  }

  function doDelete() {
    uiConfirmDelete(
      'この顧客カルテを削除します。よろしいですか？（来店履歴は残ります）',
      function () {
        uiShowLoading('削除中...');
        dbSalonDeleteCustomer(_curDocId, function (ok) {
          uiHideLoading();
          if (!ok) {
            uiToast('削除に失敗しました');
            return;
          }
          uiToast('削除しました');
          var i;
          for (i = 0; i < _all.length; i++) {
            if (_all[i] && _all[i]._id === _curDocId) {
              _all.splice(i, 1);
              break;
            }
          }
          closePanel();
          applyFilter();
        });
      },
      null
    );
  }

  // ----- 新規登録（サロン側・dbSalonCreateCustomer） -----
  function openCreate() {
    _mode = 'create';
    _curDocId = null;
    document.getElementById('panelTitle').textContent = '新規顧客登録';
    var body = document.getElementById('panelBody');
    body.innerHTML = '';

    var note = document.createElement('div');
    note.className = 'form-note';
    note.textContent =
      'サロン側で顧客カルテを作成します。お客様があとで同じメール'
      + 'アドレスでアプリ登録すると、このカルテに自動でつながります'
      + '（メール確認が条件）。電話予約のお客様はメールなしでも'
      + '登録できます。';
    body.appendChild(note);

    body.appendChild(_inField('お名前（必須）', 'fName', '', 'text'));
    body.appendChild(_inField('電話番号', 'fPhone', '', 'text'));
    body.appendChild(_inField('メール（任意）', 'fEmail', '', 'text'));
    body.appendChild(_taField('メモ（顧客には見えません）',
      'fMemo', ''));

    var act = document.getElementById('panelActions');
    act.innerHTML = '';
    var bSave = document.createElement('button');
    bSave.className = 'btn btn-primary';
    bSave.textContent = '登録';
    bSave.onclick = doCreate;
    act.appendChild(bSave);
    var bCancel = document.createElement('button');
    bCancel.className = 'btn btn-ghost';
    bCancel.textContent = 'キャンセル';
    bCancel.onclick = closePanel;
    act.appendChild(bCancel);

    showPanel();
  }
  window.openCreate = openCreate;

  function doCreate() {
    var name = _v('fName');
    if (!name) {
      uiToast('お名前は必須です');
      return;
    }
    var data = {
      name: name,
      phone: _v('fPhone'),
      email: _v('fEmail')
    };
    var memo = _v('fMemo');

    uiShowLoading('登録中...');
    dbSalonCreateCustomer(data, function (res) {
      if (res == null || !res._id) {
        uiHideLoading();
        uiToast('登録に失敗しました');
        return;
      }
      var newC = {
        _id: res._id,
        name: data.name,
        phone: data.phone || '',
        email: data.email || '',
        authUid: null,
        createdSource: 'salon',
        isMerged: false,
        stampCount: 0
      };
      if (memo) { newC.memo = memo; }
      _all.push(newC);
      _all.sort(function (a, b) {
        var an = (a && a.name) ? String(a.name) : '';
        var bn = (b && b.name) ? String(b.name) : '';
        if (an === bn) { return 0; }
        return (an < bn) ? -1 : 1;
      });

      uiHideLoading();
      uiToast('登録しました');
      closePanel();
      applyFilter();

      if (memo) {
        dbSalonUpdateCustomer(res._id, { memo: memo }, function (ok) {
          if (!ok) {
            uiToast('メモの保存に失敗しました。編集画面で再入力してください');
          }
        });
      }
    });
  }

  // ----- フィールド生成ヘルパー -----

  function _taField(label, id, val) {

    f.appendChild(l);

  // ----- パネル開閉 -----
  function showPanel() {
    document.getElementById('panelOv').className = 'panel-ov show';
  }
  function closePanel() {
    document.getElementById('panelOv').className = 'panel-ov';
    _mode = '';
    _curDocId = null;
  }
  window.closePanel = closePanel;

  document.getElementById('panelOv').onclick = function (e) {
    if (e.target === this) { closePanel(); }

  // ========================================
  // 統合（merge）機能
  // ========================================

  var _mergeKeepId     = null;
  var _mergeKeepData   = null;
  var _mergeRemoveId   = null;
  var _mergeRemoveData = null;

  var _pickName  = 'keep';
  var _pickPhone = 'keep';
  var _pickMemo  = 'keep';

  function openMerge(docId, hasMergeFlag, custData) {
    _mergeKeepId     = docId;
    _mergeKeepData   = custData;
    _mergeRemoveId   = null;
    _mergeRemoveData = null;
    _pickName  = 'keep';
    _pickPhone = 'keep';
    _pickMemo  = 'keep';

    renderMergeStep1(hasMergeFlag);
    document.getElementById('mergeOv').className = 'merge-ov show';
  }

  function closeMerge() {
    document.getElementById('mergeOv').className = 'merge-ov';
  }

  document.getElementById('mergeCloseBtn').onclick = closeMerge;
  document.getElementById('mergeOv').onclick = function (e) {
    if (e.target === this) { closeMerge(); }
  };

  // ---- Step 1: 相手カルテを選ぶ ----
  function renderMergeStep1(hasMergeFlag) {
    var body = document.getElementById('mergeBody');
    body.innerHTML = '';
    var act  = document.getElementById('mergeActions');
    act.innerHTML = '';

    var warn = document.createElement('div');
    warn.className = 'merge-warn';
    warn.textContent =
      '統合すると「取り込まれた」カルテは一覧から非表示になります。'
      + 'この操作は取り消せません。';
    body.appendChild(warn);

    var secTitle = document.createElement('div');
    secTitle.style.fontSize = '13px';
    secTitle.style.fontWeight = '600';
    secTitle.style.color = 'var(--ad)';
    secTitle.style.marginBottom = '10px';
    secTitle.textContent = '統合する相手のカルテを選んでください';
    body.appendChild(secTitle);

    var candidateBox = document.createElement('div');
    candidateBox.id = 'mergeCandidateBox';
    body.appendChild(candidateBox);

    if (hasMergeFlag) {
      loadMergeCandidates(candidateBox);
    } else {
      renderManualSearch(candidateBox);
    }

    var bCancel = document.createElement('button');
    bCancel.className = 'btn btn-ghost';
    bCancel.textContent = 'キャンセル';
    bCancel.onclick = closeMerge;
    act.appendChild(bCancel);

    var bNext = document.createElement('button');
    bNext.className = 'btn btn-primary';
    bNext.textContent = '次へ';
    bNext.id = 'mergeNextBtn1';
    bNext.disabled = true;
    bNext.onclick = function () { goMergeStep2(); };
    act.appendChild(bNext);
  }

  function loadMergeCandidates(box) {
    var keepEmail = (_mergeKeepData && _mergeKeepData.email) ? _mergeKeepData.email : '';
    var candidates = [];
    var i, c;
    for (i = 0; i < _all.length; i++) {
      c = _all[i];
      if (!c || c._id === _mergeKeepId) { continue; }
      if (c.isMerged) { continue; }
      if (keepEmail && c.email && c.email === keepEmail) {
        candidates.push(c);
      }
    }

    box.innerHTML = '';

    if (candidates.length === 0) {
      var note = document.createElement('div');
      note.style.fontSize = '13px';
      note.style.color = 'var(--mu)';
      note.style.marginBottom = '10px';
      note.textContent = '自動候補が見つかりませんでした。名前か電話番号で検索してください。';
      box.appendChild(note);
      renderManualSearch(box);
      return;
    }

    for (i = 0; i < candidates.length; i++) {
      box.appendChild(buildCandidateCard(candidates[i]));
    }

    var sep = document.createElement('div');
    sep.style.fontSize = '12px';
    sep.style.color = 'var(--mu)';
    sep.style.margin = '10px 0 6px';
    sep.textContent = '上記以外を選ぶ場合は名前・電話で検索';
    box.appendChild(sep);
    renderManualSearch(box);
  }

  function renderManualSearch(box) {
    var row = document.createElement('div');
    row.className = 'merge-search-row';
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'merge-search-input';
    inp.id = 'mergeSearchInput';
    inp.placeholder = '名前または電話番号';
    var btn = document.createElement('button');
    btn.className = 'btn-search';
    btn.textContent = '検索';
    btn.onclick = function () { doMergeSearch(box); };
    inp.onkeydown = function (e) {
      if (e.key === 'Enter') { doMergeSearch(box); }
    };
    row.appendChild(inp);
    row.appendChild(btn);
    box.appendChild(row);

    var resultBox = document.createElement('div');
    resultBox.id = 'mergeSearchResult';
    box.appendChild(resultBox);
  }

  function doMergeSearch(box) {
    var inp = document.getElementById('mergeSearchInput');
    var q = _norm(inp ? inp.value : '');
    var resultBox = document.getElementById('mergeSearchResult');
    if (!resultBox) { return; }
    resultBox.innerHTML = '';
    if (!q) {
      resultBox.innerHTML = '<div style="font-size:13px;color:var(--mu);">検索ワードを入力してください</div>';
      return;
    }
    var found = [];
    var i, c, hay;
    for (i = 0; i < _all.length; i++) {
      c = _all[i];
      if (!c || c._id === _mergeKeepId) { continue; }
      if (c.isMerged) { continue; }
      hay = _norm((c.name || '') + (c.phone || ''));
      if (hay.indexOf(q) >= 0) { found.push(c); }
    }
    if (found.length === 0) {
      resultBox.innerHTML = '<div style="font-size:13px;color:var(--mu);">該当する顧客が見つかりません</div>';
      return;
    }
    for (i = 0; i < found.length; i++) {
      resultBox.appendChild(buildCandidateCard(found[i]));
    }
  }

  function buildCandidateCard(c) {
    var card = document.createElement('div');
    card.className = 'candidate-card';
    card.id = 'ccard_' + c._id;

    var nm = document.createElement('div');
    nm.className = 'candidate-name';
    nm.textContent = c.name || '(名前なし)';
    card.appendChild(nm);

    var sub = document.createElement('div');
    sub.className = 'candidate-sub';
    var bits = [];
    if (c.phone) { bits.push(c.phone); }
    if (c.email) { bits.push(c.email); }
    if (typeof c.stampCount === 'number') { bits.push('スタンプ ' + c.stampCount); }
    sub.textContent = bits.join('  ·  ');
    card.appendChild(sub);

    card.onclick = function () { selectCandidate(c); };
    return card;
  }

  function selectCandidate(c) {
    var cards = document.querySelectorAll('.candidate-card');
    var i;
    for (i = 0; i < cards.length; i++) {
      cards[i].className = 'candidate-card';
    }
    var sel = document.getElementById('ccard_' + c._id);
    if (sel) { sel.className = 'candidate-card selected'; }

    _mergeRemoveId   = c._id;
    _mergeRemoveData = c;

    var btn = document.getElementById('mergeNextBtn1');
    if (btn) { btn.disabled = false; }
  }

  // ---- Step 2: どの情報を使うか選ぶ ----
  function goMergeStep2() {
    if (!_mergeRemoveId || !_mergeRemoveData) {
      uiToast('相手カルテを選んでください');
      return;
    }

    var body = document.getElementById('mergeBody');
    body.innerHTML = '';
    var act  = document.getElementById('mergeActions');
    act.innerHTML = '';

    var secTitle = document.createElement('div');
    secTitle.style.fontSize = '13px';
    secTitle.style.fontWeight = '600';
    secTitle.style.color = 'var(--ad)';
    secTitle.style.marginBottom = '12px';
    secTitle.textContent = '残す情報を選んでください（行をタップで切り替え）';
    body.appendChild(secTitle);

    body.appendChild(buildPickTable());

    var stampNote = document.createElement('div');
    stampNote.className = 'stamp-merge-note';
    var ks = (typeof _mergeKeepData.stampCount === 'number') ? _mergeKeepData.stampCount : 0;
    var rs = (typeof _mergeRemoveData.stampCount === 'number') ? _mergeRemoveData.stampCount : 0;
    stampNote.textContent =
      'スタンプは合算されます: ' + ks + ' + ' + rs + ' = ' + (ks + rs) + '個';
    body.appendChild(stampNote);

    var bBack = document.createElement('button');
    bBack.className = 'btn btn-ghost';
    bBack.textContent = '← 戻る';
    bBack.onclick = function () {
      renderMergeStep1(_mergeKeepData && _mergeKeepData.needsMergeReview === true);
    };
    act.appendChild(bBack);

    var bNext = document.createElement('button');
    bNext.className = 'btn btn-primary';
    bNext.textContent = '次へ';
    bNext.onclick = function () { goMergeStep3(); };
    act.appendChild(bNext);
  }

  function buildPickTable() {
    var fields = [
      { key: 'name',  label: 'お名前' },
      { key: 'phone', label: '電話番号' },
      { key: 'memo',  label: 'メモ' }
    ];
    var table = document.createElement('table');
    table.className = 'pick-table';

    var thead = document.createElement('thead');
    var hrow  = document.createElement('tr');
    var headers = ['項目', '現在のカルテ（残す）', '相手のカルテ（取り込む）'];
    var hi;
    for (hi = 0; hi < headers.length; hi++) {
      var th = document.createElement('th');
      th.textContent = headers[hi];
      hrow.appendChild(th);
    }
    thead.appendChild(hrow);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    var fi, field, row, tdLabel, tdKeep, tdRemove;

    for (fi = 0; fi < fields.length; fi++) {
      field = fields[fi];
      row = document.createElement('tr');
      row.className = 'pick-row';
      row.id = 'pickrow_' + field.key;

      tdLabel = document.createElement('td');
      tdLabel.style.color = 'var(--mu)';
      tdLabel.style.fontSize = '12px';
      tdLabel.style.whiteSpace = 'nowrap';
      tdLabel.textContent = field.label;
      row.appendChild(tdLabel);

      tdKeep = buildPickCell(field.key, 'keep',
        (_mergeKeepData[field.key] || '(なし)'), true);
      row.appendChild(tdKeep);

      tdRemove = buildPickCell(field.key, 'remove',
        (_mergeRemoveData[field.key] || '(なし)'), false);
      row.appendChild(tdRemove);

      (function (fk) {
        row.onclick = function () { togglePick(fk); };
      })(field.key);

      tbody.appendChild(row);
    }
    table.appendChild(tbody);
    return table;
  }

  function buildPickCell(fieldKey, side, val) {
    var td = document.createElement('td');
    var lbl = document.createElement('div');
    lbl.className = 'pick-cell-label';
    lbl.textContent = (side === 'keep') ? '✔ 採用' : '';
    lbl.id = 'picklbl_' + fieldKey + '_' + side;
    td.appendChild(lbl);
    var v = document.createElement('div');
    v.className = 'pick-cell-val';
    v.textContent = val;
    td.appendChild(v);
    return td;
  }

  function togglePick(fieldKey) {
    var current;
    if (fieldKey === 'name')  { current = _pickName;  }
    if (fieldKey === 'phone') { current = _pickPhone; }
    if (fieldKey === 'memo')  { current = _pickMemo;  }
    var next = (current === 'keep') ? 'remove' : 'keep';
    if (fieldKey === 'name')  { _pickName  = next; }
    if (fieldKey === 'phone') { _pickPhone = next; }
    if (fieldKey === 'memo')  { _pickMemo  = next; }

    var lblKeep   = document.getElementById('picklbl_' + fieldKey + '_keep');
    var lblRemove = document.getElementById('picklbl_' + fieldKey + '_remove');
    if (lblKeep)   { lblKeep.textContent   = (next === 'keep')   ? '✔ 採用' : ''; }
    if (lblRemove) { lblRemove.textContent = (next === 'remove') ? '✔ 採用' : ''; }

    var row = document.getElementById('pickrow_' + fieldKey);
    if (row) {
      var tds = row.querySelectorAll('td');
      var i;
      for (i = 1; i < tds.length; i++) {
        tds[i].style.background = '';
      }
      tds[next === 'keep' ? 1 : 2].style.background = 'var(--al)';
    }
  }

  // ---- Step 3: 確認 ----
  function goMergeStep3() {
    var body = document.getElementById('mergeBody');
    body.innerHTML = '';
    var act  = document.getElementById('mergeActions');
    act.innerHTML = '';

    var secTitle = document.createElement('div');
    secTitle.style.fontSize = '13px';
    secTitle.style.fontWeight = '600';
    secTitle.style.color = 'var(--ad)';
    secTitle.style.marginBottom = '12px';
    secTitle.textContent = '最終確認';
    body.appendChild(secTitle);

    var ks = (typeof _mergeKeepData.stampCount === 'number') ? _mergeKeepData.stampCount : 0;
    var rs = (typeof _mergeRemoveData.stampCount === 'number') ? _mergeRemoveData.stampCount : 0;

    var useName  = (_pickName  === 'remove') ? (_mergeRemoveData.name  || '') : (_mergeKeepData.name  || '');
    var usePhone = (_pickPhone === 'remove') ? (_mergeRemoveData.phone || '') : (_mergeKeepData.phone || '');
    var useMemo  = (_pickMemo  === 'remove') ? (_mergeRemoveData.memo  || '') : (_mergeKeepData.memo  || '');

    var box = document.createElement('div');
    box.className = 'confirm-box';
    box.innerHTML =
        '<div><strong>名前:</strong> ' + esc(useName)  + '</div>'
      + '<div><strong>電話:</strong> ' + esc(usePhone) + '</div>'
      + '<div><strong>メモ:</strong> ' + esc(useMemo || '(なし)') + '</div>'
      + '<div><strong>スタンプ:</strong> ' + (ks + rs) + '個（' + ks + '+' + rs + '合算）</div>'
      + '<div style="margin-top:8px;font-size:12px;color:var(--mu);">'
      + '「' + esc(_mergeRemoveData.name || '') + '」の来店履歴も引き継ぎます</div>';
    body.appendChild(box);

    var danger = document.createElement('div');
    danger.className = 'confirm-danger';
    danger.textContent = '⚠️ この操作は取り消せません。よろしいですか？';
    body.appendChild(danger);

    var bBack = document.createElement('button');
    bBack.className = 'btn btn-ghost';
    bBack.textContent = '← 戻る';
    bBack.onclick = goMergeStep2;
    act.appendChild(bBack);

    var bExec = document.createElement('button');
    bExec.className = 'btn btn-primary';
    bExec.textContent = '統合を実行する';
    bExec.onclick = doExecuteMerge;
    act.appendChild(bExec);
  }

  // ---- 統合実行 ----
  function doExecuteMerge() {
    if (!_mergeKeepId || !_mergeRemoveId) {
      uiToast('選択が不完全です');
      return;
    }

    var salonId = getCurrentSalonId();
    if (!salonId) {
      uiToast('サロンIDが取得できません');
      return;
    }

    uiShowLoading('統合処理中...');

    var fn = firebase.functions().httpsCallable('executeMergeCustomers');
    fn({
      salonId:   salonId,
      keepId:    _mergeKeepId,
      removeId:  _mergeRemoveId,
      pickName:  _pickName,
      pickPhone: _pickPhone,
      pickMemo:  _pickMemo
    }).then(function (result) {
      uiForceHideLoading();
      var d = result.data || {};
      if (d.result === 'merged') {
        uiToast('統合完了！（履歴 ' + (d.appointmentsUpdated || 0) + '件 引き継ぎ）');
        closeMerge();
        closePanel();

        // _all から removeId を除去
        var i;
        for (i = 0; i < _all.length; i++) {
          if (_all[i] && _all[i]._id === _mergeRemoveId) {
            _all.splice(i, 1);
            break;
          }
        }

        // keep 側をローカル更新
        var ks2 = (typeof _mergeKeepData.stampCount === 'number') ? _mergeKeepData.stampCount : 0;
        var rs2 = (typeof _mergeRemoveData.stampCount === 'number') ? _mergeRemoveData.stampCount : 0;
        for (i = 0; i < _all.length; i++) {
          if (_all[i] && _all[i]._id === _mergeKeepId) {
            _all[i].name       = (_pickName  === 'remove') ? (_mergeRemoveData.name  || '') : (_mergeKeepData.name  || '');
            _all[i].phone      = (_pickPhone === 'remove') ? (_mergeRemoveData.phone || '') : (_mergeKeepData.phone || '');
            _all[i].memo       = (_pickMemo  === 'remove') ? (_mergeRemoveData.memo  || '') : (_mergeKeepData.memo  || '');
            _all[i].stampCount = ks2 + rs2;
            _all[i].needsMergeReview = false;
            break;
          }
        }
        _all.sort(function (a, b) {
          var an = (a && a.name) ? String(a.name) : '';
          var bn = (b && b.name) ? String(b.name) : '';
          return (an < bn) ? -1 : (an > bn) ? 1 : 0;
        });
        applyFilter();
      } else {
        uiToast('予期しないレスポンス: ' + JSON.stringify(d));
      }
    }).catch(function (err) {
      uiForceHideLoading();
      uiToast('統合に失敗しました: ' + (err.message || err));
    });
  }

  // ----- 起動 -----
  onFbReady(function () {
    requireSalonStaff(function (isStaff) {
      if (!isStaff) {
        window.location.href = 'salon_auth_v2_new.html';
        return;
      }
      loadList();
    });
  });

})();
</script>
</body>
</html>
